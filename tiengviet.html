      if(e.key!=="Enter") return;
      e.preventDefault();
      const all=[...view.querySelectorAll("input.dblank")];
      const i=all.indexOf(inp);
      if(i>=0 && i<all.length-1) all[i+1].focus(); else dlgGrade();
    });
  });
  // 전부 받아쓰기 — 줄 통째 입력칸 (Enter는 줄바꿈이 아니라 다음 줄로, Shift+Enter는 줄바꿈)
  view.querySelectorAll("textarea.dfull").forEach(t=>{
    t.addEventListener("input", ()=>{ DLG.ans[Number(t.dataset.b)] = t.value; });
    t.addEventListener("keydown", e=>{
      if(e.key!=="Enter" || e.shiftKey) return;
      e.preventDefault();
      const all=[...view.querySelectorAll("textarea.dfull")];
      const i=all.indexOf(t);
      if(i>=0 && i<all.length-1) all[i+1].focus(); else dlgGrade();
    });
  });
}
function dlgHighlight(li){
  DLG.playing = li;
  view.querySelectorAll(".dline").forEach(el=>el.classList.toggle("now", Number(el.dataset.li)===li));
}
function dlgPlayAll(){
  dlgSaveInputs();
  speakLines(DLG.lines.map(l=>l.vn), dlgHighlight, ()=>{ DLG.playing=false; view.querySelectorAll(".dline.now").forEach(el=>el.classList.remove("now")); });
}
function dlgGrade(){
  if(DLG.graded) return;
  dlgSaveInputs();
  DLG.score=0;
  // 전부 받아쓰기 — 줄마다 문장 채점(성조까지). ok=정확 / tone=성조·철자만 다름 / no=오답
  if(DLG.full){
    DLG.lines.forEach((ln,li)=>{
      const typed=(DLG.ans[li]||"").trim();
      const g = typed ? gradeSent(typed, ln.vn) : "no";
      DLG.res[li] = {g};
      if(g==="ok") DLG.score++;
    });
    DLG.graded=true; stopSpeak(); DLG.playing=false; renderDlg(); return;
  }
  DLG.lines.forEach(ln=>{
    ln.blanks.forEach(b=>{
      if(DLG.locked.has(b.bi)){ DLG.res[b.bi]={g:"ok"}; DLG.score++; return; }   // 지난 회차에 맞힌 칸
      const typed=(DLG.ans[b.bi]||"").trim();
      const g = typed ? checkVnTyped(b.ans, typed) : "no";   // 성조까지 채점
      DLG.res[b.bi] = {g};
      // 빈칸이 교재 단어면 오답노트에 반영 (단어가 아닌 조각은 건드리지 않음)
      const w = WORDS.find(x=>normTone(x.vn)===normTone(b.ans));
      if(g==="ok"){ DLG.score++; if(w) noteRight(w); }
      else if(w) noteWrong(w);
    });
  });
  DLG.graded=true;
  stopSpeak(); DLG.playing=false;
  renderDlg();
}
function dlgNextDialog(){
  const ds = DIALOGS[state.dlgLesson]||[];
  const i = ds.findIndex(d=>d.no===DLG.no);
  if(i>=0 && i+1<ds.length){ state.dlgNo = ds[i+1].no; lsSet("_dlgN", state.dlgNo); startDlg(); return; }
  const Ls = dialogLessons(), li = Ls.indexOf(state.dlgLesson);
  if(li>=0 && li+1<Ls.length){ state.dlgLesson=Ls[li+1]; state.dlgNo=1; lsSet("_dlgL",state.dlgLesson); lsSet("_dlgN",1); startDlg(); return; }
  renderSetup();
}

/* =========================================================
   단어 순서 배치 (쓰기 → 문장 → 순서 배치)
   한국어 뜻을 보고, 흩어진 베트남어 단어를 눌러 순서대로 배열해 문장을 완성.
   ========================================================= */
const ORD = { items:[], idx:0, score:0, wrong:[], words:[], pool:[], placed:[], answered:false, ok:false, lbl:"", lessonKey:null, keepOrder:false, basePos:0, total:0 };
/* 문장을 낱말로 쪼갬 (구두점은 붙어 있는 그대로 — 교재 표기 유지) */
const ordWords = s => String(s).trim().split(/\s+/).filter(Boolean);
function startSentOrder(arr, lbl, l, keepOrder){
  // 너무 짧거나(3개 미만) 너무 긴(14개 초과) 문장은 순서 배치에 안 맞아 제외
  let pool = arr.filter(x => { const n = ordWords(x.vn).length; return n>=3 && n<=14; });
  if(pool.length < 3) pool = arr;                      // 남는 게 거의 없으면 그냥 다 씀
  if(!pool.length){ alert("이 단원에 순서 배치로 낼 문장이 없어요."); return; }
  // 교재 순서면 지난번 멈춘 자리(진행상황)부터 이어서 — 랜덤은 매번 순서가 달라 기억 안 함
  const total = pool.length;
  let base = 0;
  if(keepOrder){ base = ordPosGet(l); if(base >= total) base = 0; }   // 끝까지 다 했으면 처음부터
  let chunk = pool.slice(base);
  if(state.count!=="all") chunk = chunk.slice(0, Math.min(Number(state.count), chunk.length));
  state.mode="order";
  ORD.items = chunk.map(x=>({vn:x.vn, en:x.en, lesson:lbl, type:"sentence"}));
  ORD.idx=0; ORD.score=0; ORD.wrong=[]; ORD.lbl=lbl;
  ORD.lessonKey = (l==null?null:l); ORD.keepOrder = !!keepOrder; ORD.basePos = base; ORD.total = total;
  ordSetup();
  renderOrder();
}
function ordSetup(){
  const it = ORD.items[ORD.idx];
  ORD.words = ordWords(it.vn);
  // 흩어놓기 (원래 순서 그대로 나오면 다시 섞음)
  let p;
  for(let t=0; t<12; t++){
    p = shuffle(ORD.words.map((w,i)=>({w, i})));
    if(ORD.words.length<2 || p.some((x,k)=>x.i!==k)) break;
  }
  ORD.pool = p;
  ORD.placed = [];
  ORD.answered=false; ORD.ok=false;
}
const ordSentence = () => ORD.placed.map(x=>x.w).join(" ");
function renderOrder(){
  state.screen = "order:"+ORD.idx;
  const it = ORD.items[ORD.idx], n = ORD.items.length;
  const done = ORD.placed.length === ORD.words.length;
  const answer = it.vn;

  const placedHTML = ORD.placed.length
    ? ORD.placed.map((x,k)=>`<button class="wchip placed" data-action="ordUnpick" data-k="${k}" ${ORD.answered?"disabled":""}>${esc(x.w)}</button>`).join("")
    : `<span class="muted tiny">아래 단어를 눌러 순서대로 놓아보세요</span>`;
  const poolHTML = ORD.pool.map((x,k)=>{
    const used = ORD.placed.some(p=>p.i===x.i);
    return `<button class="wchip${used?" used":""}" data-action="ordPick" data-k="${k}" ${used||ORD.answered?"disabled":""}>${esc(x.w)}</button>`;
  }).join("");

  let fb="";
  if(ORD.answered){
    fb = ORD.ok
      ? `<div class="feedback ok"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 정답이에요! ${spkBtn(answer,"vi-VN",true)}</div>`
      : `<div class="feedback no"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 아쉬워요
           <span class="ans">${esc(answer)} ${spkBtn(answer,"vi-VN",true)}</span>
           <div class="mycmp" style="margin-top:8px"><b>내 답</b>${esc(ordSentence()||"(비어 있음)")}</div>
         </div>`;
  }
  set(`
    <div class="qtop"><span><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-shuffle'/></svg> 순서 배치 ${ORD.idx+1} / ${n}</span><span>점수 ${ORD.score}</span></div>
    <div class="bar"><i style="width:${Math.round((ORD.idx/n)*100)}%"></i></div>
    <div class="card">
      <div class="muted tiny" style="margin-bottom:6px">${esc(it.lesson)} · 뜻을 보고 단어를 순서대로 놓으세요</div>
      <div class="qword" style="font-size:19px; line-height:1.5">${esc(it.en)}</div>
    </div>
    <div class="card">
      <div class="wline">${placedHTML}</div>
      <div class="wpool">${poolHTML}</div>
      ${!ORD.answered ? `<div class="btn2" style="margin-top:12px">
          <button class="btn soft" data-action="ordClear">지우기</button>
          <button class="btn soft" data-action="ordShuffle"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-shuffle'/></svg> 다시 섞기</button>
        </div>`:""}
    </div>
    ${fb}
    ${ORD.answered
      ? `<button class="btn lg" data-action="ordNext">${ORD.idx+1>=n?"결과 보기 →":"다음 문제 →"}</button>`
      : `<button class="btn lg" data-action="ordCheck" ${done?"":"disabled"}><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> ${done?"확인하기":`단어 ${ORD.words.length-ORD.placed.length}개 남았어요`}</button>`}
    <button class="btn line" style="margin-top:10px" data-action="quitOrder">← 설정으로</button>
  `);
}
function ordCheck(){
  if(ORD.answered) return;
  if(ORD.placed.length !== ORD.words.length) return;
  const it = ORD.items[ORD.idx];
  ORD.ok = (ordSentence() === ORD.words.join(" "));   // 단어 조각이 그대로라 순서만 맞으면 정답
  ORD.answered = true;
  if(ORD.ok){ ORD.score++; noteRight(it); }
  else { ORD.wrong.push(it); noteWrong(it); }
  // 진행상황 기억(교재 순서일 때만): 방금 푼 문제까지 완료로 저장, 끝까지 다 했으면 처음부터
  if(ORD.keepOrder && ORD.lessonKey!=null){
    const donePos = ORD.basePos + ORD.idx + 1;
    ordPosSet(ORD.lessonKey, donePos >= ORD.total ? 0 : donePos);
  }
  renderOrder();
}
function ordNext(){
  if(ORD.idx+1 >= ORD.items.length){ renderOrderDone(); return; }
  ORD.idx++; ordSetup(); renderOrder();
}
function renderOrderDone(){
  state.screen="result";
  const n=ORD.items.length, pct=n?Math.round(ORD.score/n*100):0;
  set(`
    <div class="card center">
      <div class="emoji">${pct>=70?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-trophy'/></svg>":"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-book'/></svg>"}</div>
      <div class="stat"><div><b>${ORD.score}</b><div class="tiny muted">정답</div></div>
        <div><b>${n}</b><div class="tiny muted">문제</div></div>
        <div><b>${pct}%</b><div class="tiny muted">정답률</div></div></div>
    </div>
    ${ORD.wrong.length ? `<div class="card">
      <h2><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 다시 볼 문장 ${ORD.wrong.length}개</h2>
      <div class="muted tiny" style="margin:-6px 0 8px">오답 노트에 저장됐어요.</div>
      ${ORD.wrong.map(x=>`<div style="padding:8px 0; border-top:1px solid var(--line)">
        <div style="font-weight:700">${esc(x.vn)} ${spkBtn(x.vn,"vi-VN",true)}</div>
        <div class="muted tiny" style="margin-top:2px">${esc(x.en)}</div>
      </div>`).join("")}
    </div>`:""}
    <button class="btn lg" data-action="quitOrder"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-repeat'/></svg> 다시 하기</button>
    <button class="btn line" style="margin-top:10px" data-action="goHome">← 처음으로</button>
  `);
}

/* ---------- 문장 여러 개 한 번에 풀기 (시험지처럼) ---------- */
const BULK = { items:[], page:0, per:10, ans:{}, res:{}, graded:false, score:0, lesson:null };
/* '교재 순서'로 풀 때만 어디까지 했는지 기억 — {단원: 다음에 풀 페이지}. 랜덤은 매번 순서가 달라 의미 없음 */
const bulkPosAll = () => lsGet("_bulkpos", {}) || {};
const bulkPosGet = l => Number(bulkPosAll()[String(l)] || 0);
function bulkPosSet(l, page){ const a=bulkPosAll(); if(page>0) a[String(l)]=page; else delete a[String(l)]; lsSet("_bulkpos", a); }
/* 순서 배치 진행 기억: _ordpos = {단원: 다음에 배치할 문장 번호(0부터)} — 교재 순서일 때만 */
const ordPosAll = () => lsGet("_ordpos", {}) || {};
const ordPosGet = l => Number(ordPosAll()[String(l)] || 0);
function ordPosSet(l, pos){ const a=ordPosAll(); if(pos>0) a[String(l)]=pos; else delete a[String(l)]; lsSet("_ordpos", a); }
function startSentBulk(arr, lbl, lesson, resumeFrom){
  state.mode="bulk";
  BULK.items = arr.map(x=>({vn:x.vn, en:x.en, lesson:lbl, type:"sentence", dir:dirOf(state.dir)}));
  BULK.lesson = lesson ?? null;
  BULK.page = Number(resumeFrom||0);
  if(BULK.page >= Math.ceil(BULK.items.length/BULK.per)) BULK.page = 0;   // 범위 넘으면 처음부터
  BULK.ans={}; BULK.res={}; BULK.graded=false; BULK.score=0;
  renderSentBulk();
}
const bulkPages = () => Math.max(1, Math.ceil(BULK.items.length / BULK.per));
function renderSentBulk(){
  state.screen="bulk:"+BULK.page;   // 페이지 넘길 때만 맨 위로
  const total=BULK.items.length, start=BULK.page*BULK.per, end=Math.min(start+BULK.per, total);
  const rows=[];
  for(let i=start;i<end;i++){
    const it=BULK.items[i];
    const vn2en = it.dir==="vn2en";
    const prompt = vn2en ? it.vn : it.en, answer = vn2en ? it.en : it.vn;
    const pLang = vn2en ? "vi-VN" : "ko-KR", aLang = vn2en ? "ko-KR" : "vi-VN";
    const r = BULK.res[i];
    let resHTML="";
    if(r){
      const badge = r.ok
        ? `<span class="feedback ok" style="display:inline-block;padding:4px 9px;margin:0"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 정답</span>`
        : r.g==="tone"
        ? `<span class="feedback no" style="display:inline-block;padding:4px 9px;margin:0"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-alert'/></svg> 성조·철자 차이 (시험에선 감점)</span>`
        : `<span class="feedback no" style="display:inline-block;padding:4px 9px;margin:0"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 다시 확인</span>`;
      resHTML = `<div style="margin-top:7px">${badge}
        <div class="mycmp" style="margin-top:6px"><b>모범답안</b>${esc(answer)} ${spkBtn(answer,aLang,true)}</div>
        <button class="chip" style="margin-top:6px" data-action="bulkToggle" data-i="${i}">${r.ok?"틀린 걸로 하기":"맞은 걸로 하기"}</button>
      </div>`;
    }
    rows.push(`<div class="card" style="padding:12px 14px">
      <div style="display:flex; gap:9px">
        <span style="font-weight:800; color:var(--brand); flex:0 0 auto">${i+1}.</span>
        <div style="flex:1; min-width:0">
          <div style="font-weight:700; line-height:1.5">${esc(prompt)} ${spkBtn(prompt,pLang,true)}</div>
          <textarea class="answer" data-bi="${i}" rows="2" placeholder="${vn2en?"한국어 번역":"베트남어 번역"}" ${BULK.graded?"disabled":""} autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="margin-top:6px">${esc(BULK.ans[i]||"")}</textarea>
          ${resHTML}
        </div>
      </div>
    </div>`);
  }
  const isLast = BULK.page+1 >= bulkPages();
  const footer = !BULK.graded
    ? `<button class="btn lg" data-action="bulkGrade"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> ${end-start}문제 채점하기</button>`
    : `<button class="btn lg" data-action="bulkNext">${isLast?"결과 보기 →":`다음 ${Math.min(BULK.per, total-end)}문제 →`}</button>`;
  set(`
    <div class="qtop"><span><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-pencil'/></svg> 문장 ${start+1}–${end} / ${total}</span><span>점수 ${BULK.score}</span></div>
    <div class="bar"><i style="width:${Math.round((end/total)*100)}%"></i></div>
    ${rows.join("")}
    ${footer}
    <button class="btn line" style="margin-top:10px" data-action="quitBulk">그만두기</button>
  `);
  view.querySelectorAll("textarea[data-bi]").forEach(t=>{
    t.addEventListener("input", ()=>{ BULK.ans[Number(t.dataset.bi)] = t.value; });
  });
}
function bulkGrade(){
  if(BULK.graded) return;
  const total=BULK.items.length, start=BULK.page*BULK.per, end=Math.min(start+BULK.per, total);
  for(let i=start;i<end;i++){
    const it=BULK.items[i];
    const answer = it.dir==="vn2en" ? it.en : it.vn;
    const typed = (BULK.ans[i]||"").trim();
    const g = typed ? gradeSent(typed, answer) : "no";   // 빈칸은 오답
    const ok = (g==="ok");
    BULK.res[i] = {g, ok};
    if(ok){ BULK.score++; noteRight(it); } else { noteWrong(it); }
  }
  BULK.graded=true;
  // 채점 = 그 페이지를 다 푼 것 → 여기서 바로 저장.
  // ('다음 →'을 눌러야만 저장하면, 채점하고 나간 사람이 그 10문제를 또 풀어야 함 — 사용자 지적)
  if(state.sentOrder==="book" && BULK.lesson!=null){
    const next = BULK.page+1;
    bulkPosSet(BULK.lesson, next >= bulkPages() ? 0 : next);   // 마지막 장이면 기록 지움(처음부터)
  }
  renderSentBulk();
}
function bulkToggle(i){
  i=Number(i);
  const r=BULK.res[i]; if(!r) return;
  const it=BULK.items[i];
  r.ok = !r.ok;
  if(r.ok){ BULK.score++; noteRight(it); } else { BULK.score--; noteWrong(it); }
  renderSentBulk();
}
function bulkNext(){
  // 저장은 이미 bulkGrade에서 함 (채점 = 그 페이지 완료)
  if(BULK.page+1 >= bulkPages()){ renderBulkDone(); return; }
  BULK.page++; BULK.graded=false;
  renderSentBulk();
}
function renderBulkDone(){
  state.screen="result";
  const total=BULK.items.length;
  const done=Object.keys(BULK.res).length || total;
  const pct = done ? Math.round((BULK.score/done)*100) : 0;
  const wrong = BULK.items.map((it,i)=>({it, r:BULK.res[i]})).filter(x=>x.r && !x.r.ok);
  set(`
    <div class="card center">
      <div class="emoji">${pct>=70?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-trophy'/></svg>":"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-book'/></svg>"}</div>
      <div class="stat"><div><b>${BULK.score}</b><div class="tiny muted">정답</div></div>
        <div><b>${done}</b><div class="tiny muted">푼 문제</div></div>
        <div><b>${pct}%</b><div class="tiny muted">정답률</div></div></div>
    </div>
    ${wrong.length ? `<div class="card">
      <h2><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 다시 볼 문장 ${wrong.length}개</h2>
      <div class="muted tiny" style="margin:-6px 0 8px"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-book'/></svg> 오답 노트에 저장됐어요.</div>
      ${wrong.map(x=>`<div style="padding:8px 0; border-top:1px solid var(--line)">
        <div style="font-weight:700">${esc(x.it.vn)} ${spkBtn(x.it.vn,"vi-VN",true)}</div>
        <div class="muted tiny" style="margin-top:2px">${esc(x.it.en)}</div>
      </div>`).join("")}
    </div>` : `<div class="card center" style="padding:24px"><div class="emoji"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-star'/></svg></div><b>다 맞혔어요!</b></div>`}
    <button class="btn soft" style="margin-top:10px" data-action="backToSetup">← 범위 다시 고르기</button>
    <button class="btn line" style="margin-top:10px" data-action="goHome"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-home'/></svg> 처음으로</button>
  `);
}

/* ---------- 시험 진행 ---------- */
const Q = {};
function poolSelected(){
  if(state.selMode==="range"){ const [a,b]=rangeBounds(); return WORDS.slice(a, b+1); }
  return WORDS.filter(w=>state.lessons.has(w.lesson));
}

function start(){
  const pool = poolSelected();
  if(pool.length===0){ alert("먼저 시험 볼 단원을 한 개 이상 골라주세요."); return; }
  if(state.mode==="flash"){ startFlash(pool); return; }
  if(state.mode==="exam"){ startExam(pool); return; }
  let q = shuffle(pool);
  if(state.count!=="all") q = q.slice(0, Math.min(Number(state.count), q.length));
  Q.queue = q.map(w=>makeQ(w, dirOf(state.dir)));
  Q.idx=0; Q.score=0; Q.wrong=[];
  setupQ(); renderQuiz();
}
function startExam(pool){
  const words = shuffle(pool).slice(0, Math.min(40, pool.length));
  const sents = shuffle(SENTS).slice(0, Math.min(10, SENTS.length));
  Q.wordCount = words.length; Q.sentCount = sents.length;
  Q.queue = [
    ...words.map(w=>makeQ(w, dirOf(state.dir), "word")),
    ...sents.map(s=>makeQ({vn:s.vn, en:s.en, lesson:"문장"}, dirOf(state.dir), "sentence"))
  ];
  Q.idx=0; Q.score=0; Q.wrong=[];
  setupQ(); renderQuiz();
}
function startQueue(items){ Q.queue=items; Q.idx=0; Q.score=0; Q.wrong=[]; Q.wordCount=null; Q.sentCount=null; setupQ(); renderQuiz(); }

function setupQ(){
  const q = Q.queue[Q.idx];
  Q.answered=false; Q.picked=null; Q.typed=""; Q.revealed=false; Q.autoOk=false; Q.toneWarn=false;
  if(state.mode==="mc"){
    const key = q.dir==="vn2en" ? "en" : "vn";
    const pkey = q.dir==="vn2en" ? "vn" : "en";
    const seen = new Set([norm(q.answer)]);
    const pn = norm(q.prompt);
    const distract = [];
    for(const w of shuffle(WORDS)){
      if(norm(w[pkey])===pn) continue;
      const v = w[key], nv = norm(v);
      if(seen.has(nv)) continue;
      seen.add(nv); distract.push(v);
      if(distract.length>=3) break;
    }
    const opts = shuffle([q.answer, ...distract]);
    Q.options = opts; Q.correct = opts.indexOf(q.answer);
  }
}

/* 문장 채점: 대소문자·문장부호·띄어쓰기 무시 + 약간의 오차(편집거리 20%)까지 자동 정답. 그 외엔 자가채점으로 넘김 */
function normSent(s){ return String(s).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/đ/g,"d").replace(/[.,!?;:'"“”‘’…()\-–]/g," ").replace(/\s+/g," ").trim(); }  /* 성조·부호·대소문자·띄어쓰기 무시(문장은 번역 맞으면 관대하게) */
function levenshtein(a,b){
  const m=a.length, n=b.length; if(!m) return n; if(!n) return m;
  let prev=Array.from({length:n+1},(_,i)=>i), cur=new Array(n+1);
  for(let i=1;i<=m;i++){ cur[0]=i;
    for(let j=1;j<=n;j++){ const cost=a[i-1]===b[j-1]?0:1; cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost); }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
function sentTokens(s){ return normSent(s).split(" ").filter(Boolean); }
function sentMatch(typed, answer){
  const a=normSent(typed), b=normSent(answer);
  if(!a) return false;
  if(a===b) return true;
  const sim = 1 - levenshtein(a,b)/Math.max(a.length,b.length,1);
  if(sim >= 0.8) return true;   // 사소한 차이(오타·성조 한둘·문장부호)는 자동 정답
  // 어순만 다르거나 불필요어가 붙은 경우: 모범답안의 핵심 단어가 거의 다 들어있으면 자동 정답
  const at=new Set(sentTokens(a)), bt=sentTokens(b);
  if(bt.length>=2){
    const hit=bt.filter(t=>at.has(t)).length;
    if(hit/bt.length >= 0.85) return true;
  }
  return false;
}
/* 성조까지 채점 — ok(성조·철자 정확) / tone(글자는 맞는데 성조·dấu만 달라 시험 감점) / no(내용도 다름) */
function normSentTone(s){ return canonTone(String(s).toLowerCase()).replace(/[.,!?;:'"“”‘’…()\-–]/g," ").replace(/\s+/g," ").trim(); }  /* 성조 유지(부호 위치 통일), 대소문자·부호·띄어쓰기만 무시 */
function gradeSent(typed, answer){
  const aT=normSentTone(typed), bT=normSentTone(answer);
  if(!aT) return "no";
  if(aT===bT) return "ok";                                          // 성조까지 완전 일치
  const bTok=bT.split(" ").filter(Boolean), aSet=new Set(aT.split(" ").filter(Boolean));
  if(bTok.length>=2 && bTok.every(t=>aSet.has(t))) return "ok";     // 정답 단어가 성조까지 다 맞음(어순만 다름)
  /* '성조 차이'는 성조·dấu를 떼면 똑같을 때만. (편집거리로 판정하면 mắc↔rẻ 처럼 뜻이 정반대인 단어도 '성조 차이'가 됨) */
  const a=normSent(typed), b=normSent(answer);
  if(a===b) return "tone";
  const bt=b.split(" ").filter(Boolean), as=new Set(a.split(" ").filter(Boolean));
  if(bt.length>=2 && bt.every(t=>as.has(t))) return "tone";         // 성조 떼면 낱말이 다 맞음(어순만 다름)
  return "no";
}
function renderQuiz(){
  state.screen="quiz:"+Q.idx;   // 다음 문제로 넘어갈 때만 맨 위로 (채점·정답공개는 자리 유지)
  const q = Q.queue[Q.idx], n = Q.queue.length;
  const pct = Math.round((Q.idx/(n))*100);
  const isSent = q.type==="sentence";
  const isListen = state.mode==="listen";
  const isRead = state.mode==="read";
  const kind = state.mode==="mc" ? "mc" : (isRead ? "read" : (isSent ? "sent" : "word"));
  const promptLang = (q.dir==="vn2en" || q.dictation) ? "vi-VN" : "ko-KR";   // 받아쓰기는 소리=베트남어
  const ansLang = q.dictation ? "vi-VN" : (q.dir==="vn2en" ? "ko-KR" : "vi-VN");

  // 진행 라벨 (실전시험이면 단어/문장 구분)
  let counter = `문제 ${Q.idx+1} / ${n}`;
  if(state.mode==="exam" && Q.wordCount!=null){
    counter = (Q.idx < Q.wordCount)
      ? `<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-note'/></svg> 단어 ${Q.idx+1} / ${Q.wordCount}`
      : `<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-pencil'/></svg> 문장 ${Q.idx - Q.wordCount + 1} / ${Q.sentCount}`;
  } else if(state.mode==="exam"){
    counter = (isSent ? "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-pencil'/></svg> 문장" : "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-note'/></svg> 단어") + ` ${Q.idx+1} / ${n}`;
  }

  const subText = isRead
    ? (Q.revealed ? "뜻을 확인하세요" : "소리 내어 읽고, 뜻을 떠올려 보세요")
    : isListen
    ? (Q.answered ? "" : (isSent ? "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-volume'/></svg> 잘 듣고, 베트남어 문장을 그대로 적으세요" : "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-volume'/></svg> 잘 듣고, 들은 베트남어를 적으세요"))
    : isSent
    ? (q.dir==="vn2en" ? "이 문장을 한국어로 번역하세요" : "이 문장을 베트남어로 번역하세요")
    : (q.dir==="vn2en" ? "이 단어의 한국어 뜻은?" : "이 뜻의 베트남어 단어는?");

  let body = "", fb = "";
  const nextBtn = `<button class="btn" style="margin-top:12px" data-action="next">${Q.idx+1>=n?"결과 보기 →":"다음 →"}</button>`;

  if(kind==="mc"){
    body = Q.options.map((o,i)=>{
      let cls = "opt";
      if(Q.answered){ if(i===Q.correct) cls+=" correct"; else if(i===Q.picked) cls+=" wrong"; }
      return `<button class="${cls}" data-action="pick" data-i="${i}" ${Q.answered?"disabled":""}>
        <span class="num">${i+1}</span>${esc(o)}</button>`;
    }).join("");
    if(Q.answered){
      const ok = Q.picked===Q.correct;
      fb = `<div class="feedback ${ok?"ok":"no"}">${ok?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 정답이에요!":"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 아쉬워요"}
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${nextBtn}`;
    }
  } else if(kind==="word"){
    body = `<input class="answer" id="ansInput" placeholder="정답 입력 후 Enter" ${Q.answered?"disabled":""} value="${esc(Q.typed||"")}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      ${!Q.answered?`<button class="btn" style="margin-top:12px" data-action="check">확인</button>`:""}`;
    if(Q.answered){
      const head = Q.lastOk ? "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 정답이에요!" : (Q.toneOnly ? "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-alert'/></svg> 성조가 틀려요 (철자는 맞아요!)" : "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 아쉬워요");
      const meaningLine = (q.dictation && q.meaning) ? `<div class="promptsub" style="margin-top:8px">뜻: <b>${esc(q.meaning)}</b></div>` : "";
      fb = `<div class="feedback ${Q.lastOk?"ok":"no"}">${head}
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${meaningLine}${nextBtn}`;
    }
  } else if(kind==="read"){   // 읽기: 입력 없이 읽고 '뜻 보기'로 확인
    if(!Q.revealed){
      body = `<button class="btn" data-action="revealRead"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-eye'/></svg> 뜻 보기</button>`;
    } else {
      const rw = Q.queue[Q.idx].word;
      const starred = noteHas(rw);
      fb = `<div class="feedback ok"><span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>
        <div class="btn2" style="margin-top:12px">
          <button class="btn soft" data-action="readStar">${starred?"★ 다시 볼 단어에서 빼기":"☆ 다시 볼 단어에 넣기"}</button>
          <button class="btn" data-action="next">${Q.idx+1>=n?"다 읽었어요 →":"다음 →"}</button>
        </div>`;
    }
  } else { // 문장 번역 (타자 입력 → 자동채점 + 자가채점 보완)
    const modelLabel = q.dictation ? "정답 문장" : "모범 번역";
    const sentMeaning = (q.dictation && q.meaning) ? `<div class="promptsub" style="margin-top:6px">뜻: <b>${esc(q.meaning)}</b></div>` : "";
    const modelBlock = `<div class="feedback ok"><span style="font-weight:700">${modelLabel}</span>
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${sentMeaning}`;
    const myBlock = Q.typed ? `<div class="mycmp"><b>내 답</b>${esc(Q.typed)}</div>` : "";
    if(!Q.revealed && !Q.answered){
      body = `<textarea class="answer" id="sentInput" rows="2" placeholder="${q.dictation?"들은 베트남어 문장을 그대로 적으세요":(q.dir==="vn2en"?"한국어 번역을 입력하세요":"베트남어 번역을 입력하세요")}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">${esc(Q.typed||"")}</textarea>
        <div class="btn2" style="margin-top:12px"><button class="btn soft" data-action="revealSent"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-eye'/></svg> 모르겠어요 / 모범답안</button><button class="btn" data-action="checkSent"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 채점하기</button></div>`;
    } else if(Q.answered && Q.autoOk){   // 자동 정답
      fb = `<div class="feedback ok"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 정답이에요!</div>${myBlock}${modelBlock}${nextBtn}`;
    } else if(!Q.answered){              // 자동 못 맞춤 / 성조 차이 / 모르겠어요 → 자가채점
      const toneBanner = Q.toneWarn ? `<div class="feedback no" style="margin-bottom:8px"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-alert'/></svg> 성조·철자가 달라요 — 실제 시험에선 감점될 수 있어요. 모범답안과 꼭 비교하세요.</div>` : "";
      const selfHint = Q.toneWarn ? "성조까지 정확한지 확인하고 스스로 채점하세요" : (Q.typed?"내가 쓴 답이 뜻만 맞아도 '맞았어요'를 눌러요":"내 번역과 비교해보세요 — 맞았나요?");
      fb = `${toneBanner}${myBlock}${modelBlock}
        <div class="promptsub" style="margin-top:12px">${selfHint}</div>
        <div class="btn2"><button class="btn soft" data-action="selfWrong"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 틀렸어요</button><button class="btn" data-action="selfRight"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 맞았어요</button></div>`;
    } else {                             // 자가채점 결과
      fb = `<div class="feedback ${Q.lastOk?"ok":"no"}">${Q.lastOk?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 맞음 처리":"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 틀림 처리"}
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${myBlock}${nextBtn}`;
    }
  }

  const dirTagHTML = isListen ? `<span class="dirtag"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-headphones'/></svg> 듣기 · 받아쓰기 (베트남어로 적기)</span>` : isRead ? `<span class="dirtag"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-eye'/></svg> 읽기 · 베트남어 읽고 뜻 확인</span>` : `<span class="dirtag">${DIRLABEL[q.dir]}</span>`;
  const promptBlock = (isListen && !Q.answered && !Q.revealed)
    ? `<div class="listenbox">
         <button class="bigspk" data-action="speak" data-text="${esc(q.prompt)}" data-lang="${promptLang}" aria-label="다시 듣기"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-volume'/></svg></button>
         <div class="listenhint">${isSent?"소리를 듣고 베트남어 문장을 적어요":"소리를 듣고 베트남어를 적어요"} · 탭하면 다시 들려요</div>
       </div>`
    : `<div class="prompt${isSent?" sent":""}">${esc(q.prompt)} ${spkBtn(q.prompt, promptLang)}</div>`;
  set(`
    <div class="qtop"><span>${counter}</span><span>${isRead?"읽기 연습":"점수 "+Q.score}</span></div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="card">
      ${dirTagHTML}
      ${promptBlock}
      <div class="promptsub">${subText}</div>
      ${body}
      ${fb}
    </div>
    <button class="btn line" data-action="quit">그만두기</button>
  `);

  if(kind==="word" && !Q.answered){
    const inp = document.getElementById("ansInput");
    if(inp){ inp.focus(); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); e.stopPropagation(); checkTyped(); } }); }
  }
  if(kind==="sent" && !Q.revealed && !Q.answered){
    const si = document.getElementById("sentInput");
    if(si){ si.focus(); si.addEventListener("keydown",e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); e.stopPropagation(); actions.checkSent(); } }); }  // Enter=채점, Shift+Enter=줄바꿈
  }
  if(isListen && !Q.answered && !Q.revealed){ setTimeout(()=>speak(q.prompt, promptLang), 300); }
  if(Q.answered){ document.addEventListener("keydown", onAdvance); }
}
function onAdvance(e){ if(e.key==="Enter"){ document.removeEventListener("keydown", onAdvance); next(); } }

function pick(i){
  if(Q.answered) return;
  Q.answered=true; Q.picked=Number(i);
  const w=Q.queue[Q.idx].word;
  if(Q.picked===Q.correct){ Q.score++; noteRight(w); }
  else { Q.wrong.push(wrongItem()); noteWrong(w); }
  renderQuiz();
}
function checkTyped(){
  if(Q.answered) return;
  const inp = document.getElementById("ansInput");
  Q.typed = inp ? inp.value : "";
  const q = Q.queue[Q.idx];
  Q.toneOnly = false;
  if(q.dictation){   // 받아쓰기: 들은 베트남어 그대로 (성조까지 채점, 그 단어만 정답)
    const r = checkVnTyped(q.answer, Q.typed);
    Q.lastOk = (r==="ok"); Q.toneOnly = (r==="tone");
  } else if(q.dir==="en2vn"){   // 답이 베트남어 → 성조까지 채점 (같은 뜻의 다른 베트남어도 정답 인정)
    const r = checkVnAny(q.prompt, q.answer, Q.typed);
    Q.lastOk = (r==="ok"); Q.toneOnly = (r==="tone");
  } else {
    Q.lastOk = isCorrectTyped(q.answer, Q.typed);
  }
  Q.answered = true;
  if(Q.lastOk){ Q.score++; noteRight(q.word); } else { Q.wrong.push(wrongItem()); noteWrong(q.word); }
  renderQuiz();
}
function wrongItem(){ const q=Q.queue[Q.idx]; return {vn:q.word.vn, en:q.word.en, lesson:q.word.lesson, dir:q.dir, type:q.type, dictation:!!q.dictation}; }
function next(){
  document.removeEventListener("keydown", onAdvance);
  Q.idx++;
  if(Q.idx>=Q.queue.length){ renderResult(); return; }
  setupQ(); renderQuiz();
}
function quit(){
  if(confirm("시험을 그만둘까요? 지금까지 결과를 보여드릴게요.")){
    document.removeEventListener("keydown", onAdvance);
    renderResult();
  }
}

/* 오답 다시풀기: 받아쓰기 문항은 받아쓰기로 복원 */
function rebuildQ(w){
  if(w.dictation){
    return w.type==="sentence" ? listenSentQ({vn:w.vn,en:w.en}, w.lesson) : listenWordQ({vn:w.vn,en:w.en,lesson:w.lesson});
  }
  return makeQ({vn:w.vn,en:w.en,lesson:w.lesson}, w.dir, w.type);
}
function retryWrong(){
  const items = Q.wrong.map(rebuildQ);
  if(!items.length) return goHome();
  if(items.some(i=>i.dictation)) state.mode="listen";
  if(state.mode==="flash"){ startFlash(items.map(i=>i.word)); return; }
  startQueue(items);
}
function retryLast(){
  const lw = lsGet("_wrong", []);
  if(!lw.length) return;
  const items = lw.map(rebuildQ);
  if(items.some(i=>i.dictation)) state.mode="listen";
  startQueue(items);
}

/* ---------- 오답 노트 ---------- */
const GRAD = 2; // 연속 정답 GRAD번이면 노트에서 졸업(자동 제거)
function lc2(s){ return String(s).trim().toLowerCase(); }
function noteKey(w){ return lc2(w.vn)+"||"+lc2(w.en); }
function loadNote(){ return lsGet("_notebook", []); }
function saveNote(a){ lsSet("_notebook", a); cloudSave(); }
function noteHas(w){ const k=noteKey(w); return loadNote().some(e=>noteKey(e)===k); }
function noteAdd(w){ const a=loadNote(),k=noteKey(w); if(!a.some(e=>noteKey(e)===k)){ a.push({vn:w.vn,en:w.en,lesson:w.lesson,type:w.type||"word",streak:0}); saveNote(a); } }
function noteWrong(w){ const a=loadNote(),k=noteKey(w),e=a.find(x=>noteKey(x)===k); if(e){ e.streak=0; } else { a.push({vn:w.vn,en:w.en,lesson:w.lesson,type:w.type||"word",streak:0}); } saveNote(a); }
function noteRight(w){ const a=loadNote(),k=noteKey(w),i=a.findIndex(x=>noteKey(x)===k); if(i<0) return; a[i].streak=(a[i].streak||0)+1; if(a[i].streak>=GRAD) a.splice(i,1); saveNote(a); }
function seedNote(){
  /* 동기 공유용으로 '시험 오답 자동 등록'을 껐습니다.
     새 사용자는 빈 오답노트로 시작 → 시험을 보거나 '<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-plus'/></svg> 오답 직접 추가'로 채웁니다.
     이미 등록된 오답은 각 기기 localStorage(_notebook)에 그대로 유지됩니다. */
}

function goNote(){ renderNote(); }

}
function startNote(){

  const items=note.map(e=>makeQ({vn:e.vn,en:e.en,lesson:e.lesson}, dirOf(state.dir), e.type));
  if(state.mode==="flash"){ startFlash(items.map(i=>i.word)); return; }
  if(["listen","speak","read","dlg","bulk","order"].includes(state.mode)) state.mode="type";   // 오답 노트 시험은 주관식(듣기/말하기/읽기/대화/순서배치 모드로 깨지지 않게)
  startQueue(items);
}

/* ---------- 백업 / 복원 ---------- */
function exportData(){
  return JSON.stringify({ app:"gybm-wordnote", v:1, notebook:loadNote(), custom:lsGet("_custom",[]) });
}
function fallbackCopy(okMsg){
  const ta=document.getElementById("exportBox");
  if(ta){ ta.focus(); ta.select(); try{ if(document.execCommand("copy")){ alert(okMsg); return; } }catch(e){} }
  alert("자동 복사가 안 되네요. 위 박스의 글자를 길게 눌러 전체 선택 후 복사하세요.");
}
function copyExport(){
  const text=exportData(), msg="복사됐어요! 카톡으로 나에게 보내거나, 다른 브라우저에 붙여넣어 복원하세요.";
  bkMark();   // 백업함 → 넛지 리셋
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>alert(msg), ()=>fallbackCopy(msg)); return; }
  }catch(e){}
  fallbackCopy(msg);
}
function downloadExport(){
  try{
    const blob=new Blob([exportData()],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="베트남어학습_백업.json"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    bkMark();   // 백업함 → 넛지 리셋
  }catch(e){ alert("파일 저장이 안 되면 '복사하기'를 이용해 주세요."); }
}
function importBackup(text){
  let obj;
  try{ obj=JSON.parse((text||"").trim()); }catch(e){ return {ok:false,msg:"형식이 올바르지 않아요. 백업 코드 전체를 정확히 붙여넣었는지 확인하세요."}; }
  if(!obj || obj.app!=="gybm-wordnote"){ return {ok:false,msg:"이 앱의 백업 코드가 아니에요."}; }
  let an=0, ac=0;
  if(Array.isArray(obj.notebook)){
    const cur=loadNote(), seen=new Set(cur.map(noteKey));
    obj.notebook.forEach(e=>{ if(e&&e.vn&&e.en&&!seen.has(noteKey(e))){ cur.push({vn:e.vn,en:e.en,lesson:e.lesson,type:e.type||"word",streak:e.streak||0}); seen.add(noteKey(e)); an++; } });
    saveNote(cur);
  }
  if(Array.isArray(obj.custom)){
    const cur=lsGet("_custom",[]), k=c=>lc2(c.vn)+"||"+lc2(c.en), seen=new Set(cur.map(k));
    obj.custom.forEach(c=>{ if(c&&c.vn&&c.en&&!seen.has(k(c))){ cur.push(c.eng?{vn:c.vn,en:c.en,eng:c.eng}:{vn:c.vn,en:c.en}); seen.add(k(c)); ac++; } });
    lsSet("_custom",cur); buildWords();
  }
  bkMark();   // 복원했으면 백업본이 있는 것 → 넛지 리셋
  return {ok:true,msg:`완료! 오답 노트 ${an}개, 내 단어 ${ac}개를 새로 합쳤어요. (이미 있던 건 그대로 유지)`};
}

        <button class="btn soft" data-action="downloadExport"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-save'/></svg> 파일로 저장</button>
      </div>
      <div class="muted tiny" style="margin-top:8px">복사해서 카톡으로 나에게 보내거나, 파일로 저장해 옮기세요.</div>

      <label class="fld" style="margin-top:18px">② 복원 (다른 기기에서 가져오기)</label>
      <textarea class="ta" id="importBox" placeholder="여기에 백업 코드를 붙여넣으세요"></textarea>
      <div class="btn2" style="margin-top:8px">
        <label class="btn soft" style="text-align:center;cursor:pointer;line-height:1.4"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-folder'/></svg> 파일 선택<input type="file" id="importFile" accept=".json,application/json" style="display:none"></label>

      </div>
      <div class="muted tiny" style="margin-top:8px">합치기 방식이라 <b>기존 데이터는 안 지워져요.</b></div>
    </div>
  `);
  const f=document.getElementById("importFile");
  if(f) f.addEventListener("change", e=>{

    r.readAsText(file);
  });
}

/* =========================================================
   클라우드 동기화 (선택 사항) — 로그인하면 어느 브라우저·기기에서든 단어장이 유지됨
   ⚠️ 아래 FIREBASE_CONFIG가 비어 있으면 로그인 UI가 아예 안 보이고,
      앱은 지금까지와 100% 동일하게(로컬 저장 · 로그인 없음 · 오프라인) 동작합니다.
   ⚠️ 이 설정값은 공개돼도 안전합니다(Firebase 웹 설정은 원래 공개용).
      실제 보안은 Firestore 보안 규칙이 담당 — 각자 자기 문서만 읽고 쓸 수 있게 해둘 것.
   ========================================================= */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC6PGnjRjRkN9zfBCspexURWH_IYKNzFlo",
  authDomain: "wordnote-db1dd.firebaseapp.com",
  projectId: "wordnote-db1dd",
  storageBucket: "wordnote-db1dd.firebasestorage.app",
  messagingSenderId: "1014229401303",
  appId: "1:1014229401303:web:b538e5606d2491604afa92"
};
const CLOUD = { on:false, user:null, auth:null, db:null, fns:null, busy:false };
function cloudConfigured(){ return !!(FIREBASE_CONFIG && FIREBASE_CONFIG.apiKey); }
function cloudData(){ return { notebook: loadNote(), custom: lsGet("_custom",[]), at: Date.now() }; }
/* 클라우드 데이터를 로컬에 '합치기'(기존 것 안 지움) — 백업 복원과 같은 방식 */
function mergeCloud(remote){
  if(!remote) return;
  if(Array.isArray(remote.notebook)){
    const cur=loadNote(), seen=new Set(cur.map(noteKey));
    remote.notebook.forEach(e=>{ if(e&&e.vn&&e.en&&!seen.has(noteKey(e))){ cur.push({vn:e.vn,en:e.en,lesson:e.lesson,type:e.type||"word",streak:e.streak||0}); seen.add(noteKey(e)); } });
    saveNote(cur);
  }
  if(Array.isArray(remote.custom)){
    const cur=lsGet("_custom",[]), k=c=>lc2(c.vn)+"||"+lc2(c.en), seen=new Set(cur.map(k));
    remote.custom.forEach(c=>{ if(c&&c.vn&&c.en&&!seen.has(k(c))){ cur.push(c.eng?{vn:c.vn,en:c.en,eng:c.eng}:{vn:c.vn,en:c.en}); seen.add(k(c)); } });
    lsSet("_custom",cur); buildWords();
  }
}
async function cloudInit(){
  if(!cloudConfigured() || CLOUD.on) return;
  try{
    const [a,b,c] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"),
      import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js")
    ]);
    const app = a.initializeApp(FIREBASE_CONFIG);
    CLOUD.auth = b.getAuth(app);
    CLOUD.db   = c.getFirestore(app);
    CLOUD.fns  = { GoogleAuthProvider:b.GoogleAuthProvider, signInWithPopup:b.signInWithPopup, signOut:b.signOut, doc:c.doc, getDoc:c.getDoc, setDoc:c.setDoc };
    CLOUD.on = true;
    b.onAuthStateChanged(CLOUD.auth, async (u)=>{
      CLOUD.user = u || null;
      if(u) await cloudSync();
      if(state.screen==="settings") renderSettings();
    });
  }catch(e){ CLOUD.on=false; }   // 인터넷 없음/차단 → 조용히 로컬 모드로 계속
}
async function cloudLogin(){
  try{
    if(!CLOUD.on) await cloudInit();
    if(!CLOUD.on){ alert("인터넷에 연결되어 있지 않아 로그인할 수 없어요. (앱은 그대로 쓸 수 있어요)"); return; }
    await CLOUD.fns.signInWithPopup(CLOUD.auth, new CLOUD.fns.GoogleAuthProvider());
  }catch(e){ alert("로그인이 취소되었거나 실패했어요."); }
}
async function cloudLogout(){
  try{ if(CLOUD.on) await CLOUD.fns.signOut(CLOUD.auth); }catch(e){}
  CLOUD.user=null; renderSettings();
}
/* 로그인 상태면: 클라우드 것을 내려받아 합치고 → 합쳐진 걸 다시 올림 */
async function cloudSync(){
  if(!CLOUD.on || !CLOUD.user || CLOUD.busy) return;
  CLOUD.busy = true;
  try{
    const { doc, getDoc, setDoc } = CLOUD.fns;
    const ref = doc(CLOUD.db, "users", CLOUD.user.uid);
    const snap = await getDoc(ref);
    if(snap.exists()) mergeCloud(snap.data());
    await setDoc(ref, cloudData());
    bkMark();   // 클라우드에 저장됨 → 백업 넛지 리셋
  }catch(e){}
  CLOUD.busy = false;
}
let cloudTimer = null;
/* ⚠️ 로컬에서 바뀐 걸 올릴 땐 **병합하면 안 됨**.
   cloudSync는 '클라우드→로컬 병합(union) 후 업로드'라서, 단어를 지운 직후 이걸 부르면
   클라우드에 남아 있던 그 단어가 **도로 살아남**(사용자 제보: "삭제가 안 돼요").
   → 로컬 변경은 그냥 덮어쓰기만. 병합은 로그인 시(cloudSync)에만. */
async function cloudPush(){
  if(!CLOUD.on || !CLOUD.user || CLOUD.busy) return;
  CLOUD.busy = true;
  try{
    const { doc, setDoc } = CLOUD.fns;
    await setDoc(doc(CLOUD.db, "users", CLOUD.user.uid), cloudData());
    bkMark();
  }catch(e){}
  CLOUD.busy = false;
}
function cloudSave(){   // 데이터가 바뀔 때 호출 (잠깐 모았다가 한 번에 올림)
  if(!CLOUD.on || !CLOUD.user) return;
  clearTimeout(cloudTimer);
  cloudTimer = setTimeout(cloudPush, 1200);
}

const L = { lesson:"all", q:"", hide:false, multi:false, pick:new Set() };
function goList(){ renderList(); }
/* 현재 단어장 필터(단원/검색)에 맞는 단어 목록 — 화면·Word 저장 공용 */
function curListWords(){
  let arr = WORDS.filter(w=>{
    if(L.lesson!=="all" && String(w.lesson)!==String(L.lesson)) return false;
    if(L.q){ const k=norm(L.q); if(!norm(w.vn).includes(k) && !norm(w.en).includes(k)) return false; }
    return true;
  });
  if(L.lesson==="all" && arr.some(w=>w.lesson==="custom")){
    const cu=arr.filter(w=>w.lesson==="custom"), rest=arr.filter(w=>w.lesson!=="custom");
    arr=[...cu,...rest];
  }
  return arr;
}
function curListLabel(){
  if(L.lesson==="all") return "전체";
  return lessonName(L.lesson);
}
function wordDocHtml(list, label, q, withLesson){
  const sub = q ? ` (검색: ${esc(q)})` : "";
  const head = withLesson
    ? `<tr><th style='width:42px;text-align:center'>번호</th><th style='width:96px'>단원</th><th>베트남어</th><th>한국어 뜻</th></tr>`
    : `<tr><th style='width:46px;text-align:center'>번호</th><th>베트남어</th><th>한국어 뜻</th></tr>`;
  const mean = w => esc(w.en) + (w.eng?`<div style='color:#777;font-size:10pt'>${esc(w.eng)}</div>`:"");   // 교재 영어 뜻이 있으면 작게 함께
  const rows = list.map((w,i)=> withLesson
    ? `<tr><td style='text-align:center'>${i+1}</td><td>${esc(lessonTag(w.lesson))}</td><td>${esc(w.vn)}</td><td>${mean(w)}</td></tr>`
    : `<tr><td style='text-align:center'>${i+1}</td><td>${esc(w.vn)}</td><td>${mean(w)}</td></tr>`
  ).join("");
  return `<!DOCTYPE html><html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>베트남어 단어 ${esc(label)}</title><style>body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;font-size:12pt;color:#222}h1{font-size:16pt;margin:0 0 4px}.meta{color:#666;font-size:10pt;margin:0 0 12px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #999;padding:6px 9px;vertical-align:top}th{background:#eee;text-align:left}</style></head><body><h1>베트남어 단어 · ${esc(label)}</h1><p class='meta'>${list.length}개${sub}</p><table>${head}${rows}</table></body></html>`;
}
function exportWordDoc(){
  const list = curListWords();
  if(!list.length){ alert("저장할 단어가 없어요. 단원이나 검색을 확인해 주세요."); return; }
  const label = curListLabel();
  const html = wordDocHtml(list, label, L.q);
  const fname = ("베트남어단어_"+label).replace(/[^0-9A-Za-z가-힣]+/g,"_").replace(/_+$/,"") + ".doc";
  try{
    const blob = new Blob(['﻿'+html], {type:'application/msword'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
  }catch(e){ alert("저장 중 문제가 생겼어요. 브라우저에서 다시 시도해 주세요."); }
}
function downloadDoc(html, fname){
  try{
    const blob = new Blob(['﻿'+html], {type:'application/msword'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
  }catch(e){ alert("저장 중 문제가 생겼어요. 브라우저에서 다시 시도해 주세요."); }
}
function docFileName(label){ return ("베트남어단어_"+label).replace(/[^0-9A-Za-z가-힣]+/g,"_").replace(/_+$/,"") + ".doc"; }

function pickedLabel(){

      </div>`;
  const heading = L.multi ? `모아 저장 · ${filt.length}개` : `단어장 · ${filt.length}개`;

          <span class="wen ${L.hide?"hide":""}">${esc(w.en)}</span>

let addStatusTimer=null;
function setAddStatus(html, cls, autoClearMs){
  const s=document.getElementById("addStatus");
  if(!s) return;
  if(addStatusTimer){ clearTimeout(addStatusTimer); addStatusTimer=null; }
  s.className="addstatus "+(cls||"");
  s.innerHTML=html||"";
  if(autoClearMs){
    addStatusTimer=setTimeout(()=>{
      const cur=document.getElementById("addStatus");
      if(cur){ cur.classList.add("fading"); }
      setTimeout(()=>{ const c2=document.getElementById("addStatus"); if(c2){ c2.className="addstatus"; c2.innerHTML=""; } }, 260);
      addStatusTimer=null;
    }, autoClearMs);
  }
}
const _icCheck="<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg>";
function goAdd(){ renderAdd(); }
function renderAdd(){
  state.screen="add";
  const custom = lsGet("_custom", []);
  set(`
    <button class="link" data-action="goHome">← 처음으로</button>

      <h2>내가 추가한 단어 · ${custom.length}개</h2>
      <div class="wlist">
        ${custom.length? custom.map((w,i)=>`<div class="wrow">
          <span class="wvn">${esc(w.vn)}</span>
          <span class="wen">${esc(w.en)}${w.eng?`<span style="display:block;font-size:11.5px;opacity:.75">${esc(w.eng)}</span>`:""}</span>
          <button class="del" data-action="delWord" data-i="${i}">×</button>
        </div>`).join("") : `<div class="muted center" style="padding:16px">아직 없어요.</div>`}
      </div>
    </div>
  `);
  const vnEl=document.getElementById("inVn"), enEl=document.getElementById("inEn"), engEl=document.getElementById("inEng");
  if(vnEl && enEl){
    // Enter: 베·한 둘 다 채워져 있으면 바로 추가, 아니면 다음 칸으로
    const onEnter=(e)=>{ if(e.key!=="Enter") return;
      e.preventDefault();
      if(vnEl.value.trim() && enEl.value.trim()) addWord();
      else if(!vnEl.value.trim()) vnEl.focus();
      else enEl.focus();
    };

function addWord(){
  const vn=(document.getElementById("inVn").value||"").trim();
  const en=(document.getElementById("inEn").value||"").trim();
  const engEl=document.getElementById("inEng");
  const eng=engEl?(engEl.value||"").trim():"";
  if(!vn||!en){ alert("단어와 한국어 뜻을 넣어주세요. (영어 뜻은 안 넣어도 돼요)"); return; }
  const custom = lsGet("_custom", []); custom.push(eng?{vn,en,eng}:{vn,en}); lsSet("_custom", custom);
  cloudSave();
  buildWords(); renderAdd();
  setAddStatus(_icCheck+" 추가됐어요", "ok", 1600);   // 잠깐 보였다 부드럽게 사라짐
}
function delWord(i){
  const custom = lsGet("_custom", []);
  const w = custom[Number(i)];
  if(!w) return;
  if(!confirm(`'${w.vn}' 을(를) 지울까요?`)) return;   // 실수로 눌러 지우는 것 방지
  custom.splice(Number(i),1); lsSet("_custom", custom);
  cloudSave();
  buildWords(); renderAdd();
  setAddStatus(`'${w.vn}' 지웠어요`, "ok", 1600);
}

/* ---------- 시험지 만들기 (인쇄·여럿이 함께) ---------- */
/* 우선출제: '오늘 배운 단어' = 13단원(오늘 배운 ★) + 아래 기존 단어들 */
const REVIEW_EXTRA = ["bận","đói","buồn ngủ","khác","nghĩ","về","tuy nhiên","nhưng","nhau","biết","ít","nhiều","sữa","chợ","chơi","cuối tuần","đến","trường","đại học","khoa học","xã hội","nhân văn","thành phố","Tây Ban Nha","đá","hàng ngày"];
const REVIEW_EXTRA_N = new Set(REVIEW_EXTRA.map(norm));
const isReviewWord = w => w.lesson===13 || REVIEW_EXTRA_N.has(norm(w.vn));
const P = { dir:"random", count:"all", format:"wordsent", version:0, wordQs:[], sentQs:[], priority:false, sentPick:new Set(), onePage:true };  /* sentPick: 시험지 문장범위 다중선택(빈 Set=전체) */
function rangeTitle(){
  if(state.selMode==="range"){ const [a,b]=rangeBounds(); return `${lessonLabel(WORDS[a].lesson)} ${WORDS[a].num}번 ~ ${lessonLabel(WORDS[b].lesson)} ${WORDS[b].num}번`; }
  const ls=[...state.lessons].filter(l=>l!=="custom").sort((a,b)=>a-b);
  return ls.length ? ls.map(l=> lessonName(l)).join(", ")+(state.lessons.has("custom")?", 내 단어":"") : "선택 범위";
}
// 시험지 / 정답지 따로 인쇄: body에 클래스 잠깐 붙여 한쪽만 보이게 한 뒤 print
function printOnly(which){
  const cls = which==="key" ? "ponly-key" : "ponly-paper";
  document.body.classList.add(cls);
  const cleanup = ()=>{ document.body.classList.remove(cls); window.removeEventListener("afterprint", cleanup); };
  window.addEventListener("afterprint", cleanup);
  window.print();
  setTimeout(cleanup, 1500);   // afterprint 미발화 브라우저 대비 백업
}
/* 문장이 교재 어디에 있는지 — 정답지에 표시.
   단원은 데이터에 있고, 회화(HỘI THOẠI)는 DIALOG_RAW와 대조해 대화 번호까지 알아냄.
   (쪽번호는 아직 데이터에 없음 — 넣으려면 문장마다 쪽을 달아야 함) */
function sentSource(vn, lesson, page){
  const k = norm(vn);
  for(const d of (DIALOGS[lesson]||[])){            // 회화면 대화 번호 + 그 쪽
    if(d.lines.some(ln=>norm(ln.vn)===k))
      return lessonLabel(lesson)+" 회화"+d.no + (d.page?" · "+d.page+"쪽":"");
  }
  return lessonLabel(lesson) + (page?" · "+page+"쪽":"");
}
function genPaper(bump){
  const rawPool = poolSelected();
  const lc = s => s.trim().toLowerCase();
  // 0) 우선출제 ON: '오늘 배운 단어'를 선택 범위에 없어도 함께 포함
  let basePool = rawPool.slice();
  if(P.priority){
    const have = new Set(basePool.map(w=>lc(w.vn)+"||"+lc(w.en)));
    WORDS.forEach(w=>{ const k=lc(w.vn)+"||"+lc(w.en); if(isReviewWord(w) && !have.has(k)){ basePool.push(w); have.add(k); } });
  }
  // 1) 같은 단어쌍 중복 제거 (책에서 여러 단원에 반복되는 동일 단어)
  const seenPair = new Set();
  let pool = basePool.filter(w=>{ const k=lc(w.vn)+"||"+lc(w.en); if(seenPair.has(k)) return false; seenPair.add(k); return true; });
  pool = shuffle(pool);
  // 우선출제 ON: '오늘 배운 단어'를 시험지 앞쪽으로
  if(P.priority){ pool = [...pool.filter(isReviewWord), ...pool.filter(w=>!isReviewWord(w))]; }
  if(bump || !P.version) P.version = (P.version||0)+1;
  // 2) 방향 배정 + 화면에 보이는 문제(단어) 중복 제거
  const seenPrompt = new Set();
  const qs = [];
  for(const w of pool){
    let d = P.dir==="random" ? (Math.random()<.5?"vn2en":"en2vn") : P.dir;
    const meaning = w.eng || w.en;   // 시험지 '뜻→베트남어'(en2vn)는 교재 영어 뜻(없으면 한국어). '베→뜻'(vn2en)은 한국어 유지
    let prompt = d==="vn2en" ? w.vn : meaning;
    if(seenPrompt.has(lc(prompt))){
      const d2 = d==="vn2en" ? "en2vn" : "vn2en";
      const p2 = d2==="vn2en" ? w.vn : meaning;
      if(P.dir==="random" && !seenPrompt.has(lc(p2))){ d=d2; prompt=p2; }  // 반대 방향으로 회피
      else continue;                                                        // 그래도 겹치면 제외
    }
    seenPrompt.add(lc(prompt));
    qs.push({ vn:w.vn, en:w.en, dir:d, prompt, answer:d==="vn2en"?w.en:w.vn });
  }
  // 단어 문제 수: 단어+문장 구성이면 40개, 단어만이면 선택한 문제 수
  const wordLimit = P.format==="wordsent" ? 40 : (P.count==="all" ? qs.length : Number(P.count));
  // 직접 출제(내가 타이핑한 문제)는 반드시 포함. 겹치는 자동문항은 빼고(중복 방지),
  // 자동문항 순서(우선출제 ★ 정렬)는 유지한 채 직접문항만 무작위 위치에 끼워 섞음.
  const cw = custQs(lsGet("_pcw",""));
  const cwVn = new Set(cw.map(q=>lc(q.vn)));
  const autoW = qs.filter(q=>!cwVn.has(lc(q.vn)));
  const wNeed = Math.max(0, wordLimit - cw.length);
  P.wordQs = mixCustom(autoW.slice(0, wNeed), cw);
  // 문장 문제 (단어+문장 구성일 때만 10개)
  if(P.format==="wordsent"){
    // 출처(몇 과인지)를 같이 달아둠 — 정답지에만 표시
    const withSrc = l => paperSents(l).map(s=>({...s, lesson:l}));
    const sentPool = P.sentPick.size ? sentLessons().filter(l=>P.sentPick.has(l)).flatMap(withSrc) : sentLessons().flatMap(withSrc);
    const cs = custQs(lsGet("_pcs",""));
    const csVn = new Set(cs.map(q=>lc(q.vn)));
    const sNeed = Math.max(0, 10 - cs.length);
    const autoPool = shuffle(sentPool).filter(s=>!csVn.has(lc(s.vn)));
    const autoS = autoPool.slice(0, Math.min(sNeed, autoPool.length)).map(s=>{
      const d = P.dir==="random" ? (Math.random()<.5?"vn2en":"en2vn") : P.dir;
      return { dir:d, prompt:d==="vn2en"?s.vn:s.en, answer:d==="vn2en"?s.en:s.vn, src:sentSource(s.vn, s.lesson, s.page) };
    });
    P.sentQs = mixCustom(autoS, cs);
  } else {
    P.sentQs = [];
  }
  renderPaper();
}
/* 직접 출제: "베트남어|한국어뜻" 한 줄에 하나. 뜻이 없으면 베→뜻 방향으로만 냄(정답칸은 비움).
   구분자는 '|' 하나만 — 베트남어 문장에 콜론(8:30 등)이 들어가도 안 깨지도록 콜론은 안 씀. */
function custParse(txt){
  return String(txt||"").split("\n").map(l=>{
    const i = l.indexOf("|");        // 구분자는 '|' 뿐(베트남어 본문의 콜론과 충돌 방지)
    const vn = (i<0 ? l : l.slice(0,i)).trim();
    const en = i<0 ? "" : l.slice(i+1).trim();
    return vn ? {vn, en} : null;
  }).filter(Boolean);
}
function custQs(txt){
  return custParse(txt).map(it=>{
    const d = it.en ? (P.dir==="random" ? (Math.random()<.5?"vn2en":"en2vn") : P.dir) : "vn2en";
    return { vn:it.vn, en:it.en, dir:d,
             prompt: d==="vn2en" ? it.vn : it.en,
             answer: d==="vn2en" ? it.en : it.vn,
             custom:true };
  });
}
/* 자동 문항 순서는 그대로 두고, 직접 출제 문항만 무작위 위치에 끼워 넣는다.
   (전체를 shuffle하면 '★ 오늘 배운 단어 먼저 출제' 정렬이 깨지므로 이렇게 섞는다.) */
function mixCustom(auto, cust){
  const out = auto.slice();
  cust.forEach(c=>{ out.splice(Math.floor(Math.random()*(out.length+1)), 0, c); });
  return out;
}

function bindPaperCustom(){
  [["pcw","_pcw"],["pcs","_pcs"]].forEach(([id,key])=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.value = lsGet(key,"") || "";
    el.addEventListener("input",  ()=>{ lsSet(key, el.value); });
    el.addEventListener("change", ()=>{ lsSet(key, el.value); paperKeep(()=>genPaper(false)); });
  });
}

  mode:(el)=>{ state.mode=el.dataset.v; lsSet("_mode",state.mode); renderHome(); },
  dir:(el)=>{ state.dir=el.dataset.v; lsSet("_dir",state.dir); renderHome(); },
  count:(el)=>{ state.count=el.dataset.v==="all"?"all":Number(el.dataset.v); lsSet("_count",state.count); refresh(); },
  listFilter:(el)=>{ L.lesson=el.dataset.l==="all"?"all":(el.dataset.l==="custom"?"custom":Number(el.dataset.l)); renderList(); },
  toggleHide:()=>{ L.hide=!L.hide; renderList(); },
  addWord, exportWord:exportWordDoc, exportPicked,
  toggleMulti:()=>{ L.multi=!L.multi; if(L.multi && L.pick.size===0 && L.lesson!=="all") L.pick.add(L.lesson); renderList(); },
  pickLesson:(el)=>{ const l=el.dataset.l==="custom"?"custom":Number(el.dataset.l); if(L.pick.has(l)) L.pick.delete(l); else L.pick.add(l); renderList(); },
  pickAll:()=>{ L.pick=new Set(lessonsList()); renderList(); },
  pickClear:()=>{ L.pick.clear(); renderList(); },
  delWord:(el)=>delWord(el.dataset.i),
  goNote, startNote, goBackup, goTelex, goVoice, goSettings, copyExport, downloadExport,
  snoozeBackup:()=>{ bkMark(); renderHome(); },
  cloudLogin, cloudLogout,
  pickVoice:(el)=>{ lsSet("_voiceURI", el.dataset.uri||""); renderVoice(); speak(TTS_SAMPLE,"vi-VN"); },
  testVoice:()=>{ speak(TTS_SAMPLE,"vi-VN"); },
  doImport:()=>{ const t=document.getElementById("importBox"); const res=importBackup(t?t.value:""); alert(res.msg); if(res.ok) renderBackup(); },
  removeNote:(el)=>{ const a=loadNote(); a.splice(Number(el.dataset.i),1); saveNote(a); renderNote(); },
  noteDir:(el)=>{ state.dir=el.dataset.v; lsSet("_dir",state.dir); renderNote(); },
  addNoteWord:()=>addNoteManual("word"),
  addNoteSent:()=>addNoteManual("sentence"),
  starWord:(el)=>{ const w=WORDS.find(x=>x.id===Number(el.dataset.id)); if(!w) return; if(noteHas(w)){ const a=loadNote().filter(e=>noteKey(e)!==noteKey(w)); saveNote(a); } else { noteAdd(w); } renderList(); },
  goSkill:(el)=>goSkill(el.dataset.skill), startSkill,
  setupDir:(el)=>{ state.dir=el.dataset.v; lsSet("_dir",state.dir); renderSetup(); },
  studyKind:(el)=>{ state.studyKind=el.dataset.v; lsSet("_skind",state.studyKind); renderSetup(); },
  dlgLesson:(el)=>{ state.dlgLesson=Number(el.dataset.l); state.dlgNo=1; lsSet("_dlgL",state.dlgLesson); lsSet("_dlgN",1); renderSetup(); },
  dlgNo:(el)=>{ state.dlgNo=Number(el.dataset.n); lsSet("_dlgN",state.dlgNo); renderSetup(); },
  dlgLevel:(el)=>{ state.dlgLevel=el.dataset.v; lsSet("_dlvl",state.dlgLevel); renderSetup(); },
  dlgPlayAll, dlgStop:()=>{ stopSpeak(); DLG.playing=false; view.querySelectorAll(".dline.now").forEach(el=>el.classList.remove("now")); },
  dlgHint:(el)=>{ dlgSaveInputs(); const li=Number(el.dataset.li); DLG.hint[li]=!DLG.hint[li]; renderDlg(); },
  // 전부 받아쓰기: 한국어 뜻 전체 보기/숨기기 (쓰던 내용은 그대로 유지)
  dlgKo:(el)=>{ const onSetup=String(state.screen).startsWith("setup"); if(!onSetup) dlgSaveInputs();
    state.dlgKo = el.dataset.v==="1"; lsSet("_ldlgko", state.dlgKo); onSetup?renderSetup():renderDlg(); },
  listenSent:(el)=>{ state.listenSent=el.dataset.v; lsSet("_lsent",state.listenSent); renderSetup(); },
  listenDlg:(el)=>{ state.listenDlg=el.dataset.v; lsSet("_ldlg",state.listenDlg); renderSetup(); },
  ctLesson:(el)=>{ state.ctLesson=Number(el.dataset.l); lsSet("_ctL",state.ctLesson); renderSetup(); },
  dlgGrade, dlgRetryWrong,
  dlgRetry:()=>{ stopSpeak(); if(DLG.kind==="ct") startCt(); else if(DLG.kind==="sent") startSentCloze(DLG.lines.map(l=>({vn:l.vn,en:l.ko})), DLG.lesson, DLG.srcLabel); else startDlg(); },
  dlgNext:()=>{ stopSpeak(); if(DLG.kind==="sent") nextSentCloze(); else dlgNextDialog(); },
  quitDlg:()=>{ stopSpeak(); DLG.playing=false; renderSetup(); },   // 홈이 아니라 '듣기 설정(단원·대화 선택)'으로
  sentMode:(el)=>{ state.sentMode = el.dataset.v; lsSet("_sbulk", state.sentMode); renderSetup(); },
  sentOrder:(el)=>{ state.sentOrder = el.dataset.v; lsSet("_sord", state.sentOrder); renderSetup(); },
  bulkReset:(el)=>{ bulkPosSet(Number(el.dataset.l), 0); renderSetup(); },   // 이어서 풀기 기록 지우기
  ordReset:(el)=>{ ordPosSet(Number(el.dataset.l), 0); renderSetup(); },   // 순서 배치 이어서 기록 지우기
  ordPick:(el)=>{ if(ORD.answered) return; const k=Number(el.dataset.k); const x=ORD.pool[k];
    if(!x || ORD.placed.some(p=>p.i===x.i)) return; ORD.placed.push(x); renderOrder(); },
  ordUnpick:(el)=>{ if(ORD.answered) return; ORD.placed.splice(Number(el.dataset.k),1); renderOrder(); },
  ordClear:()=>{ if(ORD.answered) return; ORD.placed=[]; renderOrder(); },
  ordShuffle:()=>{ if(ORD.answered) return; ORD.pool=shuffle(ORD.pool); renderOrder(); },
  ordCheck, ordNext,
  quitOrder:()=>{ renderSetup(); },
  bulkGrade, bulkNext,
  bulkToggle:(el)=>bulkToggle(el.dataset.i),
  quitBulk:()=>{ if(confirm("그만둘까요? 지금까지 채점한 결과를 보여드릴게요.")) renderBulkDone(); },
  studySentLesson:(el)=>{ state.sentLesson=Number(el.dataset.l); renderSetup(); },
  speakCard:()=>speak(SP.cards[SP.idx].vn,"vi-VN"),
  revealSpeak:()=>{ SP.revealed=true; renderSpeak(); },
  speakAgain:()=>speakAdvance(true),
  speakNext:()=>speakAdvance(false),
  speak:(el)=>speak(el.dataset.text, el.dataset.lang)
};
view.addEventListener("click", e=>{
  const t = e.target.closest("[data-action]");
  if(!t) return;
  const fn = actions[t.dataset.action];
  if(fn){ e.preventDefault(); fn(t, e); }
});
/* 좌상단 '베트남어 학습' = 어느 화면에서든 홈으로.
   (헤더는 #view 밖이라 위의 위임 리스너가 안 닿아서 따로 걸어줌) */
function bindBrand(){
  const b = document.querySelector(".topbar .brand");
  if(!b) return;
  b.title = "처음 화면으로";
  b.addEventListener("click", e=>{
    e.preventDefault();
    stopSpeak();                       // 읽던 소리(대화 전체 듣기 등) 멈추고
    if(state.screen === "home") return;  // 이미 홈이면 아무 것도 안 함
    goHome();
  });
}

/* =========================================================
   7) 시작!
   ========================================================= */
buildWords();
seedNote();
// 앱 시작 시 단원은 '전체 해제' 상태(아무 것도 선택 안 됨) — 시험지·홈 모두. 사용자가 필요한 단원만 골라 씀(사용자 요청 2026-07-03)
state.rStart = 0; state.rEnd = WORDS.length-1;
goHome();
bindZoom(); applyZoom();
bindBrand();        // 좌상단 '베트남어 학습' → 어느 화면에서든 홈으로
requestPersist();   // 브라우저에 '데이터 자동 삭제 하지 마' 요청
cloudInit();        // 클라우드 동기화(설정돼 있고 로그인돼 있으면 자동 복원) — 설정 없으면 아무 일도 안 함
</script>
</body>
</html>
