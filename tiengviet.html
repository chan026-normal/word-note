<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>베트남어 단어·문장 학습</title>
<meta name="description" content="단어·문장 공부 + 시험지 만들기">
<meta property="og:type" content="website">
<meta property="og:title" content="베트남어 단어·문장 학습">
<meta property="og:description" content="단어·문장 공부 + 시험지 만들기">
<meta property="og:url" content="https://chan026-normal.github.io/word-note/">
<meta property="og:site_name" content="베트남어 단어·문장 학습">

<!-- 홈 화면 앱(PWA): 아이콘·전체화면 -->
<meta name="theme-color" content="#5f6fa6">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="베트남어 학습">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1f2430; --muted:#6b7280;
    --line:#e6e9f0; --brand:#5f6fa6; --brand2:#7482b3; --brandsoft:#eceef6;
    --good:#3f885d; --goodsoft:#eaf3ed; --bad:#bd574f; --badsoft:#f6edeb;
    --accent:#418379; --accentsoft:#e6f0ee; --warn:#9a6a00; --warnsoft:#fff6e0; --shadow:0 6px 22px rgba(31,36,48,.07);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1320; --card:#191f30; --ink:#eef1f8; --muted:#9aa3b5;
      --line:#2a3145; --brand:#707bb0; --brand2:#7d88bb; --brandsoft:#272e46;
      --good:#56ad7d; --goodsoft:#17301e; --bad:#d77d75; --badsoft:#352020;
      --accent:#4f9c90; --accentsoft:#173430; --warn:#e3b85a; --warnsoft:#322a12; --shadow:0 6px 22px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* 폰에서 화면을 아래로 당겼다 놓으면 브라우저가 '새로고침'을 해버려서
     풀던 문제·진행상황이 다 날아감 → 당겨서 새로고침을 끔(스크롤은 그대로 됨). */
  html,body{margin:0;padding:0; overscroll-behavior-y:contain}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    padding-bottom:40px;
  }
  .topbar{
    position:sticky; top:0; z-index:10; background:var(--card);
    border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;
    padding:12px 16px;
  }
  .brand{
    font-size:18px; font-weight:800; color:var(--ink); background:none; border:none;
    cursor:pointer; padding:0; display:flex; align-items:center; gap:8px;
  }
  .zoomctl{display:flex; align-items:center; gap:3px; margin-left:auto}
  .zoomctl button{border:1.5px solid var(--line); background:var(--card); color:var(--ink); height:28px; min-width:28px; padding:0; border-radius:8px; font-weight:800; font-size:16px; line-height:1; cursor:pointer}
  .zoomctl button:active{transform:scale(.93)}
  .zoomctl button#zoomLbl{min-width:auto; padding:0 8px; font-size:11px; font-weight:700; color:var(--muted)}
  .wrap{max-width:680px; margin:0 auto; padding:16px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:18px; margin-bottom:14px}
  h2{font-size:15px; margin:0 0 12px; color:var(--muted); font-weight:700; letter-spacing:.2px}
  .row{display:flex; flex-wrap:wrap; gap:8px}
  .chip{
    border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    padding:8px 12px; border-radius:999px; font-size:14px; cursor:pointer; font-weight:600;
    transition:.12s; user-select:none;
  }
  .chip.on{background:var(--brandsoft); border-color:var(--brand); color:var(--brand)}
  .chip small{color:var(--muted); font-weight:500}
  .chip.on small{color:var(--brand)}
  .chip.mine{border-color:var(--accent); color:var(--accent)}
  .chip.mine.on{background:var(--accent); border-color:var(--accent); color:#fff}
  .seg{display:flex; gap:8px; flex-wrap:wrap}
  .seg button{
    flex:1; min-width:96px; border:1.5px solid var(--line); background:var(--card);
    color:var(--ink); padding:12px 10px; border-radius:14px; font-size:14px; font-weight:700;
    cursor:pointer; transition:.12s;
  }
  .seg button.on{background:var(--brand); border-color:var(--brand); color:#fff}
  .seg .desc{display:block; font-size:11px; font-weight:500; opacity:.8; margin-top:2px}
  .btn{
    width:100%; border:none; border-radius:16px; padding:16px; font-size:17px; font-weight:800;
    background:var(--brand); color:#fff; cursor:pointer; transition:.12s;
  }
  .btn:active{transform:scale(.99)}
  .btn.lg{padding:18px}
  .btn.ghost{background:var(--brandsoft); color:var(--brand)}
  .btn.soft{background:var(--card); border:1.5px solid var(--line); color:var(--ink)}
  .btn.line{background:none; border:1.5px solid var(--line); color:var(--muted); font-weight:700}
  .btn2{display:flex; gap:10px}
  .btn2 .btn{font-size:15px; padding:14px}
  .muted{color:var(--muted)}
  .center{text-align:center}
  .stat{display:flex; gap:14px; justify-content:center; margin-bottom:6px}
  .stat b{font-size:22px}
  .tiny{font-size:12px}
  .link{background:none;border:none;color:var(--brand);font-weight:700;cursor:pointer;font-size:14px;padding:6px}

  /* quiz */
  .qtop{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; font-size:13px; font-weight:700; color:var(--muted)}
  .bar{height:8px; background:var(--line); border-radius:999px; overflow:hidden; margin-bottom:16px}
  .bar > i{display:block; height:100%; background:linear-gradient(90deg,var(--brand),var(--brand2)); transition:width .25s}
  .dirtag{display:inline-block; font-size:12px; font-weight:700; color:var(--accent); background:color-mix(in srgb,var(--accent) 14%, transparent); padding:4px 10px; border-radius:999px; margin-bottom:14px}
  .prompt{font-size:34px; font-weight:800; text-align:center; margin:6px 0 4px; word-break:break-word; line-height:1.25}
  .prompt.sent{font-size:22px; line-height:1.4}
  .promptsub{text-align:center; color:var(--muted); font-size:13px; margin-bottom:18px}
  .opt{
    width:100%; text-align:left; border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    padding:15px 16px; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:10px;
    display:flex; align-items:center; gap:10px; transition:.1s;
  }
  .opt .num{width:24px;height:24px;flex:0 0 24px;border-radius:7px;background:var(--brandsoft);color:var(--brand);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .opt.correct{background:var(--goodsoft); border-color:var(--good); color:var(--good)}
  .opt.correct .num{background:var(--good);color:#fff}
  .opt.wrong{background:var(--badsoft); border-color:var(--bad); color:var(--bad)}
  .opt.wrong .num{background:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  input.answer{
    width:100%; padding:15px 16px; border:1.5px solid var(--line); border-radius:14px; font-size:18px;
    background:var(--card); color:var(--ink); outline:none; text-align:center; font-weight:600;
  }
  input.answer:focus{border-color:var(--brand)}
  textarea.answer{width:100%; padding:14px 16px; border:1.5px solid var(--line); border-radius:14px; font-size:17px; background:var(--card); color:var(--ink); outline:none; font-weight:600; resize:vertical; line-height:1.4; font-family:inherit; box-sizing:border-box}
  textarea.answer:focus{border-color:var(--brand)}
  .mycmp{background:var(--brandsoft); color:var(--ink); border-radius:12px; padding:10px 14px; margin-top:12px; font-size:15px; line-height:1.45}
  .mycmp b{color:var(--brand); margin-right:6px; font-size:12px; font-weight:800}
  .feedback{border-radius:14px; padding:14px 16px; margin-top:14px; font-weight:700; font-size:15px}
  .feedback.ok{background:var(--goodsoft); color:var(--good)}
  .feedback.no{background:var(--badsoft); color:var(--bad)}
  .feedback .ans{display:block; color:var(--ink); font-weight:800; font-size:20px; margin-top:4px}
  .spk{border:none;background:var(--brandsoft);color:var(--brand);width:38px;height:38px;border-radius:12px;cursor:pointer;font-size:17px;vertical-align:middle}
  .spk.sm{width:30px;height:30px;font-size:14px;border-radius:9px}

  /* 단어 순서 배치 (쓰기 → 문장 → 순서 배치) */
  .wline{min-height:52px; display:flex; flex-wrap:wrap; gap:7px; align-items:flex-start; align-content:flex-start;
    padding:11px; border-bottom:2px dashed var(--line); border-radius:10px; background:var(--bg)}
  .wpool{display:flex; flex-wrap:wrap; gap:7px; margin-top:14px}
  .wchip{border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    padding:9px 13px; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; transition:.12s; box-shadow:0 1px 0 var(--line)}
  .wchip:active{transform:scale(.96)}
  .wchip.placed{border-color:var(--brand); background:var(--brandsoft); color:var(--brand); box-shadow:none}
  .wchip.used{visibility:hidden}
  .wchip:disabled{cursor:default}

  /* 대화 빈칸 채우기 (듣기) */
  .dplay{display:flex; gap:8px; padding:12px 14px}
  .dplay .btn{margin:0; flex:1}
  .dlg{padding:4px 14px}
  .dline{display:flex; gap:10px; padding:11px 0; border-top:1px solid var(--line); border-radius:10px; transition:background .2s}
  .dline:first-child{border-top:0}
  .dline.now{background:var(--brandsoft)}
  .dwho{flex:0 0 auto; min-width:58px; font-weight:800; font-size:13px; color:var(--brand); padding-top:6px}
  .dbody{flex:1; min-width:0}
  .dtext{line-height:2.2; font-size:16px; word-break:break-word}
  input.dblank{display:inline-block; border:0; border-bottom:2px solid var(--brand); background:transparent;
    font:inherit; font-size:15px; font-weight:700; color:var(--ink); text-align:center; padding:0 2px; outline:none; border-radius:0}
  input.dblank:focus{background:var(--brandsoft)}
  .dblank.done{display:inline-block; min-width:40px; text-align:center; padding:0 4px; font-weight:800; border-bottom:2px solid var(--line)}
  .dblank.done.ok{color:var(--good); border-bottom-color:var(--good)}
  .dblank.done.tone{color:var(--warn); border-bottom-color:var(--warn)}
  .dblank.done.no{color:var(--bad); border-bottom-color:var(--bad); text-decoration:line-through}
  .dans{display:inline-block; margin-left:5px; color:var(--good); font-weight:800; font-size:15px}
  .dbtns{display:flex; gap:6px; align-items:center; margin-top:5px}
  .chip.tiny{padding:4px 10px; font-size:12px}
  .dhint{margin-top:5px; font-size:13.5px; color:var(--muted); line-height:1.5}
  /* 대화 전부 받아쓰기 — 줄 통째로 입력 */
  textarea.dfull{width:100%; padding:9px 11px; border:1.5px solid var(--line); border-radius:10px; font-size:15px;
    background:var(--card); color:var(--ink); outline:none; font-weight:600; resize:vertical; line-height:1.45;
    font-family:inherit; box-sizing:border-box}
  textarea.dfull:focus{border-color:var(--brand)}

  /* flashcard */
  .flash{
    perspective:1200px; height:240px; margin:8px 0 16px; cursor:pointer;
  }
  .flash-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d}
  .flash.flipped .flash-inner{transform:rotateY(180deg)}
  .face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:18px; border:1.5px solid var(--line);
    background:var(--card); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:16px;
  }
  .face .big{font-size:32px; font-weight:800; text-align:center; word-break:break-word}
  .face .lbl{font-size:12px; color:var(--muted); font-weight:700}
  .face.back{transform:rotateY(180deg); background:var(--brandsoft)}
  .face.back .big{color:var(--brand)}

  /* 홈 4영역 / 듣기 / 말하기 */
  .skillgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .skillcard{border:1.5px solid var(--line); background:var(--card); border-radius:18px; padding:15px; cursor:pointer; text-align:left; transition:.12s; display:flex; flex-direction:column; gap:5px; box-shadow:var(--shadow); color:var(--ink)}
  .skillcard:active{transform:scale(.985)}
  .skillcard .ic{font-size:28px; line-height:1}
  .skillcard .nm{font-size:17px; font-weight:800}
  .skillcard .ds{font-size:12px; color:var(--muted); line-height:1.45}
  .skillcard .tg{margin-top:3px; font-size:11px; font-weight:700; color:var(--brand); background:var(--brandsoft); padding:3px 9px; border-radius:999px; align-self:flex-start}
  /* 4영역 카드 — 색으로 구분하지 않고 아이콘·글자로만 (차분한 학습 톤) */
  .skillcard{box-shadow:none; border:1px solid var(--line)}
  .skillcard:active{background:var(--bg)}
  .skillcard .ic{color:var(--muted)}
  .skillcard .tg{color:var(--muted); background:var(--bg); font-weight:600}
  /* 홈 단어 검색바 */
  .hsearch{display:flex; align-items:center; gap:9px; background:var(--card); border:1.5px solid var(--line); border-radius:999px; padding:2px 15px; margin-bottom:12px}
  .hsearch .ic{color:var(--muted); flex:0 0 auto; font-size:18px}
  .hsearch input{flex:1; min-width:0; border:none; background:none; outline:none; color:var(--ink); font-size:15px; padding:11px 0; font-family:inherit}
  .hsearch input::placeholder{color:var(--muted)}
  #findResults:not(:empty){background:var(--card); border:1px solid var(--line); border-radius:14px; padding:4px 14px; margin-bottom:14px}
  /* 남부(교재)말 옆에 하노이말 병기 */
  .ntag{display:inline-block; margin-left:6px; font-size:10.5px; font-weight:600; color:var(--muted);
        border:1px solid var(--line); border-radius:5px; padding:0 5px; vertical-align:middle; white-space:nowrap}
  /* 문법 정리 */
  .gchips{margin-bottom:14px}
  .ghead{font-weight:800; font-size:15px; color:var(--brand); margin:4px 0 10px}
  .gcard{border:1px solid var(--line); border-radius:12px; padding:11px 13px; margin-bottom:9px; background:var(--card)}
  .gcard .gt{font-weight:800; font-size:15px; margin-bottom:3px}
  .gcard .gd{color:var(--muted); font-size:13.5px; line-height:1.55}
  /* 지문 해석 */
  .pgsec{margin-top:14px}
  .pghead{font-weight:800; font-size:14px; color:var(--brand); display:flex; align-items:center; gap:6px; margin-bottom:7px}
  .pgblock{border:1px solid var(--line); border-radius:12px; padding:6px 12px; margin-bottom:10px; background:var(--card)}
  .pgblabel{font-size:11.5px; font-weight:700; color:var(--muted); padding:5px 0 3px}
  .pgline{display:flex; gap:8px; padding:7px 0; border-top:1px solid var(--line)}
  .pgblock .pgblabel + .pgline, .pgblock > .pgline:first-child{border-top:none}
  .pgwho{flex:0 0 auto; min-width:44px; font-size:12px; font-weight:700; color:var(--accent)}
  .pgtxt{flex:1 1 auto; min-width:0}
  .pgvn{font-weight:600; line-height:1.45}
  .pgko{color:var(--muted); font-size:13px; line-height:1.4; margin-top:1px}
  /* 시험 대비 */
  .prepcta{display:flex; align-items:center; justify-content:space-between; width:100%;
           background:var(--brand); color:#fff; border:none; margin-bottom:10px; padding:14px 16px}
  .prepcta:hover{background:var(--brand2)}
  .prepcta-l{display:flex; align-items:center; gap:8px; font-weight:800; font-size:16px}
  .prepcta-sub{font-weight:600; font-size:12px; opacity:.85}
  .prepcta-dd{font-weight:800; font-size:17px; background:rgba(255,255,255,.2); padding:3px 10px; border-radius:999px}
  .prepdday{text-align:center; margin:6px 0 4px}
  .prepdday .ddbig{font-size:34px; font-weight:900; color:var(--brand); line-height:1.1}
  .prepdday .ddsub{font-size:12.5px; color:var(--muted); margin-top:2px}
  .prepbar{height:12px; background:var(--brandsoft); border-radius:999px; overflow:hidden}
  .prepbar-fill{height:100%; background:var(--good); border-radius:999px; transition:width .3s}
  .prepstat{display:flex; gap:6px; margin-top:12px}
  .prepstat>div{flex:1; text-align:center; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 4px}
  .prepstat .pnum{display:block; font-size:20px; font-weight:900}
  .prepstat .pnum.good{color:var(--good)} .prepstat .pnum.muted{color:var(--muted)}
  .prepstat .plab{display:block; font-size:11px; color:var(--muted); margin-top:1px}
  .prephead{display:flex; justify-content:space-between; font-weight:700; font-size:13px; margin-bottom:8px}
  .plesson{font-size:12px; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; gap:6px}
  .pdots{display:inline-flex; gap:3px}
  .pdot{width:8px; height:8px; border-radius:50%; background:var(--line)}
  .pdot.on{background:var(--good)}
  .pprompt{font-size:26px; font-weight:800; text-align:center; padding:14px 8px 4px; line-height:1.3}
  .quizbar{height:6px; background:var(--brandsoft); border-radius:999px; overflow:hidden; margin-bottom:12px}
  .quizbar-in{height:100%; background:var(--brand); border-radius:999px; transition:width .3s}
  .prepans{text-align:center; padding:6px 0}
  .pres{display:inline-block; font-weight:800; font-size:14px; padding:3px 12px; border-radius:999px; margin-bottom:8px}
  .pres.good{color:var(--good); background:var(--goodsoft)}
  .pres.warn{color:var(--warn); background:var(--warnsoft)}
  .pres.bad{color:var(--bad); background:var(--badsoft)}
  .pavn{font-size:24px; font-weight:800; margin:2px 0}
  .prepbig{font-size:40px; font-weight:900; color:var(--brand); margin:6px 0}
  /* 개수 배지 */
  .btn.rowbtn{display:flex; align-items:center; gap:9px; text-align:left}
  .badge{margin-left:auto; background:var(--brandsoft); color:var(--brand); font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px}
  .secrow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px}
  .listenbox{display:flex; flex-direction:column; align-items:center; gap:10px; padding:14px 0 2px}
  .bigspk{width:104px; height:104px; border-radius:50%; border:none; background:var(--brandsoft); color:var(--brand); font-size:42px; cursor:pointer; transition:.12s}
  .bigspk:active{transform:scale(.96)}
  .listenhint{font-size:13px; color:var(--muted)}

  /* word list */
  .search{width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:14px; font-size:15px; background:var(--card); color:var(--ink); outline:none; margin-bottom:12px}
  textarea.pcustbox{min-height:62px; resize:vertical; font-family:inherit; font-size:14px; line-height:1.55; margin-bottom:0}
  .ta{width:100%; min-height:88px; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px; font-size:12px; font-family:ui-monospace,Menlo,Consolas,monospace; background:var(--bg); color:var(--ink); outline:none; resize:vertical; word-break:break-all}
  .ta:focus{border-color:var(--brand)}
  .tgrid{display:flex; flex-wrap:wrap; gap:8px; margin-top:2px}
  .trow{flex:1 1 150px; display:flex; align-items:center; gap:8px; background:var(--bg); border-radius:10px; padding:9px 12px}
  .tk{font-family:ui-monospace,Menlo,Consolas,monospace; font-weight:800; color:var(--brand); white-space:nowrap}
  .tar{color:var(--muted)}
  .tr{font-weight:600; font-size:14px}
  .wlist{display:flex; flex-direction:column; gap:0}
  .wrow{display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line)}
  .wrow:last-child{border-bottom:none}
  .wvn{font-weight:700; font-size:16px}
  .wen{color:var(--muted); margin-left:auto; text-align:right; font-size:15px}
  .wen.hide{filter:blur(6px); transition:.15s}
  .wrow:hover .wen.hide{filter:none}
  .lz{font-size:11px;color:var(--brand);background:var(--brandsoft);padding:2px 7px;border-radius:6px;font-weight:700}
  .lz.mine{color:var(--accent);background:var(--accentsoft)}
  .addstatus{font-size:12.5px; font-weight:700; margin:8px 0 0; min-height:17px; display:flex; align-items:center; gap:5px; transition:opacity .25s ease}
  .addstatus.fading{opacity:0}
  .addstatus.ok{color:var(--good)}
  /* 손가락으로 누르기 편하게 44px (30px는 잘 안 눌렸음) */
  .del{border:none;background:var(--badsoft);color:var(--bad);border-radius:10px;width:44px;height:40px;cursor:pointer;font-weight:800;font-size:17px;flex:0 0 auto}
  .del:active{background:var(--bad);color:#fff}
  .star{border:none;background:none;cursor:pointer;font-size:20px;line-height:1;color:var(--muted);padding:2px 4px;flex:0 0 auto}
  .star.on{color:#e2a900}
  .notedot{font-size:11px;letter-spacing:1px;color:var(--brand);flex:0 0 auto}
  label.fld{display:block; font-size:13px; font-weight:700; color:var(--muted); margin:10px 0 6px}
  .foot{text-align:center; color:var(--muted); font-size:12px; padding:18px}
  .emoji{font-size:46px; text-align:center; margin-bottom:6px}

  /* 범위 지정 / select */
  .sel{padding:11px 12px; border:1.5px solid var(--line); border-radius:12px; font-size:15px; background:var(--card); color:var(--ink); font-weight:600; width:100%}
  .row2{display:grid; grid-template-columns:1fr 1.5fr; gap:8px}
  .rsum{margin-top:12px; background:var(--brandsoft); color:var(--brand); border-radius:12px; padding:10px 12px; font-size:13px; font-weight:600}
  .btn.accent{background:var(--accent); color:#fff}
  .keyrow{display:flex; align-items:center; gap:8px; cursor:pointer; font-size:14px; font-weight:700; color:var(--ink); margin-top:14px}
  .keyrow input{width:18px; height:18px}

  /* 시험지 (인쇄용) — 항상 흰 종이 느낌 유지 */
  .paper{background:#fff; color:#111; border:1px solid var(--line); border-radius:14px; padding:24px; margin-top:14px}
  .ptitle{font-size:20px; font-weight:800; text-align:center; color:#111}
  .pver{font-size:13px; color:#777; font-weight:700}
  .phead{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin:14px 0; font-size:14px; color:#222}
  .pinstr{font-size:12.5px; color:#333; background:#f3f4f6; border-radius:8px; padding:9px 11px; margin-bottom:16px; line-height:1.6}
  /* 직접 출제 표시(연필) + 범례 — 시험지·정답지에 인쇄됨 */
  .pcust{width:.8em; height:.8em; margin-left:2px; vertical-align:baseline; opacity:.85; stroke-width:2.4}
  .plegend{display:flex; align-items:center; gap:4px; font-size:11px; color:#444; margin:-10px 0 14px}
  .paper.onepage .plegend{font-size:9.5px; margin:-4px 0 6px}
  .pgrid{display:grid; grid-template-columns:1fr; gap:9px 28px}
  .pq{display:flex; align-items:baseline; gap:7px; font-size:14.5px; color:#111; break-inside:avoid; padding:2px 0}
  .pqn{color:#777; font-weight:700; min-width:26px}
  .pqp{font-weight:700; white-space:nowrap}
  .pqtag{font-size:10px; color:#999; white-space:nowrap}
  .pqline{flex:1; border-bottom:1px dotted #aaa; min-width:50px; align-self:flex-end; height:15px}
  /* 정답지: 시험지와 같은 밑줄 칸에 정답을 채워 넣음(초록) */
  .pqline.answ{height:auto; align-self:auto; color:#1a7a4f; font-weight:700; padding-left:8px; white-space:normal; line-height:1.35}
  .ppart{margin:20px 0 6px; font-size:15px; font-weight:800; color:#111; border-bottom:2px solid #bbb; padding-bottom:5px}
  .pslist{display:flex; flex-direction:column; gap:15px}
  .psq{break-inside:avoid}
  .psq .pqn{display:inline-block}
  .psp{font-weight:700; font-size:14.5px; color:#111}
  .psline{border-bottom:1px solid #aaa; height:26px; margin-top:7px}
  .psline.answ{height:auto; min-height:22px; color:#1a7a4f; font-weight:700; font-size:13px; padding-bottom:2px; line-height:1.4}
  /* 정답지에만 붙는 출처(몇 과·회화 몇 번) — 시험지 본지엔 없음 */
  .psrc{margin-left:6px; font-size:10.5px; color:#777; font-weight:600; white-space:nowrap}
  .pkeygrid{display:grid; grid-template-columns:1fr 1fr; gap:5px 20px; margin-top:8px}
  /* 2열일 때 세로(열 방향) 채우기: 왼쪽 1~N 내려간 뒤 오른쪽. --prows = ceil(문항수/2) */
  .pkeygrid.colflow{grid-auto-flow:column; grid-template-rows:repeat(var(--prows,20),auto)}
  .pkq{font-size:13px; color:#111; break-inside:avoid}
  .pkq b{color:#777; font-weight:700}
  .pkq i{font-style:normal; color:#1a7a4f; font-weight:700}   /* 정답 강조 */
  .pkey{ margin-top:14px }
  @media (min-width:560px){ .pgrid{grid-template-columns:1fr 1fr; grid-auto-flow:column; grid-template-rows:repeat(var(--prows,20),auto)} }
  @page{ margin:0; }   /* 브라우저 자동 머리글·바닥글(날짜·페이지번호·주소) 제거 */
  @media print{
    .topbar,.foot,.noprint{display:none !important}
    body{background:#fff; margin:0; padding:0}
    .wrap{max-width:none; padding:0; zoom:1 !important}   /* 화면 확대는 인쇄에 영향 없게 */
    .paper{border:none; border-radius:0; margin:0; padding:16mm 14mm}  /* 여백은 직접 부여 */
    .pgrid{grid-template-columns:1fr 1fr; grid-auto-flow:column; grid-template-rows:repeat(var(--prows,20),auto)}
    .pq{break-inside:avoid}
    .pkey{ break-before:page; page-break-before:always; margin-top:0 }   /* 정답지는 새 페이지에 */
    .paper.onepage{ padding:7mm 11mm }   /* 한 장에 맞춤: 인쇄 여백도 축소 */
    html.ios .paper.onepage{ zoom:0.9 }   /* 아이폰 사파리: @page margin:0 무시로 여백이 강제돼 2장이 되는 것 방지 — 살짝 축소해 1장 유지(갤럭시·크롬은 무영향) */
    /* 따로 인쇄: 한쪽만 보이게 */
    body.ponly-paper .pkey{ display:none !important }
    body.ponly-key .paper:not(.pkey){ display:none !important }
    body.ponly-key .pkey{ break-before:auto !important; page-break-before:auto !important; margin-top:0 !important }  /* 정답지만 인쇄 시 빈 첫 장 방지 */
  }
  /* A4 한 장에 맞춤 — 글씨·간격 압축 모드 */
  .paper.onepage .ptitle{font-size:15px}
  .paper.onepage .phead{margin:5px 0; font-size:11.5px}
  .paper.onepage .pinstr{font-size:10.5px; padding:5px 8px; margin-bottom:7px}
  .paper.onepage .pgrid{gap:2px 22px}
  .paper.onepage .pq{font-size:11.5px; padding:0}
  .paper.onepage .pqline{height:12px}
  .paper.onepage .ppart{margin:7px 0 2px; font-size:12px; padding-bottom:2px}
  .paper.onepage .pslist{gap:3px}
  .paper.onepage .psp{font-size:11.5px}
  .paper.onepage .psline{height:14px; margin-top:2px}
  .paper.onepage .pkeygrid{gap:3px 16px}
  .paper.onepage .pkq{font-size:11px}
  /* 정답지(밑줄에 정답) 압축: 채워진 줄 높이·줄간격 더 좁힘 */
  .paper.onepage .pqline.answ{line-height:1.15; padding-left:6px}
  .paper.onepage .psline.answ{min-height:0; font-size:11px; padding-bottom:1px; line-height:1.2; margin-top:1px}
  .paper.onepage .psrc{font-size:9px; margin-left:4px}
  /* 인라인 SVG 라인 아이콘 (이모지 대체). 크기는 부모 font-size(1em)에 따름 */
  .ic{width:1em; height:1em; display:inline-block; vertical-align:-.14em; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex:none}
  .skillcard .ic{stroke-width:1.7}
  /* ===== 3a 홈 리디자인 ===== */
  .seclbl{font-size:11px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; color:var(--muted); margin:0 2px 10px}
  .h-hero{display:flex; align-items:center; gap:15px}
  .h-ring{width:88px; height:88px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center}
  .h-ring > div{width:64px; height:64px; border-radius:50%; background:var(--card); display:flex; flex-direction:column; align-items:center; justify-content:center}
  .h-ring b{font-size:19px; font-weight:900; line-height:1}
  .h-ring b small{font-size:11px; color:var(--muted); font-weight:800}
  .h-ring > div > span{font-size:9.5px; color:var(--muted); margin-top:1px}
  .h-cont{flex:1; min-width:0}
  .h-cont .t{font-size:15px; font-weight:800; margin-bottom:2px}
  .h-cont .d{font-size:12.5px; color:var(--muted); line-height:1.45; margin-bottom:11px}
  .h-resume{display:inline-flex; align-items:center; gap:7px; background:var(--brand); color:#fff; font-weight:800; font-size:13px; padding:9px 15px; border-radius:12px; border:none; cursor:pointer}
  .h-resume:active{transform:scale(.98)}
  .h-week{display:flex; justify-content:space-between}
  .h-week .dcol{display:flex; flex-direction:column; align-items:center; gap:5px}
  .h-week .dl{font-size:10px; color:var(--muted); font-weight:700}
  .h-week .dcol.tdy .dl{color:var(--brand)}
  .h-week .dd{width:24px; height:24px; border-radius:8px; background:var(--line); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#fff}
  .h-week .dd.on{background:var(--good)}
  .h-week .dd.today{background:var(--brand); box-shadow:0 0 0 3px var(--brandsoft)}
  .softgrid{display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:20px}
  .softtile{border:1px solid var(--line); background:var(--card); border-radius:18px; padding:15px; cursor:pointer; text-align:left; display:flex; flex-direction:column; gap:9px; color:var(--ink); transition:.12s}
  .softtile:active{background:var(--bg)}
  .softtile .st-ic{width:42px; height:42px; border-radius:12px; background:var(--brandsoft); color:var(--brand); display:flex; align-items:center; justify-content:center; font-size:21px}
  .softtile .st-nm{font-size:16px; font-weight:800}
  .softtile .st-ds{font-size:12px; color:var(--muted)}
  .h-banner{display:block; width:100%; text-align:left; background:var(--brand); color:#fff; border:none; border-radius:18px; padding:16px 18px; cursor:pointer; margin-bottom:14px}
  .h-banner:active{transform:scale(.995)}
  .h-banner .bt{display:flex; align-items:center; justify-content:space-between}
  .h-banner .bt .l{display:flex; align-items:center; gap:8px; font-weight:800; font-size:16px}
  .h-banner .bt .dd{font-weight:800; font-size:15px; background:rgba(255,255,255,.2); padding:3px 11px; border-radius:999px}
  .h-banner .bbar{height:7px; background:rgba(255,255,255,.25); border-radius:999px; overflow:hidden; margin:13px 0 9px}
  .h-banner .bbar > i{display:block; height:100%; background:#fff; border-radius:999px}
  .h-banner .bsub{display:flex; align-items:center; justify-content:space-between; font-size:12.5px; opacity:.92}
  .lcard{background:var(--card); border-radius:18px; box-shadow:var(--shadow); padding:8px 14px; margin-bottom:16px}
  .lrow{display:flex; align-items:center; gap:12px; padding:17px 2px; cursor:pointer; width:100%; background:none; border:none; text-align:left; color:var(--ink); font:inherit}
  .lrow:active{background:var(--bg)}
  .lrow .lr-ic{color:var(--brand); font-size:19px}
  .lrow .lr-nm{font-weight:700; font-size:14.5px}
  .lrow .lr-meta{margin-left:auto; font-size:12px; color:var(--muted)}
  .lrow .lr-meta.badge2{color:var(--brand); background:var(--brandsoft); padding:2px 9px; border-radius:999px; font-weight:700}
  .lrow .lr-chev{color:var(--muted); font-size:16px}
</style>
</head>

   (다음 마커가 나올 때까지 유지). 문장마다 쪽을 일일이 안 적어도 되게 한 것.
   `#122-123` 처럼 범위도 됨(표시는 그대로 "122-123쪽").
   `#133 ct` 처럼 뒤에 **ct**를 붙이면 그 구간이 **받아쓰기(Chính tả) 지문**이라는 뜻

const SENT_BY_LESSON = {};
Object.keys(SENT_RAW).forEach(L=>{
  let page = null, ct = false, rd = false;
  SENT_BY_LESSON[L] = SENT_RAW[L].trim().split("\n").map(line=>{
    const pm = line.match(/^#\s*([0-9]+(?:\s*-\s*[0-9]+)?)\s*(ct|rd)?\s*$/);
    if(pm){ page = pm[1].replace(/\s+/g,""); ct = pm[2]==="ct"; rd = pm[2]==="rd"; return null; }   // 쪽(+받아쓰기 ct / 읽기 rd) 마커 줄
    let lr=false; if(line.charAt(0)==="@"){ lr=true; line=line.slice(1); }
    const i=line.indexOf("|"); if(i<0) return null;
    return {vn:line.slice(0,i).trim(), en:line.slice(i+1).trim(), lr, page, ct, rd};
  }).filter(s=>s&&s.vn&&s.en);
});
const sentLessons = () => Object.keys(SENT_BY_LESSON).map(Number).sort((a,b)=>a-b);
const rdSents = l => (SENT_BY_LESSON[l]||[]).filter(s=>s.rd);        // 읽기 지문(ĐỌC HIỂU)
const rdLessons = () => sentLessons().filter(l => rdSents(l).length);

const ctSents = l => (SENT_BY_LESSON[l]||[]).filter(s=>s.ct);
const ctLessons = () => sentLessons().filter(l => ctSents(l).length);

const allSentences = () => sentLessons().flatMap(l => SENT_BY_LESSON[l] || []);

const allPaperSentences = () => sentLessons().flatMap(l => paperSents(l));

function _dkey(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }

function logStudy(n){ n=Number(n)||0; if(n<=0) return; const s=lsGet("_stats",{})||{}; const k=_dkey(new Date()); s[k]=(s[k]||0)+n; lsSet("_stats",s); }
function studyStreak(){ const s=lsGet("_stats",{})||{}; const t=new Date(); let cur=new Date(t.getFullYear(),t.getMonth(),t.getDate()); if(!(s[_dkey(cur)]>0)) cur.setDate(cur.getDate()-1); let n=0; for(let i=0;i<400;i++){ if(s[_dkey(cur)]>0){ n++; cur.setDate(cur.getDate()-1); } else break; } return n; }
function weekDots(){ const s=lsGet("_stats",{})||{}; const now=new Date(); const base=new Date(now.getFullYear(),now.getMonth(),now.getDate()); const dow=(base.getDay()+6)%7; const mon=new Date(base); mon.setDate(base.getDate()-dow); const labels=["월","화","수","목","금","토","일"]; const tk=_dkey(base); const out=[]; for(let i=0;i<7;i++){ const dt=new Date(mon); dt.setDate(mon.getDate()+i); const k=_dkey(dt); out.push({label:labels[i], done:(s[k]>0), today:(k===tk)}); } return out; }

let WORDS = [];
function buildWords(){
  WORDS = []; let id = 0;
  Object.keys(RAW).forEach(L=>{
    RAW[L].trim().split("\n").forEach(line=>{
      line = line.trim(); if(!line) return;
      const i = line.indexOf("|"); if(i<0) return;
      const vn = line.slice(0,i).trim(), en = line.slice(i+1).trim();
      if(vn && en) WORDS.push({id:id++, lesson:Number(L), vn, en, eng: ENG_MAP[L+"||"+norm(vn)] || ""});
    });
  });
  lsGet("_custom", []).forEach(c=>{
    // eng(영어 뜻)은 선택 — 있으면 검색·시험지 en2vn에서 교재 단어와 똑같이 쓰임
    if(c.vn && c.en) WORDS.push({id:id++, lesson:"custom", vn:c.vn, en:c.en, eng: c.eng || ""});
  });
  // 단원 내 번호(num)와 전체 순서(gi) 부여 — 범위 지정에 사용
  const cnt = {};
  WORDS.forEach((w,i)=>{ w.gi = i; cnt[w.lesson] = (cnt[w.lesson]||0)+1; w.num = cnt[w.lesson]; });
}
function lessonsList(){
  const nums=[...new Set(WORDS.filter(w=>typeof w.lesson==="number").map(w=>w.lesson))].sort((a,b)=>a-b);
  if(WORDS.some(w=>w.lesson==="custom")) nums.push("custom");
  return nums;
}

/* =========================================================
   4) 도우미 함수
   ========================================================= */
function stripDia(s){
  return s.normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/đ/g,"d").replace(/Đ/g,"D");
}
function norm(s){
  return stripDia(String(s).toLowerCase())
    .replace(/[().,/;:!?'"’]/g," ")
    .replace(/\s+/g," ").trim();
}
function acceptable(answer){
  const set = new Set();
  const add = v => { const n=norm(v); if(n) set.add(n); };
  const stripLead = v => v.replace(/^(to|a|an|the)\s+/i,"");
  answer.split(/[,;/]/).map(x=>x.trim()).filter(Boolean).concat(answer).forEach(v=>{
    add(v); add(stripLead(v));
    const noParen = v.replace(/\([^)]*\)/g," ").trim();   // 괄호 내용 제거 버전
    add(noParen); add(stripLead(noParen));
    (v.match(/\d+/g)||[]).forEach(n=>add(n));             // 답에 든 숫자만 입력해도 정답 (예: "숫자 15"→"15")
  });
  return set;
}
function isCorrectTyped(answer, input){
  const ni = norm(input); if(!ni) return false;
  const set = acceptable(answer);
  if(set.has(ni)) return true;
  return set.has(ni.replace(/^(to|a|an|the)\s+/,""));
}

  "oè":"òe","oé":"óe","oẻ":"ỏe","oẽ":"õe","oẹ":"ọe",
  "uỳ":"ùy","uý":"úy","uỷ":"ủy","uỹ":"ũy","uỵ":"ụy"

function canonTone(s){ return String(s).normalize("NFC").replace(/o[àáảãạèéẻẽẹ]|u[ỳýỷỹỵ]/g, m => TONEPOS[m] || m); }
function normTone(s){ return canonTone(String(s).toLowerCase()).replace(/[().,/;:!?'"’]/g," ").replace(/\s+/g," ").trim(); }
function acceptableTone(answer){
  const set=new Set();
  const add=v=>{ const n=normTone(v); if(n) set.add(n); };
  answer.split(/[,;/]/).map(x=>x.trim()).filter(Boolean).concat(answer).forEach(v=>{ add(v); add(v.replace(/\([^)]*\)/g," ").trim()); });
  return set;
}
function checkVnTyped(answer, input){
  if(!normTone(input)) return "no";
  if(acceptableTone(answer).has(normTone(input))) return "ok";   // 성조까지 정확
  if(isCorrectTyped(answer, input)) return "tone";               // 성조 빼면 맞음 → 성조만 틀림
  return "no";
}
/* 뜻 조각(콤마/슬래시로 구분)을 각각 정규화해서 반환 */
function meaningTokens(s){ return String(s).split(/[,;/]/).map(t=>norm(t)).filter(Boolean); }
function meaningsOverlap(a, b){ const A=new Set(meaningTokens(a)); return meaningTokens(b).some(t=>A.has(t)); }
/* 같은/겹치는 한국어 뜻을 가진 다른 베트남어도 정답 인정
   (예: 뜻 "매우, 아주" → rất·lắm 모두 정답 / 뜻 "얼마, 몇" 인데 mấy(몇) 입력 → "몇" 겹침 → 정답) */
function checkVnAny(promptKo, expectedVn, input){
  const target = norm(promptKo);
  const cands = new Set([expectedVn]);
  if(northOf(expectedVn)) cands.add(northOf(expectedVn));   // 교재는 남부말(trễ)이지만 하노이말(muộn)로 써도 정답
  WORDS.forEach(x=>{ if(norm(x.en)===target){ cands.add(x.vn); if(northOf(x.vn)) cands.add(northOf(x.vn)); } });
  let best = "no";
  for(const vn of cands){
    const r = checkVnTyped(vn, input);
    if(r==="ok") return "ok";
    if(r==="tone") best = "tone";
  }
  // 뜻이 겹치는(부분 일치) 실제 교재 단어면 그 베트남어도 정답 인정
  for(const x of WORDS){
    if(cands.has(x.vn)) continue;
    if(!meaningsOverlap(x.en, promptKo)) continue;
    const r = checkVnTyped(x.vn, input);
    if(r==="ok") return "ok";
    if(r==="tone") best = "tone";
  }
  return best;
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function ttsProblem(){

function viVoices(){ return VOICES.filter(v => (v.lang||"").toLowerCase().replace("_","-").startsWith("vi")); }
function ttsRate(){ const r = Number(lsGet("_rate", 0.9)); return (r>=0.5 && r<=2) ? r : 0.9; }
/* 베트남어일 때만 사용자가 고른 음성 적용. 한국어 등은 OS 기본 음성 사용.
   ⚠️ 자동 선택은 '기기에 설치된(오프라인)' 음성 우선 — 온라인(network) 음성은 버퍼링으로 끊길 수 있음 */
function pickedVoice(lang){
  if(!(lang||"").toLowerCase().startsWith("vi")) return null;
  const vs = viVoices(); if(!vs.length) return null;
  const uri = lsGet("_voiceURI","");
  if(uri){ const f = vs.find(v=>v.voiceURI===uri); if(f) return f; }
  const enh = v => /enhanced|premium|neural|natural|nâng cao/i.test(v.name);
  const local = v => v.localService !== false;
  return vs.find(v=>local(v) && enh(v)) || vs.find(local) || vs.find(enh) || vs[0];
}
/* TTS 전용 발음 교정 — 화면 글자는 그대로 두고 '소리'만 바꿈.
   베트남어 음성이 외국 이름(한국·영어)을 이상하게 읽는 걸 완화. 필요하면 여기 줄만 추가하면 됨. */
const TTS_FIX = [
  [/\bEun\s*Ji\b/gi, "Ưn Chi"],   // 은지
  [/\bJane\b/gi, "Chên"],          // 제인 — 베트남어 음성이 '자이'로 읽던 것
];
function ttsText(text, lang){
  if(!(lang||"").toLowerCase().startsWith("vi")) return text;   // 베트남어 재생일 때만 교정
  let t = String(text);
  TTS_FIX.forEach(([re, rep]) => { t = t.replace(re, rep); });
  return t;
}

/* 끊김 방지 2종:
   ① cancel() 직후 바로 speak()하면 크롬(특히 맥)에서 소리가 씹힘 → 짧게 지연 + 시퀀스 토큰으로 중복 재생 차단
   ② 크롬은 긴 문장을 도중에 멈추는 버그가 있음 → 재생 중 주기적으로 pause/resume해 깨움 */
let TTS_KEEP = null, TTS_SEQ = 0;
/* ⚠️ '긴 문장 중간에 멈춤'은 **PC 크롬만의 버그**. 폰(안드로이드·아이폰)엔 없음.
   폰에서 pause()/resume()을 돌리면 오히려 '멈춤 상태로 굳어' 그 뒤로 전부 무음이 됨
   (동기들 제보: "되다가 갑자기 안 돼"). → 그래서 keep-alive는 PC에서만 씀. */
const IS_MOBILE = /Android|iPhone|iPad|iPod|Mobile/i.test((navigator.userAgent||""));
/* 아이폰/아이패드 감지 — 사파리는 인쇄 시 @page margin:0을 무시해 여백을 강제하므로, 한 장 압축이 넘쳐 2장이 됨. iOS에서만 인쇄를 살짝 축소해 1장 유지(html.ios). */
const IS_IOS = /iPad|iPhone|iPod/i.test(navigator.userAgent||"") || (navigator.platform==="MacIntel" && (navigator.maxTouchPoints||0)>1);
try{ if(IS_IOS) document.documentElement.classList.add("ios"); }catch(e){}
function ttsKeepStop(){
  if(TTS_KEEP){ clearInterval(TTS_KEEP); TTS_KEEP = null; }
  // 혹시 '멈춤'으로 굳었으면 반드시 풀어줌 — 안 풀면 이후 speak()이 전부 조용히 쌓이기만 함
  try{ if(window.speechSynthesis && speechSynthesis.paused) speechSynthesis.resume(); }catch(e){}
}
/* PC 크롬에서만, 그것도 실제로 재생 중일 때만 깨워줌 */
function ttsKeepStart(){
  if(IS_MOBILE) return;
  TTS_KEEP = setInterval(()=>{
    try{
      if(!speechSynthesis.speaking){ ttsKeepStop(); return; }
      if(speechSynthesis.paused){ speechSynthesis.resume(); return; }   // 이미 멈춰 있으면 풀기만
      speechSynthesis.pause(); speechSynthesis.resume();
    }catch(e){ ttsKeepStop(); }
  }, 8000);
}
function speak(text, lang){
  try{
    if(!window.speechSynthesis) return;
    if(!VOICES.length) loadVoices();
    ttsKeepStop();
    // ⚠️ 아이폰(사파리)은 '누른 그 순간'에 speak()이 호출돼야 소리가 남.
    //    setTimeout으로 미루면 조용히 무시됨 → 아무 소리도 안 나옴.
    //    그래서 '이미 말하던 중'일 때만 지연(맥 크롬 씹힘 방지), 아니면 바로 재생.
    const busy = speechSynthesis.speaking || speechSynthesis.pending;
    speechSynthesis.cancel();
    const my = ++TTS_SEQ;
    const go = ()=>{
      if(my !== TTS_SEQ) return;   // 그 사이 새 재생 요청이 왔으면 이 건은 버림(중복·겹침 방지)
      try{
        try{ if(speechSynthesis.paused) speechSynthesis.resume(); }catch(e){}   // 굳어 있으면 풀고 시작
        const u = new SpeechSynthesisUtterance(ttsText(text, lang));
        u.lang = lang || "en-US";
        u.rate = ttsRate();
        const v = pickedVoice(lang); if(v){ u.voice = v; u.lang = v.lang; }
        u.onend = ttsKeepStop; u.onerror = ttsKeepStop;
        speechSynthesis.speak(u);
        ttsKeepStart();
      }catch(e){}
    };

  }catch(e){}
}
/* 여러 줄을 순서대로 재생 (대화 '전체 듣기'). onLine(i)로 지금 읽는 줄을 표시 */
function speakLines(texts, onLine, onDone){
  try{
    if(!window.speechSynthesis) return;
    if(!VOICES.length) loadVoices();
    ttsKeepStop();
    const busy = speechSynthesis.speaking || speechSynthesis.pending;   // 아이폰: 누른 순간 speak해야 소리 남
    speechSynthesis.cancel();
    const my = ++TTS_SEQ;
    const go = ()=>{
      if(my !== TTS_SEQ) return;
      try{
        try{ if(speechSynthesis.paused) speechSynthesis.resume(); }catch(e){}   // 굳어 있으면 풀고 시작
        const v = pickedVoice("vi-VN"), r = ttsRate();
        texts.forEach((t, i)=>{
          const u = new SpeechSynthesisUtterance(ttsText(t, "vi-VN"));
          u.lang = "vi-VN"; u.rate = r;
          if(v){ u.voice = v; u.lang = v.lang; }
          u.onstart = ()=>{ if(my===TTS_SEQ && onLine) try{ onLine(i); }catch(e){} };
          if(i === texts.length-1){
            u.onend = ()=>{ ttsKeepStop(); if(my===TTS_SEQ && onDone) try{ onDone(); }catch(e){} };
            u.onerror = ttsKeepStop;
          }
          speechSynthesis.speak(u);
        });
        ttsKeepStart();
      }catch(e){}
    };
    if(busy) setTimeout(go, 80); else go();
  }catch(e){}
}

   ⚠️ 교재가 가르치는 포인트를 정리한 것. 데이터(SENT_RAW·RAW)는 안 건드림.

    { t:"không phải là — ~이 아니다", d:"「A + không phải là + 명사」. 그냥 không이 아니라 phải là 를 붙여요." },
    { t:"~, phải không? — ~이죠?", d:"문장 끝에 붙여 확인. 예: Anh là người Úc, phải không? (호주 사람이죠?)" },
    { t:"A của B — B의 A", d:"소유는 「A của B」. **어순이 한국어와 반대**예요. 예: bạn của David = David의 친구." },

/* =========================================================
   시험 대비 (8/1 1200단어 시험) — 간격 반복 + 생산형(한→베) 연습
   · 단어마다 숙련도 0~3(3=마스터). 맞히면 +1, 틀리면 0 → 약한 단어에 시간이 저절로 몰림.
   · 진도(_srs)는 각자 폰에 저장(개인). 단어 자체는 코드라 동기 전원 공유.
   ========================================================= */
const PREP_EXAM = { y:2026, m:8, d:1 };   // 시험일 2026-08-01(토)
const SRS_MAX = 3;                        // 3번 연속 맞히면 '마스터'
function prepDaysLeft(){
  const exam = new Date(PREP_EXAM.y, PREP_EXAM.m-1, PREP_EXAM.d);
  const n = new Date(); const t = new Date(n.getFullYear(), n.getMonth(), n.getDate());
  return Math.round((exam - t)/86400000);
}
function prepDlabel(){ const d=prepDaysLeft(); return d>0?("D-"+d):(d===0?"D-DAY":"시험 후"); }
const srsKey = w => w.lesson + "|" + normTone(w.vn);
const srsAll = () => lsGet("_srs", {}) || {};
const srsLv = w => Number(srsAll()[srsKey(w)] || 0);
function srsRec(w, ok){
  const a = srsAll(), k = srsKey(w), cur = Number(a[k]||0);
  const lv = ok ? Math.min(SRS_MAX, cur+1) : 0;
  if(lv>0) a[k]=lv; else delete a[k];
  lsSet("_srs", a);
}
const prepDeck = () => WORDS;                         // 전체 단어장(교재 609 + 내 단어)
const prepCounts = () => { const d=prepDeck(); let m=0,f=0,z=0;
  d.forEach(w=>{ const l=srsLv(w); if(l>=SRS_MAX) m++; else if(l>0) f++; else z++; });
  return { total:d.length, master:m, familiar:f, fresh:z }; };

const PREP = { queue:[], idx:0, typed:"", graded:false, res:"", correct:0, leveled:0, sessN:20 };
function goPrep(){ renderPrep(); }
function renderPrep(){
  state.screen = "prep";
  const c = prepCounts();
  const pct = c.total ? Math.round(c.master/c.total*100) : 0;
  const dleft = prepDaysLeft();
  set(`
    <button class="link" data-action="goHome">← 처음으로</button>
    <div class="card">
      <h2><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-target'/></svg> 시험 대비</h2>
      <div class="prepdday">
        <div class="ddbig">${esc(prepDlabel())}</div>
        <div class="ddsub">8월 1일(토) 1200단어 시험까지${dleft>0?` · ${dleft}일 남음`:""}</div>
      </div>
      <div class="muted tiny" style="margin:4px 0 12px">한국어 뜻을 보고 <b>베트남어를 성조까지 직접 써내는</b> 연습이에요. 실제 시험처럼요.</div>

      <div class="prepbar" title="마스터 진도">
        <div class="prepbar-fill" style="width:${pct}%"></div>
      </div>
      <div class="prepstat">
        <div><span class="pnum good">${c.master}</span><span class="plab">마스터</span></div>
        <div><span class="pnum">${c.familiar}</span><span class="plab">익히는 중</span></div>
        <div><span class="pnum muted">${c.fresh}</span><span class="plab">아직</span></div>
        <div><span class="pnum">${c.total}</span><span class="plab">전체</span></div>
      </div>

      <button class="btn" style="width:100%;margin-top:14px" data-action="prepStart"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-pencil'/></svg> 오늘 공부 시작 (${PREP.sessN}단어)</button>
      <div class="muted tiny" style="margin-top:9px">약한 단어부터 나와요. 맞히면 마스터에 가까워지고, 틀리면 다시 나옵니다. <b>매일 한 번씩</b>만 해도 큰 차이가 나요.</div>
    </div>
    ${c.master>=c.total && c.total>0 ? `<div class="card" style="text-align:center">🎉 전체 단어를 마스터했어요! 이제 복습만 반복하면 돼요.</div>` : ""}
    <button class="btn line" style="margin-top:6px" data-action="goHome"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-home'/></svg> 처음으로</button>
  `);
}
function prepStart(){
  const deck = prepDeck();
  if(!deck.length){ alert("먼저 단어가 있어야 해요."); return; }
  const weak = deck.filter(w=>srsLv(w)<SRS_MAX);
  const base = weak.length ? weak : deck.slice();     // 다 마스터했으면 전체에서 복습
  const byLevel = base.slice().sort((a,b)=>srsLv(a)-srsLv(b));   // 약한(낮은 숙련도) 우선
  PREP.queue = shuffle(byLevel.slice(0, Math.min(PREP.sessN, byLevel.length)));
  PREP.idx=0; PREP.typed=""; PREP.graded=false; PREP.res=""; PREP.correct=0; PREP.leveled=0;
  renderPrepQuiz();
}
function renderPrepQuiz(){
  const w = PREP.queue[PREP.idx];
  if(!w){ renderPrepDone(); return; }
  state.screen = "prepq:"+PREP.idx;
  const n = PREP.idx+1, tot = PREP.queue.length;
  const lvNow = srsLv(w);
  const dots = Array.from({length:SRS_MAX},(_,i)=>`<span class="pdot${i<lvNow?" on":""}"></span>`).join("");
  let body;
  if(!PREP.graded){
    body = `

function prepGrade(){
  if(PREP.graded) return;
  const inp = document.getElementById("prepInput");

  const w = PREP.queue[PREP.idx];
  const g = PREP.typed ? checkVnAny(w.en, w.vn, PREP.typed) : "no";
  PREP.res = g;
  if(g==="ok"){ PREP.correct++; if(srsLv(w)<SRS_MAX) PREP.leveled++; srsRec(w,true); }
  else if(g==="tone"){ /* 성조만 틀림 = 마스터 진행 안 함(시험엔 성조 필요), 리셋도 안 함 */ }

/* 읽기 화면 '단어 찾기' — 입력하면 몇 과 몇 번인지 + 뜻 + 발음 (화면 재생성 없이 결과만 갱신) */
/* 문장 안에서 그 낱말(구)이 '낱말 단위'로 나오는지.
   ① 부분일치가 아니라 낱말 일치 → 'đi'가 'điện' 안에 걸리는 오탐 방지.
   ② strict=true면 성조까지 비교 → 'đừng'(하지 마)이 이름 'Dung'에 걸리는 오탐 방지.
      성조까지로 하나도 못 찾으면 호출부에서 성조 무시로 한 번 더 찾음(성조 없이 타이핑해도 나오게). */
function sentHasTerm(sentVn, term, strict){
  const N = strict ? normTone : norm;
  const words = N(sentVn).split(" ").filter(Boolean);
  const t = N(term).split(" ").filter(Boolean);
  if(!t.length) return false;
  for(let i=0; i+t.length<=words.length; i++){
    let ok=true;
    for(let j=0;j<t.length;j++) if(words[i+j]!==t[j]){ ok=false; break; }
    if(ok) return true;
  }
  return false;
}
/* 찾은 낱말을 문장 안에서 굵게 */
function markTerms(vn, terms, strict){
  const N = strict ? normTone : norm;
  const set = new Set();
  terms.forEach(t=>N(t).split(" ").filter(Boolean).forEach(x=>set.add(x)));
  return vn.split(/(\s+)/).map(tok=>{
    const bare = N(tok);
    return (bare && set.has(bare)) ? `<b style="color:var(--brand)">${esc(tok)}</b>` : esc(tok);
  }).join("");
}
/* 검색어(또는 찾아진 단어)가 들어간 교재 문장·대화 줄 모으기 */
function findSentences(terms, limit, strict){
  const out=[], seen=new Set();
  const push=(vn,en,label)=>{
    const k=norm(vn); if(seen.has(k)) return; seen.add(k);
    out.push({vn,en,label});
  };
  for(const l of sentLessons()){
    for(const s of (SENT_BY_LESSON[l]||[])){
      if(out.length>=limit) return out;
      if(terms.some(t=>sentHasTerm(s.vn,t,strict))) push(s.vn, s.en, lessonLabel(l));
    }
  }
  for(const l of dialogLessons()){
    for(const d of (DIALOGS[l]||[])){
      for(const ln of d.lines){
        if(out.length>=limit) return out;
        if(terms.some(t=>sentHasTerm(ln.vn,t,strict))) push(ln.vn, ln.ko, lessonLabel(l)+" 대화"+d.no);
      }
    }
  }
  return out;
}
function bindFind(){
  const inp=document.getElementById("findInput"); if(!inp) return;
  const res=document.getElementById("findResults");
  const LIMIT=25;
  const render=()=>{
    const k=norm(inp.value);
    if(!k){ res.innerHTML=""; return; }   // 비어 있으면 결과창도 숨김(홈이 깔끔하게)
    // 베트남어 · 한국어 뜻 · 교재 영어 뜻(eng) 모두로 검색
    // 정확히 일치 → 그 말로 시작 → 포함 순으로 정렬 (안 그러면 'đi' 검색에 điện·đường이 37개 먼저 떠서
    //  아래의 '교재 문장'이 파묻힘)
    // 성조까지 맞는 것 → 성조 빼고 맞는 것 → 시작하는 것 → 포함하는 것
    // (성조를 안 보면 'đừng' 검색에 'đúng'(맞다)이 먼저 떠서 헷갈림)
    const kT=normTone(inp.value);
    const rank=w=>{
      const vT=normTone(w.vn);
      if(vT===kT) return 0;
      const n=northOf(w.vn);
      if(n && normTone(n)===kT) return 0;              // 하노이말로 찾아도 바로 위에
      const v=norm(w.vn), e=norm(w.en), g=w.eng?norm(w.eng):"";
      if(e===k||g===k) return 1;
      if(v===k) return 2;
      if(vT.startsWith(kT)) return 3;
      if(v.startsWith(k)||e.startsWith(k)||g.startsWith(k)) return 4;
      return 5;
    };
    // ⚠️ 낱말 '중간'에 걸리는 것 제외 — 낱말이 시작하는 자리에서만 일치로 봄.
    //   안 그러면 'đi'(성조 떼면 di)가 diligent 안에 걸려 chăm chỉ가, 'hả'(ha)가 chăm 안에 걸려 또 chăm chỉ가 나옴.
    //   (norm이 쉼표·괄호를 공백으로 바꿔주므로 공백 기준으로 나눠 비교)
    const startsHit=(text,q)=>{
      if(!text||!q) return false;
      const t=norm(text);
      if(q.includes(" ")) return t.startsWith(q) || t.includes(" "+q);   // 여러 낱말 검색 (ngân hàng)
      return t.split(" ").some(tok=>tok.startsWith(q));                  // 한 낱말 검색 (đi → đi học ○ / chăm ✗)
    };
    const engHit=w=>{
      if(!w.eng) return false;
      const t=" "+norm(w.eng)+" ";
      if(t.includes(" "+k+" ")) return true;           // 낱말 통째로 (bank → bank)
      return k.length>=4 && startsHit(w.eng, k);       // 4글자 이상이면 낱말 앞부분도 (teach → teacher)
    };
    const northHit=w=>{ const n=northOf(w.vn); return !!n && startsHit(n,k); };   // 하노이말(muộn)로 쳐도 교재 단어(trễ)가 나오게
    const all=WORDS.filter(w=>startsHit(w.vn,k)||startsHit(w.en,k)||engHit(w)||northHit(w))
                   .map(w=>({w,r:rank(w)})).sort((a,b)=>a.r-b.r).map(x=>x.w);
    const WMAX=8;
    const hits=all.slice(0,WMAX), more=all.length-hits.length;

    // 이 단어가 나오는 교재 문장 — 좁은 것부터 차례로 시도해서 엉뚱한 단어가 딸려오지 않게
    //  ① 입력 그대로 + 성조까지 정확히   (đừng → đúng/Dung 안 걸림, mới → mời 안 걸림)
    //  ② 없으면: 검색된 단어의 베트남어로 + 성조까지  (뜻·영어로 찾은 경우: 은행/bank → ngân hàng)
    //  ③ 그래도 없으면: 성조 무시로 완화  (성조 없이 타이핑한 경우: ngoai ngu → ngoại ngữ)
    const raw = inp.value.trim();
    const vns = [...new Set(hits.slice(0,6).map(w=>w.vn))];
    let terms=[raw], strict=true;
    let sents=findSentences(terms, LIMIT, true);
    if(!sents.length && vns.length){ terms=vns; sents=findSentences(terms, LIMIT, true); }
    if(!sents.length){ strict=false; terms=[raw, ...vns].filter(Boolean); sents=findSentences(terms, LIMIT, false); }

    const wordBlock = hits.length
      ? hits.map(w=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 2px;border-top:1px solid var(--line)">
          <span style="flex:0 0 auto;font-size:12px;font-weight:700;color:var(--brand);background:var(--brandsoft);padding:2px 7px;border-radius:6px;white-space:nowrap">${esc(lessonLabel(w.lesson))}${w.num?" "+w.num+"번":""}</span>
          <span style="flex:1 1 38%;font-weight:700">${esc(w.vn)}${northTag(w.vn)}</span>
          <span style="flex:1 1 42%;color:var(--muted);font-size:13px">${esc(w.en)}${w.eng?`<span style="display:block;font-size:11.5px;opacity:.75">${esc(w.eng)}</span>`:""}</span>
          ${spkBtn(w.vn,"vi-VN",true)}
        </div>`).join("") + (more>0?`<div class="muted tiny" style="padding:6px 2px">비슷한 단어 ${more}개 더 있어요 — 더 정확히 입력해 보세요.</div>`:"")
      : `<div class="muted tiny" style="padding:6px 2px">'${esc(inp.value)}' 은(는) 단어장에 없어요. (교재 단어가 아닐 수 있어요)</div>`;

    const sentBlock = sents.length
      ? `<div style="margin-top:12px;border-top:2px solid var(--line);padding-top:9px">
          <div class="muted tiny" style="font-weight:800;margin-bottom:4px">
            <svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-book'/></svg>
            이 단어가 나오는 교재 문장 ${sents.length}${sents.length>=LIMIT?"+":""}개
          </div>
          ${sents.map(s=>`<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 2px;border-top:1px solid var(--line)">
            <span style="flex:0 0 auto;font-size:11px;font-weight:700;color:var(--muted);background:var(--bg);padding:2px 6px;border-radius:6px;white-space:nowrap;margin-top:2px">${esc(s.label)}</span>
            <span style="flex:1;min-width:0">
              <span style="font-weight:600;line-height:1.45">${markTerms(s.vn, terms, strict)}</span>
              <span style="display:block;color:var(--muted);font-size:12.5px;margin-top:2px">${esc(s.en)}</span>
            </span>
            ${spkBtn(s.vn,"vi-VN",true)}
          </div>`).join("")}
        </div>`
      : (hits.length ? `<div class="muted tiny" style="margin-top:10px">교재 문장에는 아직 안 나와요.</div>` : "");

    res.innerHTML = wordBlock + sentBlock;
  };
  inp.addEventListener("input", render);
  render();
}

    ${dirSeg}
    ${countSeg}
    <button class="btn lg" data-action="startSkill">${s.emoji} ${(isBulk && bookOrder && bulkPosGet(state.sentLesson||sentLessons()[0])>0)?`${bulkPosGet(state.sentLesson||sentLessons()[0])*10+1}번부터 이어서 풀기`:(isOrder && bookOrder && ordPosGet(state.sentLesson||sentLessons()[0])>0)?`${ordPosGet(state.sentLesson||sentLessons()[0])+1}번째부터 이어서 배치`:studyCt?"받아쓰기 시작":studyDlg?(dlgFull?"대화 받아쓰기 시작":"대화 빈칸 채우기 시작"):listenSentCloze?"문장 빈칸 채우기 시작":s.label+" 시작하기"}</button>
  `);
  bindSelection();
}
function startSkill(){
  const s=SKILLS[state.skill];
  state.mode=s.mode;
  if(state.skill==="exam") state.dir="random";   // 실전시험만 랜덤 고정, 나머지는 setup에서 고른 방향 사용
  const kindable = ["read","write","listen","speak"].includes(state.skill);
  const useSent = kindable && state.studyKind==="sent";
  // 듣기 = 대화 / 문장 / 받아쓰기(교재 Chính tả). 단어 받아쓰기는 없앰(2026-07-12)
  if(state.skill==="listen"){
    if(state.studyKind==="ct"){ startCt(); return; }
    if(useSent){ startSentQueue("listen"); return; }
    startDlg(); return;
  }
  // 읽기·쓰기·말하기 — 문장으로 공부
  if(useSent){ startSentQueue(state.skill); return; }
  // 단어로 공부 (기존)
  const pool=poolSelected();
  if(pool.length===0){ alert("먼저 ① 에서 공부할 범위를 한 개 이상 골라주세요."); return; }
  if(s.mode==="flash"){ startFlash(pool); return; }
  if(s.mode==="exam"){ startExam(pool); return; }
  if(s.mode==="speak"){ startSpeak(pool); return; }
  let q=shuffle(pool);
  if(state.count!=="all") q=q.slice(0, Math.min(Number(state.count), q.length));
  Q.queue=q.map(w=>makeQ(w, dirOf(state.dir)));
  Q.idx=0; Q.score=0; Q.wrong=[]; Q.wordCount=null; Q.sentCount=null;
  setupQ(); renderQuiz();
}
/* 받아쓰기 문제: 소리=베트남어, 답=베트남어, 뜻(en)은 정답 공개 때만 보여줌 */
function listenWordQ(w){ return { type:"word", word:w, dir:"listen", dictation:true, prompt:w.vn, answer:w.vn, meaning:w.en }; }
function listenSentQ(x, lbl){ return { type:"sentence", word:{vn:x.vn, en:x.en, lesson:lbl}, dir:"listen", dictation:true, prompt:x.vn, answer:x.vn, meaning:x.en }; }
/* 문장으로 공부 — 읽기(읽고 뜻 보기)·쓰기(번역)·듣기(받아쓰기)·말하기(따라 말하기) */
function startSentQueue(skill){
  const l = state.sentLesson || sentLessons()[0];
  const pool = SENT_BY_LESSON[l]||[];
  if(!pool.length){ alert("이 단원에 문장이 없어요."); return; }
  const lbl = "L"+l+" 문장";
  // 쓰기+문장은 '교재 순서'를 고를 수 있음 — 순서를 지키면 '이어서 풀기'가 가능해짐
  const keepOrder = (skill==="write" && state.sentOrder==="book");
  let arr = keepOrder ? pool.slice() : shuffle(pool);
  // 쓰기: 여러 문제(시험지처럼) — 전체를 10개씩 나눠 품. 교재 순서면 지난번에 멈춘 곳부터 이어서
  if(skill==="write" && state.sentMode==="bulk"){
    startSentBulk(arr, lbl, l, keepOrder ? bulkPosGet(l) : 0); return;
  }
  // 쓰기: 단어 순서 배치 — 교재 순서면 지난번 멈춘 곳부터 이어서(진행상황 기억). 전체 arr를 넘겨 안에서 잘라 씀
  if(skill==="write" && state.sentMode==="order"){ startSentOrder(arr, lbl, l, keepOrder); return; }
  if(state.count!=="all") arr = arr.slice(0, Math.min(Number(state.count), arr.length));
  if(skill==="speak"){ startSpeak(arr.map(x=>({vn:x.vn, en:x.en, lesson:lbl})), true); return; }   // 말하기: SP 사용
  if(skill==="listen" && state.listenSent==="cloze"){ startSentCloze(arr, l, lbl); return; }   // 듣기: 문장 빈칸 채우기
  if(skill==="listen"){ state.mode="listen"; Q.queue=arr.map(x=>listenSentQ(x, lbl)); }
  else if(skill==="read"){ state.mode="read"; Q.queue=arr.map(x=>({type:"sentence", word:{vn:x.vn,en:x.en,lesson:lbl}, dir:"vn2en", prompt:x.vn, answer:x.en})); }
  else { state.mode="type"; Q.queue=arr.map(x=>makeQ({vn:x.vn,en:x.en,lesson:lbl}, dirOf(state.dir), "sentence")); }   // 쓰기: 번역+자동/자가채점
  Q.idx=0; Q.score=0; Q.wrong=[]; Q.wordCount=null; Q.sentCount=null;
  setupQ(); renderQuiz();
}

/* =========================================================
   대화 빈칸 채우기 (듣기) — 교재 회화를 듣고 빈칸을 채움
   빈칸 = 그 단원 '핵심 단어' 우선, 모자라면 일반 낱말. 풀 때마다 자리가 달라짐.
   채점은 성조까지(실제 시험 기준). 성조만 틀리면 경고로 알려줌.
   ========================================================= */
const DLG = { kind:"dlg",         // dlg=교재 대화 / sent=문장 빈칸 채우기 (같은 화면·채점 재사용)
              lesson:1, no:1, level:"normal", lines:[], nb:0, ans:{}, res:{}, graded:false, score:0, hint:{}, playing:false,
              locked:new Set(),   // 이미 맞힌 빈칸(다시 풀 때 그대로 채워둠)
              retry:0 };          // 0=처음 / 1↑=틀린 것만 다시 푸는 중 (횟수)
const dlgAllBlanks = () => DLG.lines.flatMap(l=>l.blanks);
/* 낱말/구분자로 쪼갬 — 원문(성조·대소문자)을 그대로 보존해 다시 붙일 수 있게 */
function dlgTokens(s){
  const out=[]; const re=/[0-9A-Za-zÀ-ỹĐđ%]+|[^0-9A-Za-zÀ-ỹĐđ%]+/g; let m;
  while((m=re.exec(String(s)))) out.push(m[0]);
  return out;
}
const isWordTok = t => /^[0-9A-Za-zÀ-ỹĐđ%]+$/.test(t);
/* 빈칸 후보 단어 — tier 0 = 그 단원에서 새로 배운 단어(핵심), tier 1 = 앞 단원 복습 단어 */
function dlgVocab(lesson){
  return WORDS.filter(w => typeof w.lesson==="number" && w.lesson<=lesson && w.vn)
              .map(w => ({vn:w.vn, en:w.en, key:normTone(w.vn), tier: w.lesson===lesson ? 0 : 1}))
              .filter(x => x.key.length>=2);
}
/* 한 줄에 뚫을 빈칸 개수 */
function dlgBlankCount(nWords, level){
  if(nWords<2) return 0;
  if(level==="easy")   return 1;
  if(level==="hard")   return Math.max(2, Math.round(nWords*0.45));
  return Math.max(1, Math.min(3, Math.round(nWords*0.25)));
}
/* 한 줄을 parts(문자열 조각 + 빈칸)로 쪼갬 */
function dlgBuildLine(vn, vocab, level, startIdx){
  const toks = dlgTokens(vn);
  const wi = [];                                  // 낱말 토큰의 인덱스들
  toks.forEach((t,i)=>{ if(isWordTok(t)) wi.push(i); });
  const nWords = wi.length;
  const want = Math.min(dlgBlankCount(nWords, level), Math.max(0, nWords-1));
  const spans = [];                               // {a,b} = 낱말 인덱스(wi 기준) 구간 [a,b]
  const taken = new Array(nWords).fill(false);
  const push = (a,b)=>{ for(let k=a;k<=b;k++) if(taken[k]) return false;
                        for(let k=a;k<=b;k++) taken[k]=true; spans.push({a,b}); return true; };
  const wordAt = k => normTone(toks[wi[k]]);
  // ① 교재 단어(구 포함) 후보 — 그 단원 새 단어(tier 0) → 앞 단원 단어(tier 1) 순, 같은 급이면 긴 구를 먼저
  const cand = [];
  vocab.forEach(v=>{
    const parts = v.key.split(" ");
    for(let k=0; k+parts.length<=nWords; k++){
      let hit=true;
      for(let j=0;j<parts.length;j++) if(wordAt(k+j)!==parts[j]){ hit=false; break; }
      if(hit) cand.push({a:k, b:k+parts.length-1, tier:v.tier, len:parts.length});
    }
  });
  shuffle(cand)
    .sort((x,y)=> (x.tier-y.tier) || (y.len-x.len))
    .forEach(c=>{ if(spans.length<want) push(c.a,c.b); });
  // ② 모자라면 일반 낱말(고유명사·1글자 제외)
  if(spans.length<want){
    const rest=[];
    for(let k=0;k<nWords;k++){
      const w = toks[wi[k]];
      if(taken[k] || w.length<2) continue;
      if(DLG_NAMES.has(normTone(w)) || DLG_NAMES.has(norm(w))) continue;
      rest.push(k);
    }
    shuffle(rest).forEach(k=>{ if(spans.length<want) push(k,k); });
  }
  spans.sort((x,y)=>x.a-y.a);
  // parts 조립
  const blankAt = {};                             // 낱말인덱스 → span
  spans.forEach(sp=>{ blankAt[sp.a]=sp; });
  const parts=[]; let buf=""; let bi=startIdx;
  const blanks=[];
  for(let i=0;i<toks.length;){
    const k = wi.indexOf(i);
    const sp = (k>=0) ? blankAt[k] : null;
    if(sp){
      const from=wi[sp.a], to=wi[sp.b];
      const ansText = toks.slice(from, to+1).join("");
      if(buf){ parts.push({t:"s", s:buf}); buf=""; }
      parts.push({t:"b", bi, ans:ansText});
      blanks.push({bi, ans:ansText});
      bi++;
      i = to+1;
    } else {
      buf += toks[i]; i++;
    }
  }
  if(buf) parts.push({t:"s", s:buf});
  return {parts, blanks, next:bi};
}
/* 듣기 → 문장 → 빈칸 채우기. 문장 하나하나를 대화의 '한 줄'처럼 취급해서 같은 화면·채점을 그대로 씀 */
function startSentCloze(arr, lesson, lbl){
  const vocab = dlgVocab(Number(lesson) || 1);
  let bi = 0;
  const lines = arr.map((x, i) => {
    const r = dlgBuildLine(x.vn, vocab, state.dlgLevel, bi);
    bi = r.next;
    return { who:(i+1)+".", vn:x.vn, ko:x.en, parts:r.parts, blanks:r.blanks };
  });
  DLG.kind="sent"; DLG.lesson=Number(lesson)||1; DLG.no=0; DLG.level=state.dlgLevel; DLG.srcLabel=lbl;
  DLG.lines=lines; DLG.nb=bi; DLG.ans={}; DLG.res={}; DLG.hint={}; DLG.graded=false; DLG.score=0; DLG.playing=false;
  DLG.locked=new Set(); DLG.retry=0;
  DLG.batch=(DLG.batch||0)+1;
  state.mode="dlg";
  renderDlg();
}
/* 문장 빈칸: '다음 →' = 그 단원 문장에서 새로 뽑아 다시 출제 */
function nextSentCloze(){
  const l = state.sentLesson || sentLessons()[0];
  const pool = SENT_BY_LESSON[l] || [];
  if(!pool.length) { renderSetup(); return; }
  let arr = shuffle(pool);
  const n = (state.count!=="all") ? Math.min(Number(state.count), arr.length) : arr.length;
  startSentCloze(arr.slice(0, n), l, "L"+l+" 문장");
}
/* 듣기 → 받아쓰기 (교재 Chính tả 지문) — 대화 '전부 받아쓰기' 화면·채점을 그대로 재사용.
   화자가 없는 글이라 who는 번호("1." "2." …)로 넣음. */
function startCt(){
  const l = state.ctLesson || ctLessons()[0];
  const arr = ctSents(l);
  if(!arr.length){ alert("이 단원에는 받아쓰기 지문이 없어요."); return; }
  DLG.kind="ct"; DLG.full=true;
  DLG.lesson=l; DLG.no=0; DLG.ctPage=(arr[0]||{}).page||"";
  DLG.lines = arr.map((x,i)=>({ who:(i+1)+".", vn:x.vn, ko:x.en, parts:[], blanks:[] }));
  DLG.nb = DLG.lines.length;
  DLG.ans={}; DLG.res={}; DLG.hint={}; DLG.graded=false; DLG.score=0; DLG.playing=false;
  DLG.locked=new Set(); DLG.retry=0;
  state.mode="dlg";
  renderDlg();
}
function startDlg(){
  DLG.kind="dlg";
  const ds = DIALOGS[state.dlgLesson]||[];
  const d = ds.find(x=>x.no===state.dlgNo) || ds[0];
  if(!d){ alert("이 단원에는 대화가 없어요."); return; }
  DLG.full = (state.listenDlg==="full");   // 전부 받아쓰기 = 줄마다 통째로 입력
  DLG.lesson=state.dlgLesson; DLG.no=d.no; DLG.level=state.dlgLevel;
  if(DLG.full){
    // 빈칸 없이 — 줄 하나당 입력칸 하나
    DLG.lines = d.lines.map(ln=>({ who:ln.who, vn:ln.vn, ko:ln.ko, parts:[], blanks:[] }));
    DLG.nb = DLG.lines.length;
  } else {
    const vocab = dlgVocab(state.dlgLesson);
    let bi=0;
    DLG.lines = d.lines.map(ln=>{
      const r = dlgBuildLine(ln.vn, vocab, state.dlgLevel, bi);
      bi = r.next;
      return { who:ln.who, vn:ln.vn, ko:ln.ko, parts:r.parts, blanks:r.blanks };
    });
    DLG.nb=bi;
  }
  DLG.ans={}; DLG.res={}; DLG.hint={}; DLG.graded=false; DLG.score=0; DLG.playing=false;
  DLG.locked=new Set(); DLG.retry=0;
  state.mode="dlg";
  renderDlg();
}
/* 틀린 빈칸만 다시 — 맞힌 칸은 채운 채 잠그고, 틀린 칸만 비워서 다시 입력받음.
   정답은 다시 숨김(그냥 베껴 쓰지 않게) → 소리 듣고 기억해서 직접 써야 함 */
function dlgRetryWrong(){
  const wrong = dlgAllBlanks().filter(b => !DLG.res[b.bi] || DLG.res[b.bi].g!=="ok");
  if(!wrong.length) return;
  dlgAllBlanks().forEach(b=>{ if(DLG.res[b.bi] && DLG.res[b.bi].g==="ok") DLG.locked.add(b.bi); });
  wrong.forEach(b=>{ delete DLG.ans[b.bi]; delete DLG.res[b.bi]; });
  DLG.graded=false; DLG.hint={}; DLG.retry++;
  stopSpeak(); DLG.playing=false;
  renderDlg();
}
function dlgSaveInputs(){
  view.querySelectorAll("input.dblank, textarea.dfull").forEach(i=>{ DLG.ans[Number(i.dataset.b)] = i.value; });
}
function renderDlg(){
  const isSentCloze = DLG.kind==="sent";
  const isCt = DLG.kind==="ct";
  state.screen="dlg:"+DLG.kind+":"+DLG.lesson+":"+(isSentCloze?(DLG.batch||0):DLG.no)+":"+DLG.retry;   // 대화/문제묶음/회차가 바뀔 때만 맨 위로
  const rows = DLG.lines.map((ln,li)=>{
    // 전부 받아쓰기 — 줄 통째로 입력
    if(DLG.full){
      const r = DLG.res[li], val = esc(DLG.ans[li]||"");
      const body = !DLG.graded
        ? `<textarea class="dfull" data-b="${li}" rows="2" placeholder="들은 대로 써보세요" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">${val}</textarea>`
        : `<div class="dblank done ${r?r.g:"no"}" style="display:block;text-align:left;min-width:0">${esc((DLG.ans[li]||"").trim()||"—")}</div>
           ${(!r||r.g!=="ok") ? `<div class="dans" style="margin:4px 0 0">${esc(ln.vn)}</div>` : ""}`;
      // 한국어 뜻: 전체 토글(state.dlgKo)이 꺼져 있어도 줄별 [힌트]로 그 줄만 볼 수 있음. 채점 후엔 항상 보임
      const showKo = state.dlgKo || DLG.hint[li] || DLG.graded;
      return `<div class="dline${DLG.playing===li?" now":""}" data-li="${li}">
        <span class="dwho">${esc(ln.who)}</span>
        <div class="dbody">
          ${showKo ? `<div class="dhint" style="margin:0 0 5px">${esc(ln.ko)}</div>` : ""}
          ${body}
          <div class="dbtns">
            ${spkBtn(ln.vn,"vi-VN",true)}
            ${(!state.dlgKo && !DLG.graded) ? `<button class="chip tiny" data-action="dlgHint" data-li="${li}">${DLG.hint[li]?"뜻 숨기기":"뜻 보기"}</button>` : ""}
          </div>
        </div>
      </div>`;
    }
    const body = ln.parts.map(p=>{
      if(p.t==="s") return esc(p.s);
      const r = DLG.res[p.bi];
      const val = esc(DLG.ans[p.bi]||"");
      const w = Math.max(4, Math.min(20, p.ans.length+1));
      if(!DLG.graded){
        // 이미 맞힌 칸은 채운 채로 잠금 (다시 풀 때)
        if(DLG.locked.has(p.bi)) return `<span class="dblank done ok">${esc((DLG.ans[p.bi]||p.ans).trim())}</span>`;
        return `<input class="dblank" data-b="${p.bi}" value="${val}" style="width:${w}ch" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">`;
      }
      const cls = r ? r.g : "no";
      const shown = (DLG.ans[p.bi]||"").trim() || "—";
      if(cls==="ok") return `<span class="dblank done ok">${esc(shown)}</span>`;
      return `<span class="dblank done ${cls}">${esc(shown)}</span><span class="dans">${esc(p.ans)}</span>`;
    }).join("");
    return `<div class="dline${DLG.playing===li?" now":""}" data-li="${li}">
      <span class="dwho">${esc(ln.who)}</span>
      <div class="dbody">
        <div class="dtext">${body}</div>
        <div class="dbtns">
          ${spkBtn(ln.vn,"vi-VN",true)}
          <button class="chip tiny" data-action="dlgHint" data-li="${li}">${DLG.hint[li]?"뜻 숨기기":"힌트"}</button>
        </div>
        ${DLG.hint[li]||DLG.graded ? `<div class="dhint">${esc(ln.ko)}</div>`:""}
      </div>
    </div>`;
  }).join("");
  const unit = DLG.full ? "줄" : "빈칸";
  const nWrong = !DLG.graded ? 0
    : (DLG.full ? DLG.lines.filter((_,li)=>!DLG.res[li] || DLG.res[li].g!=="ok").length
                : dlgAllBlanks().filter(b=>!DLG.res[b.bi] || DLG.res[b.bi].g!=="ok").length);
  const nLeft  = DLG.full ? DLG.lines.length : dlgAllBlanks().filter(b=>!DLG.locked.has(b.bi)).length;
  const head = DLG.graded
    ? `<div class="card center">
        <div class="stat"><div><b>${DLG.score}</b><div class="tiny muted">맞은 ${unit}</div></div>
          <div><b>${DLG.nb}</b><div class="tiny muted">전체 ${unit}</div></div>
          <div><b>${DLG.nb?Math.round(DLG.score/DLG.nb*100):0}%</b><div class="tiny muted">정답률</div></div></div>
        ${DLG.retry&&!nWrong?`<div class="tiny" style="margin-top:10px; color:var(--good); font-weight:800">다 맞혔어요</div>`:""}
      </div>`
    : DLG.retry
    ? `<div class="card" style="background:var(--warnsoft); border-color:var(--warn); padding:12px 14px">
        <div class="tiny" style="color:var(--warn); font-weight:800">
          <svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-repeat'/></svg>
          틀린 ${unit} ${nLeft}개만 다시 풀어요 — 정답은 가렸어요. 소리를 다시 듣고 직접 써보세요.
        </div>
      </div>`
    : "";
  const backLbl = (isSentCloze||isCt) ? "← 단원 다시 고르기" : "← 단원·대화 다시 고르기";
  const nextLbl = isSentCloze ? "새 문장으로 →" : "다음 대화 →";
  const showRetryWrong = nWrong && !DLG.full;   // 전부 받아쓰기는 줄 단위라 '틀린 것만' 대신 '처음부터'
  const foot = DLG.graded
    ? `${showRetryWrong ? `<button class="btn lg" data-action="dlgRetryWrong"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-repeat'/></svg> 틀린 빈칸 ${nWrong}개만 다시 풀기</button>` : ""}
       <button class="btn ${showRetryWrong?"line":"lg"}" style="margin-top:10px" data-action="dlgRetry"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-repeat'/></svg> ${DLG.full?"다시 받아쓰기":(isSentCloze?"같은 문장, 빈칸 새로":"처음부터 (빈칸 새로)")}</button>

       <button class="btn line" style="margin-top:10px" data-action="quitDlg">${backLbl}</button>`;
  set(`
    <div class="qtop">
      <span><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-headphones'/></svg> ${lessonLabel(DLG.lesson)} · ${isCt?`받아쓰기 · ${DLG.ctPage}쪽`:isSentCloze?`문장 ${DLG.lines.length}개`:`대화 ${DLG.no}`}</span>
      <span>${unit} ${DLG.nb}개</span>
    </div>
    ${head}
    <div class="card dplay">
      <button class="btn" data-action="dlgPlayAll"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-volume'/></svg> ${isCt?"지문 듣기 (여러 번 들어도 돼요)":isSentCloze?"전체 듣기":(DLG.full?"대화 듣기 (여러 번 들어도 돼요)":"대화 전체 듣기")}</button>
      <button class="btn line" data-action="dlgStop">멈추기</button>
    </div>
    ${(DLG.full && !DLG.graded) ? `<div class="card" style="padding:10px 14px; margin-top:-6px">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px">
        <span class="muted tiny" style="font-weight:700">한국어 뜻</span>
        <div class="seg" style="flex:0 0 auto; width:auto">
          <button class="${state.dlgKo?"on":""}" data-action="dlgKo" data-v="1" style="padding:6px 14px">보기</button>
          <button class="${!state.dlgKo?"on":""}" data-action="dlgKo" data-v="0" style="padding:6px 14px">숨기기</button>
        </div>
      </div>
      ${!state.dlgKo?`<div class="muted tiny" style="margin-top:7px">뜻 없이 소리만 듣고 받아써요. 막히면 줄마다 <b>뜻 보기</b>를 누르면 돼요.</div>`:""}
    </div>` : ""}

  view.querySelectorAll("input.dblank").forEach(inp=>{
    inp.addEventListener("input", ()=>{ DLG.ans[Number(inp.dataset.b)] = inp.value; });
