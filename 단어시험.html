<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>베트남어 단어·문장 학습 · 베트남어 ↔ 한국어</title>
<meta name="description" content="베트남어 단어·문장을 읽기·듣기·쓰기·말하기로 공부하고 시험지도 만드는 학습앱. 베트남어 ↔ 한국어, GYBM 베트남어 과정용.">
<meta property="og:type" content="website">
<meta property="og:title" content="베트남어 단어·문장 학습 · 베트남어 ↔ 한국어">
<meta property="og:description" content="베트남어 단어·문장을 읽기·듣기·쓰기·말하기로 공부하고 시험지도 만드는 학습앱 (GYBM 베트남어 과정).">
<meta property="og:url" content="https://chan026-normal.github.io/word-note/">
<meta property="og:site_name" content="베트남어 단어·문장 학습">
<meta property="og:locale" content="ko_KR">
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1f2430; --muted:#6b7280;
    --line:#e6e9f0; --brand:#5f6fa6; --brand2:#7482b3; --brandsoft:#eceef6;
    --good:#3f885d; --goodsoft:#eaf3ed; --bad:#bd574f; --badsoft:#f6edeb;
    --accent:#418379; --accentsoft:#e6f0ee; --warn:#9a6a00; --warnsoft:#fff6e0; --shadow:0 6px 22px rgba(31,36,48,.07);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1320; --card:#191f30; --ink:#eef1f8; --muted:#9aa3b5;
      --line:#2a3145; --brand:#707bb0; --brand2:#7d88bb; --brandsoft:#272e46;
      --good:#56ad7d; --goodsoft:#17301e; --bad:#d77d75; --badsoft:#352020;
      --accent:#4f9c90; --accentsoft:#173430; --warn:#e3b85a; --warnsoft:#322a12; --shadow:0 6px 22px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    padding-bottom:40px;
  }
  .topbar{
    position:sticky; top:0; z-index:10; background:var(--card);
    border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;
    padding:12px 16px;
  }
  .brand{
    font-size:18px; font-weight:800; color:var(--ink); background:none; border:none;
    cursor:pointer; padding:0; display:flex; align-items:center; gap:8px;
  }
  .sub{font-size:12px; color:var(--muted); margin-left:auto}
  .zoomctl{display:flex; align-items:center; gap:3px}
  .zoomctl button{border:1.5px solid var(--line); background:var(--card); color:var(--ink); height:28px; min-width:28px; padding:0; border-radius:8px; font-weight:800; font-size:16px; line-height:1; cursor:pointer}
  .zoomctl button:active{transform:scale(.93)}
  .zoomctl button#zoomLbl{min-width:auto; padding:0 8px; font-size:11px; font-weight:700; color:var(--muted)}
  @media (max-width:430px){ .topbar .sub{display:none} }
  .wrap{max-width:680px; margin:0 auto; padding:16px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:18px; margin-bottom:14px}
  h2{font-size:15px; margin:0 0 12px; color:var(--muted); font-weight:700; letter-spacing:.2px}
  .row{display:flex; flex-wrap:wrap; gap:8px}
  .chip{
    border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    padding:8px 12px; border-radius:999px; font-size:14px; cursor:pointer; font-weight:600;
    transition:.12s; user-select:none;
  }
  .chip.on{background:var(--brandsoft); border-color:var(--brand); color:var(--brand)}
  .chip small{color:var(--muted); font-weight:500}
  .chip.on small{color:var(--brand)}
  .chip.mine{border-color:var(--accent); color:var(--accent)}
  .chip.mine.on{background:var(--accent); border-color:var(--accent); color:#fff}
  .seg{display:flex; gap:8px; flex-wrap:wrap}
  .seg button{
    flex:1; min-width:96px; border:1.5px solid var(--line); background:var(--card);
    color:var(--ink); padding:12px 10px; border-radius:14px; font-size:14px; font-weight:700;
    cursor:pointer; transition:.12s;
  }
  .seg button.on{background:var(--brand); border-color:var(--brand); color:#fff}
  .seg .desc{display:block; font-size:11px; font-weight:500; opacity:.8; margin-top:2px}
  .btn{
    width:100%; border:none; border-radius:16px; padding:16px; font-size:17px; font-weight:800;
    background:var(--brand); color:#fff; cursor:pointer; transition:.12s;
  }
  .btn:active{transform:scale(.99)}
  .btn.lg{padding:18px}
  .btn.ghost{background:var(--brandsoft); color:var(--brand)}
  .btn.soft{background:var(--card); border:1.5px solid var(--line); color:var(--ink)}
  .btn.line{background:none; border:1.5px solid var(--line); color:var(--muted); font-weight:700}
  .btn2{display:flex; gap:10px}
  .btn2 .btn{font-size:15px; padding:14px}
  .muted{color:var(--muted)}
  .center{text-align:center}
  .stat{display:flex; gap:14px; justify-content:center; margin-bottom:6px}
  .stat b{font-size:22px}
  .tiny{font-size:12px}
  .link{background:none;border:none;color:var(--brand);font-weight:700;cursor:pointer;font-size:14px;padding:6px}

  /* quiz */
  .qtop{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; font-size:13px; font-weight:700; color:var(--muted)}
  .bar{height:8px; background:var(--line); border-radius:999px; overflow:hidden; margin-bottom:16px}
  .bar > i{display:block; height:100%; background:linear-gradient(90deg,var(--brand),var(--brand2)); transition:width .25s}
  .dirtag{display:inline-block; font-size:12px; font-weight:700; color:var(--accent); background:color-mix(in srgb,var(--accent) 14%, transparent); padding:4px 10px; border-radius:999px; margin-bottom:14px}
  .prompt{font-size:34px; font-weight:800; text-align:center; margin:6px 0 4px; word-break:break-word; line-height:1.25}
  .prompt.sent{font-size:22px; line-height:1.4}
  .promptsub{text-align:center; color:var(--muted); font-size:13px; margin-bottom:18px}
  .opt{
    width:100%; text-align:left; border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    padding:15px 16px; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:10px;
    display:flex; align-items:center; gap:10px; transition:.1s;
  }
  .opt .num{width:24px;height:24px;flex:0 0 24px;border-radius:7px;background:var(--brandsoft);color:var(--brand);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .opt.correct{background:var(--goodsoft); border-color:var(--good); color:var(--good)}
  .opt.correct .num{background:var(--good);color:#fff}
  .opt.wrong{background:var(--badsoft); border-color:var(--bad); color:var(--bad)}
  .opt.wrong .num{background:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  input.answer{
    width:100%; padding:15px 16px; border:1.5px solid var(--line); border-radius:14px; font-size:18px;
    background:var(--card); color:var(--ink); outline:none; text-align:center; font-weight:600;
  }
  input.answer:focus{border-color:var(--brand)}
  textarea.answer{width:100%; padding:14px 16px; border:1.5px solid var(--line); border-radius:14px; font-size:17px; background:var(--card); color:var(--ink); outline:none; font-weight:600; resize:vertical; line-height:1.4; font-family:inherit; box-sizing:border-box}
  textarea.answer:focus{border-color:var(--brand)}
  .mycmp{background:var(--brandsoft); color:var(--ink); border-radius:12px; padding:10px 14px; margin-top:12px; font-size:15px; line-height:1.45}
  .mycmp b{color:var(--brand); margin-right:6px; font-size:12px; font-weight:800}
  .feedback{border-radius:14px; padding:14px 16px; margin-top:14px; font-weight:700; font-size:15px}
  .feedback.ok{background:var(--goodsoft); color:var(--good)}
  .feedback.no{background:var(--badsoft); color:var(--bad)}
  .feedback .ans{display:block; color:var(--ink); font-weight:800; font-size:20px; margin-top:4px}
  .spk{border:none;background:var(--brandsoft);color:var(--brand);width:38px;height:38px;border-radius:12px;cursor:pointer;font-size:17px;vertical-align:middle}
  .spk.sm{width:30px;height:30px;font-size:14px;border-radius:9px}

  /* flashcard */
  .flash{
    perspective:1200px; height:240px; margin:8px 0 16px; cursor:pointer;
  }
  .flash-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d}
  .flash.flipped .flash-inner{transform:rotateY(180deg)}
  .face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:18px; border:1.5px solid var(--line);
    background:var(--card); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:16px;
  }
  .face .big{font-size:32px; font-weight:800; text-align:center; word-break:break-word}
  .face .lbl{font-size:12px; color:var(--muted); font-weight:700}
  .face.back{transform:rotateY(180deg); background:var(--brandsoft)}
  .face.back .big{color:var(--brand)}

  /* 홈 4영역 / 듣기 / 말하기 */
  .skillgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .skillcard{border:1.5px solid var(--line); background:var(--card); border-radius:18px; padding:15px; cursor:pointer; text-align:left; transition:.12s; display:flex; flex-direction:column; gap:5px; box-shadow:var(--shadow); color:var(--ink)}
  .skillcard:active{transform:scale(.985)}
  .skillcard .ic{font-size:28px; line-height:1}
  .skillcard .nm{font-size:17px; font-weight:800}
  .skillcard .ds{font-size:12px; color:var(--muted); line-height:1.45}
  .skillcard .tg{margin-top:3px; font-size:11px; font-weight:700; color:var(--brand); background:var(--brandsoft); padding:3px 9px; border-radius:999px; align-self:flex-start}
  .secrow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px}
  .listenbox{display:flex; flex-direction:column; align-items:center; gap:10px; padding:14px 0 2px}
  .bigspk{width:104px; height:104px; border-radius:50%; border:none; background:var(--brandsoft); color:var(--brand); font-size:42px; cursor:pointer; transition:.12s}
  .bigspk:active{transform:scale(.96)}
  .listenhint{font-size:13px; color:var(--muted)}

  /* word list */
  .search{width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:14px; font-size:15px; background:var(--card); color:var(--ink); outline:none; margin-bottom:12px}
  .ta{width:100%; min-height:88px; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px; font-size:12px; font-family:ui-monospace,Menlo,Consolas,monospace; background:var(--bg); color:var(--ink); outline:none; resize:vertical; word-break:break-all}
  .ta:focus{border-color:var(--brand)}
  .tgrid{display:flex; flex-wrap:wrap; gap:8px; margin-top:2px}
  .trow{flex:1 1 150px; display:flex; align-items:center; gap:8px; background:var(--bg); border-radius:10px; padding:9px 12px}
  .tk{font-family:ui-monospace,Menlo,Consolas,monospace; font-weight:800; color:var(--brand); white-space:nowrap}
  .tar{color:var(--muted)}
  .tr{font-weight:600; font-size:14px}
  .wlist{display:flex; flex-direction:column; gap:0}
  .wrow{display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line)}
  .wrow:last-child{border-bottom:none}
  .wvn{font-weight:700; font-size:16px}
  .wen{color:var(--muted); margin-left:auto; text-align:right; font-size:15px}
  .wen.hide{filter:blur(6px); transition:.15s}
  .wrow:hover .wen.hide{filter:none}
  .lz{font-size:11px;color:var(--brand);background:var(--brandsoft);padding:2px 7px;border-radius:6px;font-weight:700}
  .lz.mine{color:var(--accent);background:var(--accentsoft)}
  .addstatus{font-size:12.5px; font-weight:700; margin:8px 0 0; min-height:17px; display:flex; align-items:center; gap:5px; transition:opacity .25s ease}
  .addstatus.fading{opacity:0}
  .addstatus.ok{color:var(--good)}
  .addstatus.warn{color:var(--warn)}
  .addstatus.busy{color:var(--muted)}
  .search.needcheck{border-color:var(--warn); background:var(--warnsoft)}
  .del{border:none;background:var(--badsoft);color:var(--bad);border-radius:9px;width:30px;height:30px;cursor:pointer;font-weight:800}
  .star{border:none;background:none;cursor:pointer;font-size:20px;line-height:1;color:var(--muted);padding:2px 4px;flex:0 0 auto}
  .star.on{color:#e2a900}
  .notedot{font-size:11px;letter-spacing:1px;color:var(--brand);flex:0 0 auto}
  label.fld{display:block; font-size:13px; font-weight:700; color:var(--muted); margin:10px 0 6px}
  .foot{text-align:center; color:var(--muted); font-size:12px; padding:18px}
  .emoji{font-size:46px; text-align:center; margin-bottom:6px}

  /* 범위 지정 / select */
  .sel{padding:11px 12px; border:1.5px solid var(--line); border-radius:12px; font-size:15px; background:var(--card); color:var(--ink); font-weight:600; width:100%}
  .row2{display:grid; grid-template-columns:1fr 1.5fr; gap:8px}
  .rsum{margin-top:12px; background:var(--brandsoft); color:var(--brand); border-radius:12px; padding:10px 12px; font-size:13px; font-weight:600}
  .btn.accent{background:var(--accent); color:#fff}
  .keyrow{display:flex; align-items:center; gap:8px; cursor:pointer; font-size:14px; font-weight:700; color:var(--ink); margin-top:14px}
  .keyrow input{width:18px; height:18px}

  /* 시험지 (인쇄용) — 항상 흰 종이 느낌 유지 */
  .paper{background:#fff; color:#111; border:1px solid var(--line); border-radius:14px; padding:24px; margin-top:14px}
  .ptitle{font-size:20px; font-weight:800; text-align:center; color:#111}
  .pver{font-size:13px; color:#777; font-weight:700}
  .phead{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin:14px 0; font-size:14px; color:#222}
  .pinstr{font-size:12.5px; color:#333; background:#f3f4f6; border-radius:8px; padding:9px 11px; margin-bottom:16px; line-height:1.6}
  .pgrid{display:grid; grid-template-columns:1fr; gap:9px 28px}
  .pq{display:flex; align-items:baseline; gap:7px; font-size:14.5px; color:#111; break-inside:avoid; padding:2px 0}
  .pqn{color:#777; font-weight:700; min-width:26px}
  .pqp{font-weight:700; white-space:nowrap}
  .pqtag{font-size:10px; color:#999; white-space:nowrap}
  .pqline{flex:1; border-bottom:1px dotted #aaa; min-width:50px; align-self:flex-end; height:15px}
  /* 정답지: 시험지와 같은 밑줄 칸에 정답을 채워 넣음(초록) */
  .pqline.answ{height:auto; align-self:auto; color:#1a7a4f; font-weight:700; padding-left:8px; white-space:normal; line-height:1.35}
  .ppart{margin:20px 0 6px; font-size:15px; font-weight:800; color:#111; border-bottom:2px solid #bbb; padding-bottom:5px}
  .pslist{display:flex; flex-direction:column; gap:15px}
  .psq{break-inside:avoid}
  .psq .pqn{display:inline-block}
  .psp{font-weight:700; font-size:14.5px; color:#111}
  .psline{border-bottom:1px solid #aaa; height:26px; margin-top:7px}
  .psline.answ{height:auto; min-height:22px; color:#1a7a4f; font-weight:700; font-size:13px; padding-bottom:2px; line-height:1.4}
  .pkeygrid{display:grid; grid-template-columns:1fr 1fr; gap:5px 20px; margin-top:8px}
  /* 2열일 때 세로(열 방향) 채우기: 왼쪽 1~N 내려간 뒤 오른쪽. --prows = ceil(문항수/2) */
  .pkeygrid.colflow{grid-auto-flow:column; grid-template-rows:repeat(var(--prows,20),auto)}
  .pkq{font-size:13px; color:#111; break-inside:avoid}
  .pkq b{color:#777; font-weight:700}
  .pkq i{font-style:normal; color:#1a7a4f; font-weight:700}   /* 정답 강조 */
  .pkey{ margin-top:14px }
  @media (min-width:560px){ .pgrid{grid-template-columns:1fr 1fr; grid-auto-flow:column; grid-template-rows:repeat(var(--prows,20),auto)} }
  @page{ margin:0; }   /* 브라우저 자동 머리글·바닥글(날짜·페이지번호·주소) 제거 */
  @media print{
    .topbar,.foot,.noprint{display:none !important}
    body{background:#fff; margin:0; padding:0}
    .wrap{max-width:none; padding:0; zoom:1 !important}   /* 화면 확대는 인쇄에 영향 없게 */
    .paper{border:none; border-radius:0; margin:0; padding:16mm 14mm}  /* 여백은 직접 부여 */
    .pgrid{grid-template-columns:1fr 1fr; grid-auto-flow:column; grid-template-rows:repeat(var(--prows,20),auto)}
    .pq{break-inside:avoid}
    .pkey{ break-before:page; page-break-before:always; margin-top:0 }   /* 정답지는 새 페이지에 */
    .paper.onepage{ padding:7mm 11mm }   /* 한 장에 맞춤: 인쇄 여백도 축소 */
    /* 따로 인쇄: 한쪽만 보이게 */
    body.ponly-paper .pkey{ display:none !important }
    body.ponly-key .paper:not(.pkey){ display:none !important }
    body.ponly-key .pkey{ break-before:auto !important; page-break-before:auto !important; margin-top:0 !important }  /* 정답지만 인쇄 시 빈 첫 장 방지 */
  }
  /* A4 한 장에 맞춤 — 글씨·간격 압축 모드 */
  .paper.onepage .ptitle{font-size:15px}
  .paper.onepage .phead{margin:5px 0; font-size:11.5px}
  .paper.onepage .pinstr{font-size:10.5px; padding:5px 8px; margin-bottom:7px}
  .paper.onepage .pgrid{gap:2px 22px}
  .paper.onepage .pq{font-size:11.5px; padding:0}
  .paper.onepage .pqline{height:12px}
  .paper.onepage .ppart{margin:7px 0 2px; font-size:12px; padding-bottom:2px}
  .paper.onepage .pslist{gap:3px}
  .paper.onepage .psp{font-size:11.5px}
  .paper.onepage .psline{height:14px; margin-top:2px}
  .paper.onepage .pkeygrid{gap:3px 16px}
  .paper.onepage .pkq{font-size:11px}
  /* 정답지(밑줄에 정답) 압축: 채워진 줄 높이·줄간격 더 좁힘 */
  .paper.onepage .pqline.answ{line-height:1.15; padding-left:6px}
  .paper.onepage .psline.answ{min-height:0; font-size:11px; padding-bottom:1px; line-height:1.2; margin-top:1px}
  /* 인라인 SVG 라인 아이콘 (이모지 대체). 크기는 부모 font-size(1em)에 따름 */
  .ic{width:1em; height:1em; display:inline-block; vertical-align:-.14em; fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; flex:none}
  .skillcard .ic{stroke-width:1.7}
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
    <symbol id="i-home" viewBox="0 0 24 24"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9h12v-9"/><path d="M10 19v-5h4v5"/></symbol>

let WORDS = [];
function buildWords(){
  WORDS = []; let id = 0;

    RAW[L].trim().split("\n").forEach(line=>{
      line = line.trim(); if(!line) return;
      const i = line.indexOf("|"); if(i<0) return;
      const vn = line.slice(0,i).trim(), en = line.slice(i+1).trim();
      if(vn && en) WORDS.push({id:id++, lesson:Number(L), vn, en, eng: ENG_MAP[L+"||"+norm(vn)] || ""});
    });
  });
  lsGet("_custom", []).forEach(c=>{
    if(c.vn && c.en) WORDS.push({id:id++, lesson:"custom", vn:c.vn, en:c.en});
  });
  // 단원 내 번호(num)와 전체 순서(gi) 부여 — 범위 지정에 사용
  const cnt = {};
  WORDS.forEach((w,i)=>{ w.gi = i; cnt[w.lesson] = (cnt[w.lesson]||0)+1; w.num = cnt[w.lesson]; });
}
function lessonsList(){
  const nums=[...new Set(WORDS.filter(w=>typeof w.lesson==="number").map(w=>w.lesson))].sort((a,b)=>a-b);
  if(WORDS.some(w=>w.lesson==="custom")) nums.push("custom");

}

/* =========================================================
   4) 도우미 함수
   ========================================================= */
function stripDia(s){
  return s.normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/đ/g,"d").replace(/Đ/g,"D");
}
function norm(s){
  return stripDia(String(s).toLowerCase())
    .replace(/[().,/;:!?'"’]/g," ")
    .replace(/\s+/g," ").trim();
}
function acceptable(answer){
  const set = new Set();
  const add = v => { const n=norm(v); if(n) set.add(n); };
  const stripLead = v => v.replace(/^(to|a|an|the)\s+/i,"");
  answer.split(/[,;/]/).map(x=>x.trim()).filter(Boolean).concat(answer).forEach(v=>{
    add(v); add(stripLead(v));
    const noParen = v.replace(/\([^)]*\)/g," ").trim();   // 괄호 내용 제거 버전
    add(noParen); add(stripLead(noParen));
    (v.match(/\d+/g)||[]).forEach(n=>add(n));             // 답에 든 숫자만 입력해도 정답 (예: "숫자 15"→"15")
  });
  return set;
}
function isCorrectTyped(answer, input){
  const ni = norm(input); if(!ni) return false;
  const set = acceptable(answer);
  if(set.has(ni)) return true;
  return set.has(ni.replace(/^(to|a|an|the)\s+/,""));
}
/* 베트남어 답은 성조(đ/d 포함)까지 채점 — "ok"=완전정답 / "tone"=철자는 맞고 성조만 틀림 / "no"=오답 */
function normTone(s){ return String(s).toLowerCase().replace(/[().,/;:!?'"’]/g," ").replace(/\s+/g," ").trim(); }
function acceptableTone(answer){
  const set=new Set();
  const add=v=>{ const n=normTone(v); if(n) set.add(n); };
  answer.split(/[,;/]/).map(x=>x.trim()).filter(Boolean).concat(answer).forEach(v=>{ add(v); add(v.replace(/\([^)]*\)/g," ").trim()); });
  return set;
}
function checkVnTyped(answer, input){
  if(!normTone(input)) return "no";
  if(acceptableTone(answer).has(normTone(input))) return "ok";   // 성조까지 정확
  if(isCorrectTyped(answer, input)) return "tone";               // 성조 빼면 맞음 → 성조만 틀림
  return "no";
}
/* 뜻 조각(콤마/슬래시로 구분)을 각각 정규화해서 반환 */
function meaningTokens(s){ return String(s).split(/[,;/]/).map(t=>norm(t)).filter(Boolean); }
function meaningsOverlap(a, b){ const A=new Set(meaningTokens(a)); return meaningTokens(b).some(t=>A.has(t)); }
/* 같은/겹치는 한국어 뜻을 가진 다른 베트남어도 정답 인정
   (예: 뜻 "매우, 아주" → rất·lắm 모두 정답 / 뜻 "얼마, 몇" 인데 mấy(몇) 입력 → "몇" 겹침 → 정답) */
function checkVnAny(promptKo, expectedVn, input){
  const target = norm(promptKo);
  const cands = new Set([expectedVn]);
  WORDS.forEach(x=>{ if(norm(x.en)===target) cands.add(x.vn); });
  let best = "no";
  for(const vn of cands){
    const r = checkVnTyped(vn, input);
    if(r==="ok") return "ok";
    if(r==="tone") best = "tone";
  }
  // 뜻이 겹치는(부분 일치) 실제 교재 단어면 그 베트남어도 정답 인정
  for(const x of WORDS){
    if(cands.has(x.vn)) continue;
    if(!meaningsOverlap(x.en, promptKo)) continue;
    const r = checkVnTyped(x.vn, input);
    if(r==="ok") return "ok";
    if(r==="tone") best = "tone";
  }
  return best;
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
/* ---------- 발음(TTS) 음성·속도 ---------- */
let VOICES = [];
function loadVoices(){ try{ VOICES = (window.speechSynthesis && speechSynthesis.getVoices()) || []; }catch(e){ VOICES = []; } }
function viVoices(){ return VOICES.filter(v => (v.lang||"").toLowerCase().replace("_","-").startsWith("vi")); }
function ttsRate(){ const r = Number(lsGet("_rate", 0.9)); return (r>=0.5 && r<=2) ? r : 0.9; }
/* 베트남어일 때만 사용자가 고른 음성(없으면 '향상된' 우선) 적용. 한국어 등은 OS 기본 음성 사용 */
function pickedVoice(lang){
  if(!(lang||"").toLowerCase().startsWith("vi")) return null;
  const vs = viVoices(); if(!vs.length) return null;
  const uri = lsGet("_voiceURI","");
  if(uri){ const f = vs.find(v=>v.voiceURI===uri); if(f) return f; }
  return vs.find(v=>/enhanced|premium|neural|natural|nâng cao/i.test(v.name)) || vs[0];
}
if(window.speechSynthesis){ loadVoices(); try{ speechSynthesis.onvoiceschanged = loadVoices; }catch(e){} }
function speak(text, lang){
  try{
    if(!window.speechSynthesis) return;
    if(!VOICES.length) loadVoices();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || "en-US"; u.rate = ttsRate();
    const v = pickedVoice(lang); if(v){ u.voice = v; u.lang = v.lang; }
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}

function refresh(){ if(state.screen==="setup") renderSetup(); else if(state.screen==="paper") genPaper(false); else renderHome(); }
function bindSelection(){
  const sl=document.getElementById("startLesson");
  if(!sl) return;
  const sn=document.getElementById("startNum"), el=document.getElementById("endLesson"), en=document.getElementById("endNum");
  sl.onchange=()=>{ const f=WORDS.find(w=>String(w.lesson)===sl.value); state.rStart=f.gi; refresh(); };
  sn.onchange=()=>{ state.rStart=Number(sn.value); refresh(); };
  el.onchange=()=>{ const f=WORDS.find(w=>String(w.lesson)===el.value); state.rEnd=f.gi; refresh(); };
  en.onchange=()=>{ state.rEnd=Number(en.value); refresh(); };
}
/* 읽기 화면 '단어 찾기' — 입력하면 몇 과 몇 번인지 + 뜻 + 발음 (화면 재생성 없이 결과만 갱신) */
function bindFind(){
  const inp=document.getElementById("findInput"); if(!inp) return;
  const res=document.getElementById("findResults");
  const render=()=>{
    const k=norm(inp.value);
    if(!k){ res.innerHTML=`<div class="muted tiny">단어를 입력하면 몇 과 몇 번에 있는지 알려줘요.</div>`; return; }
    const hits=WORDS.filter(w=>norm(w.vn).includes(k)||norm(w.en).includes(k)).slice(0,40);
    if(!hits.length){ res.innerHTML=`<div class="muted tiny">'${esc(inp.value)}' 을(를) 못 찾았어요. (교재에 없는 단어일 수 있어요)</div>`; return; }
    res.innerHTML=hits.map(w=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 2px;border-top:1px solid var(--line)">
        <span style="flex:0 0 auto;font-size:12px;font-weight:700;color:var(--brand);background:var(--brandsoft);padding:2px 7px;border-radius:6px;white-space:nowrap">${esc(lessonLabel(w.lesson))}${w.num?" "+w.num+"번":""}</span>
        <span style="flex:1 1 40%;font-weight:700">${esc(w.vn)}</span>
        <span style="flex:1 1 40%;color:var(--muted);font-size:13px">${esc(w.en)}</span>
        ${spkBtn(w.vn,"vi-VN",true)}
      </div>`).join("");
  };
  inp.addEventListener("input", render);
  render();
}

/* ---------- 영역 선택 → 설정 화면 ---------- */
function goSkill(skill){ state.skill=skill; lsSet("_skill",skill); const sd=(SKILLS[skill]||{}).dir; if(sd && skill!=="exam") state.dir=sd; renderSetup(); }
function renderSetup(){
  state.screen="setup";
  const s=SKILLS[state.skill];
  const isListen = state.skill==="listen";
  const kindable = ["read","write","listen","speak"].includes(state.skill);   // 단어/문장 선택 가능한 영역
  const studySent = kindable && state.studyKind==="sent";
  const showDir = state.skill!=="exam" && state.skill!=="read" && !isListen;   // 실전·읽기·듣기는 방향 선택 없음
  const dirSeg = showDir ? `
    <div class="card">
      <h2>방향</h2>
      <div class="seg">
        <button class="${state.dir==="vn2en"?"on":""}" data-action="setupDir" data-v="vn2en">베→한<span class="desc">베트남어 보고</span></button>
        <button class="${state.dir==="en2vn"?"on":""}" data-action="setupDir" data-v="en2vn">한→베<span class="desc">한국어 보고</span></button>
        <button class="${state.dir==="random"?"on":""}" data-action="setupDir" data-v="random">랜덤<span class="desc">섞어서</span></button>
      </div>
    </div>`:"";
  // 단어/문장 선택 (읽기·쓰기·듣기·말하기 공통)
  const kindSeg = kindable ? `
    <div class="card">
      <h2>${isListen?"무엇을 받아쓸까요?":"무엇으로 공부할까요?"}</h2>
      <div class="seg">
        <button class="${state.studyKind==="word"?"on":""}" data-action="studyKind" data-v="word">단어<span class="desc">단어로</span></button>
        <button class="${state.studyKind==="sent"?"on":""}" data-action="studyKind" data-v="sent">문장<span class="desc">문장으로</span></button>
      </div>
    </div>`:"";
  // 쓰기 + 문장: 한 문제씩 / 여러 문제 한 번에(시험지처럼)
  const bulkSeg = (state.skill==="write" && studySent) ? `
    <div class="card">
      <h2>푸는 방식</h2>
      <div class="seg">
        <button class="${!state.sentBulk?"on":""}" data-action="sentBulk" data-v="0">한 문제씩<span class="desc">넘기면서</span></button>
        <button class="${state.sentBulk?"on":""}" data-action="sentBulk" data-v="1">여러 문제 한 번에<span class="desc">시험지처럼</span></button>
      </div>
    </div>`:"";
  // 범위: 문장이면 문장 단원 칩, 아니면 단어 범위 선택
  const curSent = state.sentLesson || sentLessons()[0];
  const rangeCard = studySent
    ? `<div class="card"><h2>① 단원 (문장)</h2>
         <div class="row">${sentLessons().map(l=>`<button class="chip ${String(curSent)===String(l)?"on":""}" data-action="studySentLesson" data-l="${l}">Lesson ${l} <small>${(SENT_BY_LESSON[l]||[]).length}문장</small></button>`).join("")}</div>
       </div>`
    : `<div class="card"><h2>① 공부할 범위</h2>${selectionBlockHTML(true)}</div>`;
  // 읽기: 단어 찾기 (몇 과 몇 번)
  const findCard = state.skill==="read" ? `
    <div class="card">
      <h2><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-search'/></svg> 단어 찾기 <span style="font-weight:600;opacity:.7;font-size:13px">(몇 과에 있는지)</span></h2>
      <input class="answer" id="findInput" placeholder="베트남어나 뜻으로 검색 (예: cám ơn, 감사)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="margin-bottom:6px">
      <div id="findResults"></div>
    </div>`:"";
  const countSeg = s.count ? `
    <div class="card">
      <h2>${showDir?"③":"②"} 문제 수</h2>
      <div class="seg">
        ${["all",10,20,30].map(n=>`<button class="${String(state.count)===String(n)?"on":""}" data-action="count" data-v="${n}">${n==="all"?"전체":n+"개"}</button>`).join("")}
      </div>
    </div>`:"";
  set(`
    <button class="link" data-action="goHome">← 처음으로</button>
    <div class="card">
      <h2>${s.emoji} ${s.label}</h2>
      <div class="muted tiny" style="margin-top:-4px">${s.desc}</div>
    </div>
    ${kindSeg}
    ${bulkSeg}
    ${rangeCard}
    ${dirSeg}
    ${countSeg}
    ${findCard}
    <button class="btn lg" data-action="startSkill">${s.emoji} ${s.label} 시작하기</button>
  `);
  bindSelection();
  bindFind();
}
function startSkill(){
  const s=SKILLS[state.skill];
  state.mode=s.mode;
  if(state.skill==="exam") state.dir="random";   // 실전시험만 랜덤 고정, 나머지는 setup에서 고른 방향 사용
  const kindable = ["read","write","listen","speak"].includes(state.skill);
  const useSent = kindable && state.studyKind==="sent";
  // 듣기 = 받아쓰기(소리 듣고 베트남어 그대로 쓰기): 단어 또는 문장
  if(state.skill==="listen"){
    if(useSent){ startSentQueue("listen"); return; }
    const pool=poolSelected();
    if(pool.length===0){ alert("먼저 ① 에서 공부할 범위를 한 개 이상 골라주세요."); return; }
    let q=shuffle(pool);
    if(state.count!=="all") q=q.slice(0, Math.min(Number(state.count), q.length));
    Q.queue=q.map(w=>listenWordQ(w));
    Q.idx=0; Q.score=0; Q.wrong=[]; Q.wordCount=null; Q.sentCount=null;
    setupQ(); renderQuiz(); return;
  }
  // 읽기·쓰기·말하기 — 문장으로 공부
  if(useSent){ startSentQueue(state.skill); return; }
  // 단어로 공부 (기존)
  const pool=poolSelected();
  if(pool.length===0){ alert("먼저 ① 에서 공부할 범위를 한 개 이상 골라주세요."); return; }
  if(s.mode==="flash"){ startFlash(pool); return; }
  if(s.mode==="exam"){ startExam(pool); return; }
  if(s.mode==="speak"){ startSpeak(pool); return; }
  let q=shuffle(pool);
  if(state.count!=="all") q=q.slice(0, Math.min(Number(state.count), q.length));
  Q.queue=q.map(w=>makeQ(w, dirOf(state.dir)));
  Q.idx=0; Q.score=0; Q.wrong=[]; Q.wordCount=null; Q.sentCount=null;
  setupQ(); renderQuiz();
}
/* 받아쓰기 문제: 소리=베트남어, 답=베트남어, 뜻(en)은 정답 공개 때만 보여줌 */
function listenWordQ(w){ return { type:"word", word:w, dir:"listen", dictation:true, prompt:w.vn, answer:w.vn, meaning:w.en }; }
function listenSentQ(x, lbl){ return { type:"sentence", word:{vn:x.vn, en:x.en, lesson:lbl}, dir:"listen", dictation:true, prompt:x.vn, answer:x.vn, meaning:x.en }; }
/* 문장으로 공부 — 읽기(읽고 뜻 보기)·쓰기(번역)·듣기(받아쓰기)·말하기(따라 말하기) */
function startSentQueue(skill){
  const l = state.sentLesson || sentLessons()[0];
  const pool = SENT_BY_LESSON[l]||[];
  if(!pool.length){ alert("이 단원에 문장이 없어요."); return; }
  const lbl = "L"+l+" 문장";
  let arr = shuffle(pool);
  if(state.count!=="all") arr = arr.slice(0, Math.min(Number(state.count), arr.length));
  if(skill==="write" && state.sentBulk){ startSentBulk(arr, lbl); return; }   // 쓰기: 여러 문제 한 번에(시험지처럼)
  if(skill==="speak"){ startSpeak(arr.map(x=>({vn:x.vn, en:x.en, lesson:lbl})), true); return; }   // 말하기: SP 사용
  if(skill==="listen"){ state.mode="listen"; Q.queue=arr.map(x=>listenSentQ(x, lbl)); }
  else if(skill==="read"){ state.mode="read"; Q.queue=arr.map(x=>({type:"sentence", word:{vn:x.vn,en:x.en,lesson:lbl}, dir:"vn2en", prompt:x.vn, answer:x.en})); }
  else { state.mode="type"; Q.queue=arr.map(x=>makeQ({vn:x.vn,en:x.en,lesson:lbl}, dirOf(state.dir), "sentence")); }   // 쓰기: 번역+자동/자가채점
  Q.idx=0; Q.score=0; Q.wrong=[]; Q.wordCount=null; Q.sentCount=null;
  setupQ(); renderQuiz();
}

/* ---------- 문장 여러 개 한 번에 풀기 (시험지처럼) ---------- */
const BULK = { items:[], page:0, per:10, ans:{}, res:{}, graded:false, score:0 };
function startSentBulk(arr, lbl){
  state.mode="bulk";
  BULK.items = arr.map(x=>({vn:x.vn, en:x.en, lesson:lbl, type:"sentence", dir:dirOf(state.dir)}));
  BULK.page=0; BULK.ans={}; BULK.res={}; BULK.graded=false; BULK.score=0;
  renderSentBulk();
}
const bulkPages = () => Math.max(1, Math.ceil(BULK.items.length / BULK.per));
function renderSentBulk(){
  state.screen="bulk";
  const total=BULK.items.length, start=BULK.page*BULK.per, end=Math.min(start+BULK.per, total);
  const rows=[];
  for(let i=start;i<end;i++){
    const it=BULK.items[i];
    const vn2en = it.dir==="vn2en";
    const prompt = vn2en ? it.vn : it.en, answer = vn2en ? it.en : it.vn;
    const pLang = vn2en ? "vi-VN" : "ko-KR", aLang = vn2en ? "ko-KR" : "vi-VN";
    const r = BULK.res[i];
    let resHTML="";
    if(r){
      const badge = r.ok
        ? `<span class="feedback ok" style="display:inline-block;padding:4px 9px;margin:0"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 정답</span>`
        : r.g==="tone"
        ? `<span class="feedback no" style="display:inline-block;padding:4px 9px;margin:0"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-alert'/></svg> 성조·철자 차이 (시험에선 감점)</span>`
        : `<span class="feedback no" style="display:inline-block;padding:4px 9px;margin:0"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 다시 확인</span>`;
      resHTML = `<div style="margin-top:7px">${badge}
        <div class="mycmp" style="margin-top:6px"><b>모범답안</b>${esc(answer)} ${spkBtn(answer,aLang,true)}</div>
        <button class="chip" style="margin-top:6px" data-action="bulkToggle" data-i="${i}">${r.ok?"틀린 걸로 하기":"맞은 걸로 하기"}</button>
      </div>`;
    }
    rows.push(`<div class="card" style="padding:12px 14px">
      <div style="display:flex; gap:9px">
        <span style="font-weight:800; color:var(--brand); flex:0 0 auto">${i+1}.</span>
        <div style="flex:1; min-width:0">
          <div style="font-weight:700; line-height:1.5">${esc(prompt)} ${spkBtn(prompt,pLang,true)}</div>
          <textarea class="answer" data-bi="${i}" rows="2" placeholder="${vn2en?"한국어 번역":"베트남어 번역"}" ${BULK.graded?"disabled":""} autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="margin-top:6px">${esc(BULK.ans[i]||"")}</textarea>
          ${resHTML}
        </div>
      </div>
    </div>`);
  }
  const isLast = BULK.page+1 >= bulkPages();
  const footer = !BULK.graded
    ? `<button class="btn lg" data-action="bulkGrade"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> ${end-start}문제 채점하기</button>`
    : `<button class="btn lg" data-action="bulkNext">${isLast?"결과 보기 →":`다음 ${Math.min(BULK.per, total-end)}문제 →`}</button>`;
  set(`
    <div class="qtop"><span><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-pencil'/></svg> 문장 ${start+1}–${end} / ${total}</span><span>점수 ${BULK.score}</span></div>
    <div class="bar"><i style="width:${Math.round((end/total)*100)}%"></i></div>
    ${rows.join("")}
    ${footer}
    <button class="btn line" style="margin-top:10px" data-action="quitBulk">그만두기</button>
  `);
  view.querySelectorAll("textarea[data-bi]").forEach(t=>{
    t.addEventListener("input", ()=>{ BULK.ans[Number(t.dataset.bi)] = t.value; });
  });
}
function bulkGrade(){
  if(BULK.graded) return;
  const total=BULK.items.length, start=BULK.page*BULK.per, end=Math.min(start+BULK.per, total);
  for(let i=start;i<end;i++){
    const it=BULK.items[i];
    const answer = it.dir==="vn2en" ? it.en : it.vn;
    const typed = (BULK.ans[i]||"").trim();
    const g = typed ? gradeSent(typed, answer) : "no";   // 빈칸은 오답
    const ok = (g==="ok");
    BULK.res[i] = {g, ok};
    if(ok){ BULK.score++; noteRight(it); } else { noteWrong(it); }
  }
  BULK.graded=true;
  renderSentBulk();
}
function bulkToggle(i){
  i=Number(i);
  const r=BULK.res[i]; if(!r) return;
  const it=BULK.items[i];
  r.ok = !r.ok;
  if(r.ok){ BULK.score++; noteRight(it); } else { BULK.score--; noteWrong(it); }
  renderSentBulk();
}
function bulkNext(){
  if(BULK.page+1 >= bulkPages()){ renderBulkDone(); return; }
  BULK.page++; BULK.graded=false; renderSentBulk();
}
function renderBulkDone(){
  state.screen="result";
  const total=BULK.items.length;
  const done=Object.keys(BULK.res).length || total;
  const pct = done ? Math.round((BULK.score/done)*100) : 0;
  const wrong = BULK.items.map((it,i)=>({it, r:BULK.res[i]})).filter(x=>x.r && !x.r.ok);
  set(`
    <div class="card center">
      <div class="emoji">${pct>=70?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-trophy'/></svg>":"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-book'/></svg>"}</div>
      <div class="stat"><div><b>${BULK.score}</b><div class="tiny muted">정답</div></div>
        <div><b>${done}</b><div class="tiny muted">푼 문제</div></div>
        <div><b>${pct}%</b><div class="tiny muted">정답률</div></div></div>
    </div>
    ${wrong.length ? `<div class="card">
      <h2><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 다시 볼 문장 ${wrong.length}개</h2>
      <div class="muted tiny" style="margin:-6px 0 8px"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-book'/></svg> 오답 노트에 저장됐어요.</div>
      ${wrong.map(x=>`<div style="padding:8px 0; border-top:1px solid var(--line)">
        <div style="font-weight:700">${esc(x.it.vn)} ${spkBtn(x.it.vn,"vi-VN",true)}</div>
        <div class="muted tiny" style="margin-top:2px">${esc(x.it.en)}</div>
      </div>`).join("")}
    </div>` : `<div class="card center" style="padding:24px"><div class="emoji"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-star'/></svg></div><b>다 맞혔어요!</b></div>`}
    <button class="btn soft" style="margin-top:10px" data-action="goHome"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-home'/></svg> 처음으로</button>
  `);
}

/* ---------- 시험 진행 ---------- */
const Q = {};
function poolSelected(){
  if(state.selMode==="range"){ const [a,b]=rangeBounds(); return WORDS.slice(a, b+1); }
  return WORDS.filter(w=>state.lessons.has(w.lesson));
}

function start(){
  const pool = poolSelected();
  if(pool.length===0){ alert("먼저 시험 볼 단원을 한 개 이상 골라주세요."); return; }
  if(state.mode==="flash"){ startFlash(pool); return; }
  if(state.mode==="exam"){ startExam(pool); return; }
  let q = shuffle(pool);
  if(state.count!=="all") q = q.slice(0, Math.min(Number(state.count), q.length));
  Q.queue = q.map(w=>makeQ(w, dirOf(state.dir)));
  Q.idx=0; Q.score=0; Q.wrong=[];
  setupQ(); renderQuiz();
}
function startExam(pool){
  const words = shuffle(pool).slice(0, Math.min(40, pool.length));
  const sents = shuffle(SENTS).slice(0, Math.min(10, SENTS.length));
  Q.wordCount = words.length; Q.sentCount = sents.length;
  Q.queue = [
    ...words.map(w=>makeQ(w, dirOf(state.dir), "word")),
    ...sents.map(s=>makeQ({vn:s.vn, en:s.en, lesson:"문장"}, dirOf(state.dir), "sentence"))
  ];
  Q.idx=0; Q.score=0; Q.wrong=[];
  setupQ(); renderQuiz();
}
function startQueue(items){ Q.queue=items; Q.idx=0; Q.score=0; Q.wrong=[]; Q.wordCount=null; Q.sentCount=null; setupQ(); renderQuiz(); }

function setupQ(){
  const q = Q.queue[Q.idx];
  Q.answered=false; Q.picked=null; Q.typed=""; Q.revealed=false; Q.autoOk=false; Q.toneWarn=false;
  if(state.mode==="mc"){
    const key = q.dir==="vn2en" ? "en" : "vn";
    const pkey = q.dir==="vn2en" ? "vn" : "en";
    const seen = new Set([norm(q.answer)]);
    const pn = norm(q.prompt);
    const distract = [];
    for(const w of shuffle(WORDS)){
      if(norm(w[pkey])===pn) continue;
      const v = w[key], nv = norm(v);
      if(seen.has(nv)) continue;
      seen.add(nv); distract.push(v);
      if(distract.length>=3) break;
    }
    const opts = shuffle([q.answer, ...distract]);
    Q.options = opts; Q.correct = opts.indexOf(q.answer);
  }
}

/* 문장 채점: 대소문자·문장부호·띄어쓰기 무시 + 약간의 오차(편집거리 20%)까지 자동 정답. 그 외엔 자가채점으로 넘김 */
function normSent(s){ return String(s).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/đ/g,"d").replace(/[.,!?;:'"“”‘’…()\-–]/g," ").replace(/\s+/g," ").trim(); }  /* 성조·부호·대소문자·띄어쓰기 무시(문장은 번역 맞으면 관대하게) */
function levenshtein(a,b){
  const m=a.length, n=b.length; if(!m) return n; if(!n) return m;
  let prev=Array.from({length:n+1},(_,i)=>i), cur=new Array(n+1);
  for(let i=1;i<=m;i++){ cur[0]=i;
    for(let j=1;j<=n;j++){ const cost=a[i-1]===b[j-1]?0:1; cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost); }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
function sentTokens(s){ return normSent(s).split(" ").filter(Boolean); }
function sentMatch(typed, answer){
  const a=normSent(typed), b=normSent(answer);
  if(!a) return false;
  if(a===b) return true;
  const sim = 1 - levenshtein(a,b)/Math.max(a.length,b.length,1);
  if(sim >= 0.8) return true;   // 사소한 차이(오타·성조 한둘·문장부호)는 자동 정답
  // 어순만 다르거나 불필요어가 붙은 경우: 모범답안의 핵심 단어가 거의 다 들어있으면 자동 정답
  const at=new Set(sentTokens(a)), bt=sentTokens(b);
  if(bt.length>=2){
    const hit=bt.filter(t=>at.has(t)).length;
    if(hit/bt.length >= 0.85) return true;
  }
  return false;
}
/* 성조까지 채점 — ok(성조·철자 정확) / tone(글자는 맞는데 성조·dấu만 달라 시험 감점) / no(내용도 다름) */
function normSentTone(s){ return String(s).toLowerCase().replace(/[.,!?;:'"“”‘’…()\-–]/g," ").replace(/\s+/g," ").trim(); }  /* 성조 유지, 대소문자·부호·띄어쓰기만 무시 */
function gradeSent(typed, answer){
  const aT=normSentTone(typed), bT=normSentTone(answer);
  if(!aT) return "no";
  if(aT===bT) return "ok";                                          // 성조까지 완전 일치
  const bTok=bT.split(" ").filter(Boolean), aSet=new Set(aT.split(" ").filter(Boolean));
  if(bTok.length>=2 && bTok.every(t=>aSet.has(t))) return "ok";     // 정답 단어가 성조까지 다 맞음(어순만 다름)
  if(sentMatch(typed, answer)) return "tone";                       // 성조 빼면 맞음 → 성조·철자만 다름
  return "no";
}
function renderQuiz(){
  const q = Q.queue[Q.idx], n = Q.queue.length;
  const pct = Math.round((Q.idx/(n))*100);
  const isSent = q.type==="sentence";
  const isListen = state.mode==="listen";
  const isRead = state.mode==="read";
  const kind = state.mode==="mc" ? "mc" : (isRead ? "read" : (isSent ? "sent" : "word"));
  const promptLang = (q.dir==="vn2en" || q.dictation) ? "vi-VN" : "ko-KR";   // 받아쓰기는 소리=베트남어
  const ansLang = q.dictation ? "vi-VN" : (q.dir==="vn2en" ? "ko-KR" : "vi-VN");

  // 진행 라벨 (실전시험이면 단어/문장 구분)
  let counter = `문제 ${Q.idx+1} / ${n}`;
  if(state.mode==="exam" && Q.wordCount!=null){
    counter = (Q.idx < Q.wordCount)
      ? `<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-note'/></svg> 단어 ${Q.idx+1} / ${Q.wordCount}`
      : `<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-pencil'/></svg> 문장 ${Q.idx - Q.wordCount + 1} / ${Q.sentCount}`;
  } else if(state.mode==="exam"){
    counter = (isSent ? "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-pencil'/></svg> 문장" : "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-note'/></svg> 단어") + ` ${Q.idx+1} / ${n}`;
  }

  const subText = isRead
    ? (Q.revealed ? "뜻을 확인하세요" : "소리 내어 읽고, 뜻을 떠올려 보세요")
    : isListen
    ? (Q.answered ? "" : (isSent ? "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-volume'/></svg> 잘 듣고, 베트남어 문장을 그대로 적으세요" : "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-volume'/></svg> 잘 듣고, 들은 베트남어를 적으세요"))
    : isSent
    ? (q.dir==="vn2en" ? "이 문장을 한국어로 번역하세요" : "이 문장을 베트남어로 번역하세요")
    : (q.dir==="vn2en" ? "이 단어의 한국어 뜻은?" : "이 뜻의 베트남어 단어는?");

  let body = "", fb = "";
  const nextBtn = `<button class="btn" style="margin-top:12px" data-action="next">${Q.idx+1>=n?"결과 보기 →":"다음 →"}</button>`;

  if(kind==="mc"){
    body = Q.options.map((o,i)=>{
      let cls = "opt";
      if(Q.answered){ if(i===Q.correct) cls+=" correct"; else if(i===Q.picked) cls+=" wrong"; }
      return `<button class="${cls}" data-action="pick" data-i="${i}" ${Q.answered?"disabled":""}>
        <span class="num">${i+1}</span>${esc(o)}</button>`;
    }).join("");
    if(Q.answered){
      const ok = Q.picked===Q.correct;
      fb = `<div class="feedback ${ok?"ok":"no"}">${ok?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 정답이에요!":"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 아쉬워요"}
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${nextBtn}`;
    }
  } else if(kind==="word"){
    body = `<input class="answer" id="ansInput" placeholder="정답 입력 후 Enter" ${Q.answered?"disabled":""} value="${esc(Q.typed||"")}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      ${!Q.answered?`<button class="btn" style="margin-top:12px" data-action="check">확인</button>`:""}`;
    if(Q.answered){
      const head = Q.lastOk ? "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 정답이에요!" : (Q.toneOnly ? "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-alert'/></svg> 성조가 틀려요 (철자는 맞아요!)" : "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 아쉬워요");
      const meaningLine = (q.dictation && q.meaning) ? `<div class="promptsub" style="margin-top:8px">뜻: <b>${esc(q.meaning)}</b></div>` : "";
      fb = `<div class="feedback ${Q.lastOk?"ok":"no"}">${head}
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${meaningLine}${nextBtn}`;
    }
  } else if(kind==="read"){   // 읽기: 입력 없이 읽고 '뜻 보기'로 확인
    if(!Q.revealed){
      body = `<button class="btn" data-action="revealRead"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-eye'/></svg> 뜻 보기</button>`;
    } else {
      const rw = Q.queue[Q.idx].word;
      const starred = noteHas(rw);
      fb = `<div class="feedback ok"><span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>
        <div class="btn2" style="margin-top:12px">
          <button class="btn soft" data-action="readStar">${starred?"★ 다시 볼 단어에서 빼기":"☆ 다시 볼 단어에 넣기"}</button>
          <button class="btn" data-action="next">${Q.idx+1>=n?"다 읽었어요 →":"다음 →"}</button>
        </div>`;
    }
  } else { // 문장 번역 (타자 입력 → 자동채점 + 자가채점 보완)
    const modelLabel = q.dictation ? "정답 문장" : "모범 번역";
    const sentMeaning = (q.dictation && q.meaning) ? `<div class="promptsub" style="margin-top:6px">뜻: <b>${esc(q.meaning)}</b></div>` : "";
    const modelBlock = `<div class="feedback ok"><span style="font-weight:700">${modelLabel}</span>
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${sentMeaning}`;
    const myBlock = Q.typed ? `<div class="mycmp"><b>내 답</b>${esc(Q.typed)}</div>` : "";
    if(!Q.revealed && !Q.answered){
      body = `<textarea class="answer" id="sentInput" rows="2" placeholder="${q.dictation?"들은 베트남어 문장을 그대로 적으세요":(q.dir==="vn2en"?"한국어 번역을 입력하세요":"베트남어 번역을 입력하세요")}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">${esc(Q.typed||"")}</textarea>
        <div class="btn2" style="margin-top:12px"><button class="btn soft" data-action="revealSent"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-eye'/></svg> 모르겠어요 / 모범답안</button><button class="btn" data-action="checkSent"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 채점하기</button></div>`;
    } else if(Q.answered && Q.autoOk){   // 자동 정답
      fb = `<div class="feedback ok"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 정답이에요!</div>${myBlock}${modelBlock}${nextBtn}`;
    } else if(!Q.answered){              // 자동 못 맞춤 / 성조 차이 / 모르겠어요 → 자가채점
      const toneBanner = Q.toneWarn ? `<div class="feedback no" style="margin-bottom:8px"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-alert'/></svg> 성조·철자가 달라요 — 실제 시험에선 감점될 수 있어요. 모범답안과 꼭 비교하세요.</div>` : "";
      const selfHint = Q.toneWarn ? "성조까지 정확한지 확인하고 스스로 채점하세요" : (Q.typed?"내가 쓴 답이 뜻만 맞아도 '맞았어요'를 눌러요":"내 번역과 비교해보세요 — 맞았나요?");
      fb = `${toneBanner}${myBlock}${modelBlock}
        <div class="promptsub" style="margin-top:12px">${selfHint}</div>
        <div class="btn2"><button class="btn soft" data-action="selfWrong"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 틀렸어요</button><button class="btn" data-action="selfRight"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 맞았어요</button></div>`;
    } else {                             // 자가채점 결과
      fb = `<div class="feedback ${Q.lastOk?"ok":"no"}">${Q.lastOk?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg> 맞음 처리":"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 틀림 처리"}
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${myBlock}${nextBtn}`;
    }
  }

  const dirTagHTML = isListen ? `<span class="dirtag"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-headphones'/></svg> 듣기 · 받아쓰기 (베트남어로 적기)</span>` : isRead ? `<span class="dirtag"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-eye'/></svg> 읽기 · 베트남어 읽고 뜻 확인</span>` : `<span class="dirtag">${DIRLABEL[q.dir]}</span>`;
  const promptBlock = (isListen && !Q.answered && !Q.revealed)
    ? `<div class="listenbox">
         <button class="bigspk" data-action="speak" data-text="${esc(q.prompt)}" data-lang="${promptLang}" aria-label="다시 듣기"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-volume'/></svg></button>
         <div class="listenhint">${isSent?"소리를 듣고 베트남어 문장을 적어요":"소리를 듣고 베트남어를 적어요"} · 탭하면 다시 들려요</div>
       </div>`
    : `<div class="prompt${isSent?" sent":""}">${esc(q.prompt)} ${spkBtn(q.prompt, promptLang)}</div>`;
  set(`
    <div class="qtop"><span>${counter}</span><span>${isRead?"읽기 연습":"점수 "+Q.score}</span></div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="card">
      ${dirTagHTML}
      ${promptBlock}
      <div class="promptsub">${subText}</div>
      ${body}
      ${fb}
    </div>
    <button class="btn line" data-action="quit">그만두기</button>
  `);

  if(kind==="word" && !Q.answered){
    const inp = document.getElementById("ansInput");
    if(inp){ inp.focus(); inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); e.stopPropagation(); checkTyped(); } }); }
  }
  if(kind==="sent" && !Q.revealed && !Q.answered){
    const si = document.getElementById("sentInput");
    if(si){ si.focus(); si.addEventListener("keydown",e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); e.stopPropagation(); actions.checkSent(); } }); }  // Enter=채점, Shift+Enter=줄바꿈
  }
  if(isListen && !Q.answered && !Q.revealed){ setTimeout(()=>speak(q.prompt, promptLang), 300); }
  if(Q.answered){ document.addEventListener("keydown", onAdvance); }
}
function onAdvance(e){ if(e.key==="Enter"){ document.removeEventListener("keydown", onAdvance); next(); } }

function pick(i){
  if(Q.answered) return;
  Q.answered=true; Q.picked=Number(i);
  const w=Q.queue[Q.idx].word;
  if(Q.picked===Q.correct){ Q.score++; noteRight(w); }
  else { Q.wrong.push(wrongItem()); noteWrong(w); }
  renderQuiz();
}
function checkTyped(){
  if(Q.answered) return;
  const inp = document.getElementById("ansInput");
  Q.typed = inp ? inp.value : "";
  const q = Q.queue[Q.idx];
  Q.toneOnly = false;
  if(q.dictation){   // 받아쓰기: 들은 베트남어 그대로 (성조까지 채점, 그 단어만 정답)
    const r = checkVnTyped(q.answer, Q.typed);
    Q.lastOk = (r==="ok"); Q.toneOnly = (r==="tone");
  } else if(q.dir==="en2vn"){   // 답이 베트남어 → 성조까지 채점 (같은 뜻의 다른 베트남어도 정답 인정)
    const r = checkVnAny(q.prompt, q.answer, Q.typed);
    Q.lastOk = (r==="ok"); Q.toneOnly = (r==="tone");
  } else {
    Q.lastOk = isCorrectTyped(q.answer, Q.typed);
  }
  Q.answered = true;
  if(Q.lastOk){ Q.score++; noteRight(q.word); } else { Q.wrong.push(wrongItem()); noteWrong(q.word); }
  renderQuiz();
}
function wrongItem(){ const q=Q.queue[Q.idx]; return {vn:q.word.vn, en:q.word.en, lesson:q.word.lesson, dir:q.dir, type:q.type, dictation:!!q.dictation}; }
function next(){
  document.removeEventListener("keydown", onAdvance);
  Q.idx++;
  if(Q.idx>=Q.queue.length){ renderResult(); return; }
  setupQ(); renderQuiz();
}
function quit(){
  if(confirm("시험을 그만둘까요? 지금까지 결과를 보여드릴게요.")){
    document.removeEventListener("keydown", onAdvance);
    renderResult();
  }
}

/* ---------- 결과 ---------- */
function renderReadDone(){
  state.screen="result";
  const n = Q.queue.length;
  set(`
    <div class="card center" style="padding:30px 20px">
      <div class="emoji"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg></div>
      <h2 style="margin:10px 0 4px">${n}개 다 읽었어요!</h2>
      <div class="muted tiny">입력 없이 읽기 연습을 마쳤어요.</div>
      <div class="btn2" style="margin-top:18px">
        <button class="btn soft" data-action="startSkill"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-repeat'/></svg> 다시 읽기</button>
        <button class="btn" data-action="goHome"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-home'/></svg> 처음으로</button>
      </div>
    </div>
  `);
}
function renderResult(){
  if(state.mode==="read"){ return renderReadDone(); }
  const done = Q.idx + (Q.answered?1:0);
  const answered = Math.min(done, Q.queue.length) || Q.score+Q.wrong.length;
  const total = answered || Q.queue.length;
  const pct = total ? Math.round((Q.score/total)*100) : 0;
  lsSet("_wrong", Q.wrong);
  let msg = pct>=90?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-star'/></svg> 완벽해요! 시험 준비 끝!" : pct>=70?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-thumb'/></svg> 잘하고 있어요. 조금만 더!" : pct>=40?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-star'/></svg> 틀린 단어 위주로 복습해요." : "<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-star'/></svg> 천천히, 반복이 답이에요!";
  const wrongList = Q.wrong.length ? `
    <div class="card">
      <h2><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-x'/></svg> 틀린 단어 ${Q.wrong.length}개</h2>
      <div class="muted tiny" style="margin:-6px 0 10px"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-book'/></svg> 오답 노트에 저장됐어요 — 홈에서 모아서 집중 복습할 수 있어요.</div>
      <div class="wlist">
        ${Q.wrong.map(w=>`<div class="wrow">
          <span class="lz">${lessonLabel(w.lesson)}</span>
          <span class="wvn">${esc(w.vn)}</span>
          <span class="wen">${esc(w.en)}</span>
          ${spkBtn(w.vn,"vi-VN",true)}
        </div>`).join("")}
      </div>
    </div>` : `<div class="card center" style="padding:24px"><div class="emoji"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-star'/></svg></div><b>다 맞혔어요!</b></div>`;

  set(`
    <div class="card center">
      <div class="emoji">${pct>=70?"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-trophy'/></svg>":"<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-book'/></svg>"}</div>
      <div class="stat"><div><b>${Q.score}</b><div class="tiny muted">정답</div></div>
        <div><b>${total}</b><div class="tiny muted">문제</div></div>
        <div><b>${pct}%</b><div class="tiny muted">정답률</div></div></div>
      <div class="muted" style="margin-top:6px">${msg}</div>
    </div>
    ${wrongList}
    ${Q.wrong.length?`<button class="btn" data-action="retryWrong"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-repeat'/></svg> 틀린 단어만 다시 풀기</button>`:""}
    <button class="btn soft" style="margin-top:10px" data-action="goHome"><svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-home'/></svg> 처음으로</button>
  `);
}
/* 오답 다시풀기: 받아쓰기 문항은 받아쓰기로 복원 */
function rebuildQ(w){
  if(w.dictation){
    return w.type==="sentence" ? listenSentQ({vn:w.vn,en:w.en}, w.lesson) : listenWordQ({vn:w.vn,en:w.en,lesson:w.lesson});
  }
  return makeQ({vn:w.vn,en:w.en,lesson:w.lesson}, w.dir, w.type);
}
function retryWrong(){
  const items = Q.wrong.map(rebuildQ);
  if(!items.length) return goHome();
  if(items.some(i=>i.dictation)) state.mode="listen";
  if(state.mode==="flash"){ startFlash(items.map(i=>i.word)); return; }
  startQueue(items);
}
function retryLast(){
  const lw = lsGet("_wrong", []);
  if(!lw.length) return;
  const items = lw.map(rebuildQ);
  if(items.some(i=>i.dictation)) state.mode="listen";
  startQueue(items);
}

/* ---------- 오답 노트 ---------- */
const GRAD = 2; // 연속 정답 GRAD번이면 노트에서 졸업(자동 제거)
function lc2(s){ return String(s).trim().toLowerCase(); }
function noteKey(w){ return lc2(w.vn)+"||"+lc2(w.en); }
function loadNote(){ return lsGet("_notebook", []); }
function saveNote(a){ lsSet("_notebook", a); }
function noteHas(w){ const k=noteKey(w); return loadNote().some(e=>noteKey(e)===k); }
function noteAdd(w){ const a=loadNote(),k=noteKey(w); if(!a.some(e=>noteKey(e)===k)){ a.push({vn:w.vn,en:w.en,lesson:w.lesson,type:w.type||"word",streak:0}); saveNote(a); } }
function noteWrong(w){ const a=loadNote(),k=noteKey(w),e=a.find(x=>noteKey(x)===k); if(e){ e.streak=0; } else { a.push({vn:w.vn,en:w.en,lesson:w.lesson,type:w.type||"word",streak:0}); } saveNote(a); }
function noteRight(w){ const a=loadNote(),k=noteKey(w),i=a.findIndex(x=>noteKey(x)===k); if(i<0) return; a[i].streak=(a[i].streak||0)+1; if(a[i].streak>=GRAD) a.splice(i,1); saveNote(a); }
function seedNote(){
  /* 동기 공유용으로 '시험 오답 자동 등록'을 껐습니다.

     이미 등록된 오답은 각 기기 localStorage(_notebook)에 그대로 유지됩니다. */
}

/* ---------- 백업 / 복원 ---------- */
function exportData(){
  return JSON.stringify({ app:"gybm-wordnote", v:1, notebook:loadNote(), custom:lsGet("_custom",[]) });
}
function fallbackCopy(okMsg){
  const ta=document.getElementById("exportBox");
  if(ta){ ta.focus(); ta.select(); try{ if(document.execCommand("copy")){ alert(okMsg); return; } }catch(e){} }
  alert("자동 복사가 안 되네요. 위 박스의 글자를 길게 눌러 전체 선택 후 복사하세요.");
}
function copyExport(){
  const text=exportData(), msg="복사됐어요! 카톡으로 나에게 보내거나, 다른 브라우저에 붙여넣어 복원하세요.";
  bkMark();   // 백업함 → 넛지 리셋
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>alert(msg), ()=>fallbackCopy(msg)); return; }
  }catch(e){}
  fallbackCopy(msg);
}
function downloadExport(){
  try{
    const blob=new Blob([exportData()],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="단어시험_백업.json"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    bkMark();   // 백업함 → 넛지 리셋
  }catch(e){ alert("파일 저장이 안 되면 '복사하기'를 이용해 주세요."); }
}
function importBackup(text){
  let obj;
  try{ obj=JSON.parse((text||"").trim()); }catch(e){ return {ok:false,msg:"형식이 올바르지 않아요. 백업 코드 전체를 정확히 붙여넣었는지 확인하세요."}; }
  if(!obj || obj.app!=="gybm-wordnote"){ return {ok:false,msg:"이 앱의 백업 코드가 아니에요."}; }
  let an=0, ac=0;
  if(Array.isArray(obj.notebook)){
    const cur=loadNote(), seen=new Set(cur.map(noteKey));
    obj.notebook.forEach(e=>{ if(e&&e.vn&&e.en&&!seen.has(noteKey(e))){ cur.push({vn:e.vn,en:e.en,lesson:e.lesson,type:e.type||"word",streak:e.streak||0}); seen.add(noteKey(e)); an++; } });
    saveNote(cur);
  }
  if(Array.isArray(obj.custom)){
    const cur=lsGet("_custom",[]), k=c=>lc2(c.vn)+"||"+lc2(c.en), seen=new Set(cur.map(k));
    obj.custom.forEach(c=>{ if(c&&c.vn&&c.en&&!seen.has(k(c))){ cur.push({vn:c.vn,en:c.en}); seen.add(k(c)); ac++; } });
    lsSet("_custom",cur); buildWords();
  }
  bkMark();   // 복원했으면 백업본이 있는 것 → 넛지 리셋
  return {ok:true,msg:`완료! 오답 노트 ${an}개, 내 단어 ${ac}개를 새로 합쳤어요. (이미 있던 건 그대로 유지)`};
}

    r.readAsText(file);
  });
}

function curListWords(){
  let arr = WORDS.filter(w=>{

    if(L.q){ const k=norm(L.q); if(!norm(w.vn).includes(k) && !norm(w.en).includes(k)) return false; }

  });
  if(L.lesson==="all" && arr.some(w=>w.lesson==="custom")){
    const cu=arr.filter(w=>w.lesson==="custom"), rest=arr.filter(w=>w.lesson!=="custom");

function wordDocHtml(list, label, q, withLesson){

  try{
    const blob = new Blob(['﻿'+html], {type:'application/msword'});

let addBusy = false;
function lookupLocal(dir, text){
  if(dir==="vn2ko"){
    const t=text.toLowerCase().trim();
    const w = WORDS.find(x=>x.vn.toLowerCase().trim()===t) || WORDS.find(x=>norm(x.vn)===norm(text));
    return w ? w.en : null;
  } else {
    const t=text.toLowerCase().trim();
    const w = WORDS.find(x=>x.en.toLowerCase().trim()===t)
           || WORDS.find(x=>x.en.split(/[,;/]/).map(s=>s.trim().toLowerCase()).includes(t))
           || WORDS.find(x=>norm(x.en)===norm(text));
    return w ? w.vn : null;
  }
}
async function translateOnline(text, pair){
  const url="https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair="+encodeURIComponent(pair);
  const r=await fetch(url);
  const j=await r.json();
  let t=j && j.responseData && j.responseData.translatedText;
  if(!t) return null;
  if(/MYMEMORY WARNING|PLEASE SELECT|INVALID|NO QUERY|QUERY LENGTH LIMIT/i.test(t)) return null;
  return String(t).trim();
}
let addStatusTimer=null;
function setAddStatus(html, cls, autoClearMs){
  const s=document.getElementById("addStatus");
  if(!s) return;
  if(addStatusTimer){ clearTimeout(addStatusTimer); addStatusTimer=null; }
  s.className="addstatus "+(cls||"");
  s.innerHTML=html||"";
  if(autoClearMs){
    addStatusTimer=setTimeout(()=>{
      const cur=document.getElementById("addStatus");
      if(cur){ cur.classList.add("fading"); }
      setTimeout(()=>{ const c2=document.getElementById("addStatus"); if(c2){ c2.className="addstatus"; c2.innerHTML=""; } }, 260);
      addStatusTimer=null;
    }, autoClearMs);
  }

const _icCheck="<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-check'/></svg>";
const _icAlert="<svg class='ic' viewBox='0 0 24 24' aria-hidden='true'><use href='#i-alert'/></svg>";
async function doAutoFill(){
  if(addBusy) return;
  const vnEl=document.getElementById("inVn"), enEl=document.getElementById("inEn");
  if(!vnEl||!enEl) return;
  const vn=vnEl.value.trim(), en=enEl.value.trim();
  let dir;
  if(vn && !en) dir="vn2ko";
  else if(en && !vn) dir="ko2vn";
  else if(!vn && !en){ setAddStatus("먼저 베트남어나 한국어를 한쪽에 입력하세요.","warn"); return; }
  else { setAddStatus("",""); return; }   // 둘 다 채워져 있으면 할 일 없음
  const src = dir==="vn2ko" ? vn : en;
  const dstEl = dir==="vn2ko" ? enEl : vnEl;
  // ① 교재에서 찾기
  const local = lookupLocal(dir, src);
  if(local){
    dstEl.value = local; dstEl.classList.remove("needcheck");
    setAddStatus(_icCheck+" 교재에서 찾았어요","ok");
    return;
  }
  // ② 인터넷 번역
  addBusy=true; setAddStatus("번역하는 중…","busy");
  try{
    const t = await translateOnline(src, dir==="vn2ko" ? "vi|ko" : "ko|vi");
    if(dstEl.value.trim()){ setAddStatus("",""); return; }   // 그 사이 직접 입력했으면 안 덮음
    if(t){
      dstEl.value=t; dstEl.classList.add("needcheck");
      setAddStatus(_icAlert+" 자동 번역이에요 — 맞는지 꼭 확인하세요","warn");
    } else {
      setAddStatus("자동완성을 못 찾았어요. 직접 입력해 주세요.","warn");
    }
  } catch(e){
    setAddStatus("인터넷이 없어 자동 번역을 못 했어요. 직접 입력해 주세요.","warn");
  } finally { addBusy=false; }
}

/* 우선출제: '오늘 배운 단어' = 13단원(오늘 배운 ★) + 아래 기존 단어들 */
const REVIEW_EXTRA = ["bận","đói","buồn ngủ","khác","nghĩ","về","tuy nhiên","nhưng","nhau","biết","ít","nhiều","sữa","chợ","chơi","cuối tuần","đến","trường","đại học","khoa học","xã hội","nhân văn","thành phố","Tây Ban Nha","đá","hàng ngày"];
const REVIEW_EXTRA_N = new Set(REVIEW_EXTRA.map(norm));
const isReviewWord = w => w.lesson===13 || REVIEW_EXTRA_N.has(norm(w.vn));
const P = { dir:"random", count:"all", format:"wordsent", version:0, wordQs:[], sentQs:[], priority:false, sentPick:new Set(), onePage:true };  /* sentPick: 시험지 문장범위 다중선택(빈 Set=전체) */

function genPaper(bump){
  const rawPool = poolSelected();
  const lc = s => s.trim().toLowerCase();
  // 0) 우선출제 ON: '오늘 배운 단어'를 선택 범위에 없어도 함께 포함
  let basePool = rawPool.slice();
  if(P.priority){
    const have = new Set(basePool.map(w=>lc(w.vn)+"||"+lc(w.en)));
    WORDS.forEach(w=>{ const k=lc(w.vn)+"||"+lc(w.en); if(isReviewWord(w) && !have.has(k)){ basePool.push(w); have.add(k); } });
  }
  // 1) 같은 단어쌍 중복 제거 (책에서 여러 단원에 반복되는 동일 단어)
  const seenPair = new Set();
  let pool = basePool.filter(w=>{ const k=lc(w.vn)+"||"+lc(w.en); if(seenPair.has(k)) return false; seenPair.add(k); return true; });
  pool = shuffle(pool);
  // 우선출제 ON: '오늘 배운 단어'를 시험지 앞쪽으로
  if(P.priority){ pool = [...pool.filter(isReviewWord), ...pool.filter(w=>!isReviewWord(w))]; }
  if(bump || !P.version) P.version = (P.version||0)+1;
  // 2) 방향 배정 + 화면에 보이는 문제(단어) 중복 제거
  const seenPrompt = new Set();
  const qs = [];
  for(const w of pool){
    let d = P.dir==="random" ? (Math.random()<.5?"vn2en":"en2vn") : P.dir;
    const meaning = w.eng || w.en;   // 시험지 '뜻→베트남어'(en2vn)는 교재 영어 뜻(없으면 한국어). '베→뜻'(vn2en)은 한국어 유지
    let prompt = d==="vn2en" ? w.vn : meaning;
    if(seenPrompt.has(lc(prompt))){
      const d2 = d==="vn2en" ? "en2vn" : "vn2en";
      const p2 = d2==="vn2en" ? w.vn : meaning;
      if(P.dir==="random" && !seenPrompt.has(lc(p2))){ d=d2; prompt=p2; }  // 반대 방향으로 회피
      else continue;                                                        // 그래도 겹치면 제외
    }
    seenPrompt.add(lc(prompt));
    qs.push({ vn:w.vn, en:w.en, dir:d, prompt, answer:d==="vn2en"?w.en:w.vn });
  }
  // 단어 문제 수: 단어+문장 구성이면 40개, 단어만이면 선택한 문제 수
  const wordLimit = P.format==="wordsent" ? 40 : (P.count==="all" ? qs.length : Number(P.count));
  P.wordQs = qs.slice(0, Math.min(wordLimit, qs.length));
  // 문장 문제 (단어+문장 구성일 때만 10개)
  if(P.format==="wordsent"){
    const sentPool = P.sentPick.size ? sentLessons().filter(l=>P.sentPick.has(l)).flatMap(l=>paperSents(l)) : allPaperSentences();
    P.sentQs = shuffle(sentPool).slice(0, Math.min(10, sentPool.length)).map(s=>{
      const d = P.dir==="random" ? (Math.random()<.5?"vn2en":"en2vn") : P.dir;
      return { dir:d, prompt:d==="vn2en"?s.vn:s.en, answer:d==="vn2en"?s.en:s.vn };
    });
  } else {
    P.sentQs = [];
  }
  renderPaper();
}

    renderQuiz(); },
  selfRight:()=>{ if(Q.answered) return; Q.answered=true; Q.lastOk=true; Q.score++; noteRight(Q.queue[Q.idx].word); renderQuiz(); },
  selfWrong:()=>{ if(Q.answered) return; Q.answered=true; Q.lastOk=false; Q.wrong.push(wrongItem()); noteWrong(Q.queue[Q.idx].word); renderQuiz(); },
  flip:()=>{ F.flip=!F.flip; renderFlash(); },
  nextCard:()=>{ if(F.idx+1>=F.cards.length){ goHome(); } else { F.idx++; F.flip=false; renderFlash(); } },
  prevCard:()=>{ if(F.idx>0){ F.idx--; F.flip=false; renderFlash(); } },
  shuffleF:()=>{ F.cards=shuffle(F.cards); F.idx=0; F.flip=false; renderFlash(); },
  toggleLesson:(el)=>{ const l=el.dataset.l==="custom"?"custom":Number(el.dataset.l); if(state.lessons.has(l)) state.lessons.delete(l); else state.lessons.add(l); refresh(); },
  allLessons:()=>{ lessonsList().forEach(l=>state.lessons.add(l)); refresh(); },
  noLessons:()=>{ state.lessons.clear(); refresh(); },
  selMode:(el)=>{ state.selMode=el.dataset.v; lsSet("_selMode",state.selMode); refresh(); },
  goPaper:()=>genPaper(false),
  paperDir:(el)=>{ P.dir=el.dataset.v; paperKeep(()=>genPaper(false)); },
  paperCount:(el)=>{ P.count=el.dataset.v==="all"?"all":Number(el.dataset.v); paperKeep(()=>genPaper(false)); },
  paperFormat:(el)=>{ P.format=el.dataset.v; paperKeep(()=>genPaper(false)); },
  paperPriority:()=>{ P.priority=!P.priority; paperKeep(()=>genPaper(false)); },
  paperOne:()=>{ P.onePage=!P.onePage; paperKeep(()=>renderPaper()); },   // A4 한 장 압축 토글(표시만)
  paperSentLesson:(el)=>{ if(el.dataset.l==="all"){ P.sentPick.clear(); } else { const l=Number(el.dataset.l); P.sentPick.has(l)?P.sentPick.delete(l):P.sentPick.add(l); } paperKeep(()=>genPaper(false)); },   // 문장범위 다중선택(토글), 전체=비움
  regenPaper:()=>genPaper(true),
  printPaperOnly:()=>printOnly("paper"),   // 시험지만 인쇄/저장(정답지 숨김)
  printKeyOnly:()=>printOnly("key"),       // 정답지만 인쇄/저장(시험지 숨김)
  mode:(el)=>{ state.mode=el.dataset.v; lsSet("_mode",state.mode); renderHome(); },
  dir:(el)=>{ state.dir=el.dataset.v; lsSet("_dir",state.dir); renderHome(); },
  count:(el)=>{ state.count=el.dataset.v==="all"?"all":Number(el.dataset.v); lsSet("_count",state.count); refresh(); },
  listFilter:(el)=>{ L.lesson=el.dataset.l==="all"?"all":(el.dataset.l==="custom"?"custom":Number(el.dataset.l)); renderList(); },
  toggleHide:()=>{ L.hide=!L.hide; renderList(); },
  addWord, autoFill:doAutoFill, exportWord:exportWordDoc, exportPicked,
  toggleMulti:()=>{ L.multi=!L.multi; if(L.multi && L.pick.size===0 && L.lesson!=="all") L.pick.add(L.lesson); renderList(); },
  pickLesson:(el)=>{ const l=el.dataset.l==="custom"?"custom":Number(el.dataset.l); if(L.pick.has(l)) L.pick.delete(l); else L.pick.add(l); renderList(); },
  pickAll:()=>{ L.pick=new Set(lessonsList()); renderList(); },
  pickClear:()=>{ L.pick.clear(); renderList(); },
  delWord:(el)=>delWord(el.dataset.i),
  goNote, startNote, goSent, startSent, goBackup, goTelex, goVoice, copyExport, downloadExport,
  snoozeBackup:()=>{ bkMark(); renderHome(); },
  pickVoice:(el)=>{ lsSet("_voiceURI", el.dataset.uri||""); renderVoice(); speak(TTS_SAMPLE,"vi-VN"); },
  testVoice:()=>{ speak(TTS_SAMPLE,"vi-VN"); },
  sentLesson:(el)=>{ state.sentLesson=Number(el.dataset.l); renderSentSetup(); },
  sentDir:(el)=>{ state.dir=el.dataset.v; lsSet("_dir",state.dir); renderSentSetup(); },
  doImport:()=>{ const t=document.getElementById("importBox"); const res=importBackup(t?t.value:""); alert(res.msg); if(res.ok) renderBackup(); },
  removeNote:(el)=>{ const a=loadNote(); a.splice(Number(el.dataset.i),1); saveNote(a); renderNote(); },
  noteDir:(el)=>{ state.dir=el.dataset.v; lsSet("_dir",state.dir); renderNote(); },
  addNoteWord:()=>addNoteManual("word"),
  addNoteSent:()=>addNoteManual("sentence"),
  starWord:(el)=>{ const w=WORDS.find(x=>x.id===Number(el.dataset.id)); if(!w) return; if(noteHas(w)){ const a=loadNote().filter(e=>noteKey(e)!==noteKey(w)); saveNote(a); } else { noteAdd(w); } renderList(); },
  goSkill:(el)=>goSkill(el.dataset.skill), startSkill,
  setupDir:(el)=>{ state.dir=el.dataset.v; lsSet("_dir",state.dir); renderSetup(); },
  studyKind:(el)=>{ state.studyKind=el.dataset.v; lsSet("_skind",state.studyKind); renderSetup(); },
  sentBulk:(el)=>{ state.sentBulk = el.dataset.v==="1"; lsSet("_sbulk", state.sentBulk); renderSetup(); },
  bulkGrade, bulkNext,
  bulkToggle:(el)=>bulkToggle(el.dataset.i),
  quitBulk:()=>{ if(confirm("그만둘까요? 지금까지 채점한 결과를 보여드릴게요.")) renderBulkDone(); },
  studySentLesson:(el)=>{ state.sentLesson=Number(el.dataset.l); renderSetup(); },
  speakCard:()=>speak(SP.cards[SP.idx].vn,"vi-VN"),
  revealSpeak:()=>{ SP.revealed=true; renderSpeak(); },
  speakAgain:()=>speakAdvance(true),
  speakNext:()=>speakAdvance(false),
  speak:(el)=>speak(el.dataset.text, el.dataset.lang)
};
view.addEventListener("click", e=>{
  const t = e.target.closest("[data-action]");
  if(!t) return;
  const fn = actions[t.dataset.action];
  if(fn){ e.preventDefault(); fn(t, e); }
});

/* =========================================================
   7) 시작!
   ========================================================= */
buildWords();
seedNote();
// 앱 시작 시 단원은 '전체 해제' 상태(아무 것도 선택 안 됨) — 시험지·홈 모두. 사용자가 필요한 단원만 골라 씀(사용자 요청 2026-07-03)
state.rStart = 0; state.rEnd = WORDS.length-1;
goHome();
bindZoom(); applyZoom();
requestPersist();   // 브라우저에 '데이터 자동 삭제 하지 마' 요청
</script>
</body>
</html>
