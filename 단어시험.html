<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>단어 시험 · 베트남어 ↔ 한국어</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#1f2430; --muted:#6b7280;
    --line:#e6e9f0; --brand:#5f6fa6; --brand2:#7482b3; --brandsoft:#eceef6;
    --good:#3f885d; --goodsoft:#eaf3ed; --bad:#bd574f; --badsoft:#f6edeb;
    --accent:#418379; --shadow:0 6px 22px rgba(31,36,48,.07);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1320; --card:#191f30; --ink:#eef1f8; --muted:#9aa3b5;
      --line:#2a3145; --brand:#707bb0; --brand2:#7d88bb; --brandsoft:#272e46;
      --good:#56ad7d; --goodsoft:#17301e; --bad:#d77d75; --badsoft:#352020;
      --accent:#4f9c90; --shadow:0 6px 22px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    padding-bottom:40px;
  }
  .topbar{
    position:sticky; top:0; z-index:10; background:var(--card);
    border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;
    padding:12px 16px;
  }
  .brand{
    font-size:18px; font-weight:800; color:var(--ink); background:none; border:none;
    cursor:pointer; padding:0; display:flex; align-items:center; gap:8px;
  }
  .sub{font-size:12px; color:var(--muted); margin-left:auto}
  .wrap{max-width:680px; margin:0 auto; padding:16px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:18px; margin-bottom:14px}
  h2{font-size:15px; margin:0 0 12px; color:var(--muted); font-weight:700; letter-spacing:.2px}
  .row{display:flex; flex-wrap:wrap; gap:8px}
  .chip{
    border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    padding:8px 12px; border-radius:999px; font-size:14px; cursor:pointer; font-weight:600;
    transition:.12s; user-select:none;
  }
  .chip.on{background:var(--brandsoft); border-color:var(--brand); color:var(--brand)}
  .chip small{color:var(--muted); font-weight:500}
  .chip.on small{color:var(--brand)}
  .seg{display:flex; gap:8px; flex-wrap:wrap}
  .seg button{
    flex:1; min-width:96px; border:1.5px solid var(--line); background:var(--card);
    color:var(--ink); padding:12px 10px; border-radius:14px; font-size:14px; font-weight:700;
    cursor:pointer; transition:.12s;
  }
  .seg button.on{background:var(--brand); border-color:var(--brand); color:#fff}
  .seg .desc{display:block; font-size:11px; font-weight:500; opacity:.8; margin-top:2px}
  .btn{
    width:100%; border:none; border-radius:16px; padding:16px; font-size:17px; font-weight:800;
    background:var(--brand); color:#fff; cursor:pointer; transition:.12s;
  }
  .btn:active{transform:scale(.99)}
  .btn.lg{padding:18px}
  .btn.ghost{background:var(--brandsoft); color:var(--brand)}
  .btn.soft{background:var(--card); border:1.5px solid var(--line); color:var(--ink)}
  .btn.line{background:none; border:1.5px solid var(--line); color:var(--muted); font-weight:700}
  .btn2{display:flex; gap:10px}
  .btn2 .btn{font-size:15px; padding:14px}
  .muted{color:var(--muted)}
  .center{text-align:center}
  .stat{display:flex; gap:14px; justify-content:center; margin-bottom:6px}
  .stat b{font-size:22px}
  .tiny{font-size:12px}
  .link{background:none;border:none;color:var(--brand);font-weight:700;cursor:pointer;font-size:14px;padding:6px}

  /* quiz */
  .qtop{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; font-size:13px; font-weight:700; color:var(--muted)}
  .bar{height:8px; background:var(--line); border-radius:999px; overflow:hidden; margin-bottom:16px}
  .bar > i{display:block; height:100%; background:linear-gradient(90deg,var(--brand),var(--brand2)); transition:width .25s}
  .dirtag{display:inline-block; font-size:12px; font-weight:700; color:var(--accent); background:color-mix(in srgb,var(--accent) 14%, transparent); padding:4px 10px; border-radius:999px; margin-bottom:14px}
  .prompt{font-size:34px; font-weight:800; text-align:center; margin:6px 0 4px; word-break:break-word; line-height:1.25}
  .prompt.sent{font-size:22px; line-height:1.4}
  .promptsub{text-align:center; color:var(--muted); font-size:13px; margin-bottom:18px}
  .opt{
    width:100%; text-align:left; border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    padding:15px 16px; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:10px;
    display:flex; align-items:center; gap:10px; transition:.1s;
  }
  .opt .num{width:24px;height:24px;flex:0 0 24px;border-radius:7px;background:var(--brandsoft);color:var(--brand);font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .opt.correct{background:var(--goodsoft); border-color:var(--good); color:var(--good)}
  .opt.correct .num{background:var(--good);color:#fff}
  .opt.wrong{background:var(--badsoft); border-color:var(--bad); color:var(--bad)}
  .opt.wrong .num{background:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  input.answer{
    width:100%; padding:15px 16px; border:1.5px solid var(--line); border-radius:14px; font-size:18px;
    background:var(--card); color:var(--ink); outline:none; text-align:center; font-weight:600;
  }
  input.answer:focus{border-color:var(--brand)}
  .feedback{border-radius:14px; padding:14px 16px; margin-top:14px; font-weight:700; font-size:15px}
  .feedback.ok{background:var(--goodsoft); color:var(--good)}
  .feedback.no{background:var(--badsoft); color:var(--bad)}
  .feedback .ans{display:block; color:var(--ink); font-weight:800; font-size:20px; margin-top:4px}
  .spk{border:none;background:var(--brandsoft);color:var(--brand);width:38px;height:38px;border-radius:12px;cursor:pointer;font-size:17px;vertical-align:middle}
  .spk.sm{width:30px;height:30px;font-size:14px;border-radius:9px}

  /* flashcard */
  .flash{
    perspective:1200px; height:240px; margin:8px 0 16px; cursor:pointer;
  }
  .flash-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d}
  .flash.flipped .flash-inner{transform:rotateY(180deg)}
  .face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:18px; border:1.5px solid var(--line);
    background:var(--card); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:16px;
  }
  .face .big{font-size:32px; font-weight:800; text-align:center; word-break:break-word}
  .face .lbl{font-size:12px; color:var(--muted); font-weight:700}
  .face.back{transform:rotateY(180deg); background:var(--brandsoft)}
  .face.back .big{color:var(--brand)}

  /* 홈 4영역 / 듣기 / 말하기 */
  .skillgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .skillcard{border:1.5px solid var(--line); background:var(--card); border-radius:18px; padding:15px; cursor:pointer; text-align:left; transition:.12s; display:flex; flex-direction:column; gap:5px; box-shadow:var(--shadow); color:var(--ink)}
  .skillcard:active{transform:scale(.985)}
  .skillcard .ic{font-size:28px; line-height:1}
  .skillcard .nm{font-size:17px; font-weight:800}
  .skillcard .ds{font-size:12px; color:var(--muted); line-height:1.45}
  .skillcard .tg{margin-top:3px; font-size:11px; font-weight:700; color:var(--brand); background:var(--brandsoft); padding:3px 9px; border-radius:999px; align-self:flex-start}
  .secrow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px}
  .listenbox{display:flex; flex-direction:column; align-items:center; gap:10px; padding:14px 0 2px}
  .bigspk{width:104px; height:104px; border-radius:50%; border:none; background:var(--brandsoft); color:var(--brand); font-size:42px; cursor:pointer; transition:.12s}
  .bigspk:active{transform:scale(.96)}
  .listenhint{font-size:13px; color:var(--muted)}

  /* word list */
  .search{width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:14px; font-size:15px; background:var(--card); color:var(--ink); outline:none; margin-bottom:12px}
  .ta{width:100%; min-height:88px; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px; font-size:12px; font-family:ui-monospace,Menlo,Consolas,monospace; background:var(--bg); color:var(--ink); outline:none; resize:vertical; word-break:break-all}
  .ta:focus{border-color:var(--brand)}
  .tgrid{display:flex; flex-wrap:wrap; gap:8px; margin-top:2px}
  .trow{flex:1 1 150px; display:flex; align-items:center; gap:8px; background:var(--bg); border-radius:10px; padding:9px 12px}
  .tk{font-family:ui-monospace,Menlo,Consolas,monospace; font-weight:800; color:var(--brand); white-space:nowrap}
  .tar{color:var(--muted)}
  .tr{font-weight:600; font-size:14px}
  .wlist{display:flex; flex-direction:column; gap:0}
  .wrow{display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line)}
  .wrow:last-child{border-bottom:none}
  .wvn{font-weight:700; font-size:16px}
  .wen{color:var(--muted); margin-left:auto; text-align:right; font-size:15px}
  .wen.hide{filter:blur(6px); transition:.15s}
  .wrow:hover .wen.hide{filter:none}
  .lz{font-size:11px;color:var(--brand);background:var(--brandsoft);padding:2px 7px;border-radius:6px;font-weight:700}
  .del{border:none;background:var(--badsoft);color:var(--bad);border-radius:9px;width:30px;height:30px;cursor:pointer;font-weight:800}
  .star{border:none;background:none;cursor:pointer;font-size:20px;line-height:1;color:var(--muted);padding:2px 4px;flex:0 0 auto}
  .star.on{color:#e2a900}
  .notedot{font-size:11px;letter-spacing:1px;color:var(--brand);flex:0 0 auto}
  label.fld{display:block; font-size:13px; font-weight:700; color:var(--muted); margin:10px 0 6px}
  .foot{text-align:center; color:var(--muted); font-size:12px; padding:18px}
  .emoji{font-size:46px; text-align:center; margin-bottom:6px}

  /* 범위 지정 / select */
  .sel{padding:11px 12px; border:1.5px solid var(--line); border-radius:12px; font-size:15px; background:var(--card); color:var(--ink); font-weight:600; width:100%}
  .row2{display:grid; grid-template-columns:1fr 1.5fr; gap:8px}
  .rsum{margin-top:12px; background:var(--brandsoft); color:var(--brand); border-radius:12px; padding:10px 12px; font-size:13px; font-weight:600}
  .btn.accent{background:var(--accent); color:#fff}
  .keyrow{display:flex; align-items:center; gap:8px; cursor:pointer; font-size:14px; font-weight:700; color:var(--ink); margin-top:14px}
  .keyrow input{width:18px; height:18px}

  /* 시험지 (인쇄용) — 항상 흰 종이 느낌 유지 */
  .paper{background:#fff; color:#111; border:1px solid var(--line); border-radius:14px; padding:24px; margin-top:14px}
  .ptitle{font-size:20px; font-weight:800; text-align:center; color:#111}
  .pver{font-size:13px; color:#777; font-weight:700}
  .phead{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin:14px 0; font-size:14px; color:#222}
  .pinstr{font-size:12.5px; color:#333; background:#f3f4f6; border-radius:8px; padding:9px 11px; margin-bottom:16px; line-height:1.6}
  .pgrid{display:grid; grid-template-columns:1fr; gap:9px 28px}
  .pq{display:flex; align-items:baseline; gap:7px; font-size:14.5px; color:#111; break-inside:avoid; padding:2px 0}
  .pqn{color:#777; font-weight:700; min-width:26px}
  .pqp{font-weight:700; white-space:nowrap}
  .pqtag{font-size:10px; color:#999; white-space:nowrap}
  .pqline{flex:1; border-bottom:1px dotted #aaa; min-width:50px; align-self:flex-end; height:15px}
  .ppart{margin:20px 0 6px; font-size:15px; font-weight:800; color:#111; border-bottom:2px solid #bbb; padding-bottom:5px}
  .pslist{display:flex; flex-direction:column; gap:15px}
  .psq{break-inside:avoid}
  .psq .pqn{display:inline-block}
  .psp{font-weight:700; font-size:14.5px; color:#111}
  .psline{border-bottom:1px solid #aaa; height:26px; margin-top:7px}
  .pkeygrid{display:grid; grid-template-columns:1fr 1fr; gap:5px 20px; margin-top:8px}
  .pkq{font-size:13px; color:#111; break-inside:avoid}
  .pkq b{color:#777; font-weight:700}
  @media (min-width:560px){ .pgrid{grid-template-columns:1fr 1fr} }
  @page{ margin:0; }   /* 브라우저 자동 머리글·바닥글(날짜·페이지번호·주소) 제거 */
  @media print{
    .topbar,.foot,.noprint{display:none !important}
    body{background:#fff; margin:0; padding:0}
    .wrap{max-width:none; padding:0}
    .paper{border:none; border-radius:0; margin:0; padding:16mm 14mm}  /* 여백은 직접 부여 */
    .pgrid{grid-template-columns:1fr 1fr}
    .pq{break-inside:avoid}
  }
</style>
</head>
<body>
  <header class="topbar">
    <button class="brand" data-action="goHome">📖 단어 시험</button>
    <span class="sub">베트남어 ↔ 한국어</span>
  </header>
  <main id="view" class="wrap"></main>
  <div class="foot">GYBM 단어장 · 인터넷 없이도 작동해요</div>

function lsGet(k, fb){ try{ const v=localStorage.getItem(KEY+k); return v?JSON.parse(v):fb; }catch(e){ return fb; } }

let WORDS = [];
function buildWords(){
  WORDS = []; let id = 0;
  Object.keys(RAW).forEach(L=>{
    RAW[L].trim().split("\n").forEach(line=>{
      line = line.trim(); if(!line) return;
      const i = line.indexOf("|"); if(i<0) return;
      const vn = line.slice(0,i).trim(), en = line.slice(i+1).trim();
      if(vn && en) WORDS.push({id:id++, lesson:Number(L), vn, en});
    });
  });
  lsGet("_custom", []).forEach(c=>{
    if(c.vn && c.en) WORDS.push({id:id++, lesson:"custom", vn:c.vn, en:c.en});
  });
  // 단원 내 번호(num)와 전체 순서(gi) 부여 — 범위 지정에 사용
  const cnt = {};
  WORDS.forEach((w,i)=>{ w.gi = i; cnt[w.lesson] = (cnt[w.lesson]||0)+1; w.num = cnt[w.lesson]; });
}
function lessonsList(){
  const nums=[...new Set(WORDS.filter(w=>typeof w.lesson==="number").map(w=>w.lesson))].sort((a,b)=>a-b);
  if(WORDS.some(w=>w.lesson==="custom")) nums.push("custom");
  return nums;
}
const lessonLabel = l => l==="custom" ? "내 단어" : (typeof l==="number" ? "Lesson "+l : l);

/* =========================================================
   4) 도우미 함수
   ========================================================= */
function stripDia(s){
  return s.normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/đ/g,"d").replace(/Đ/g,"D");
}
function norm(s){
  return stripDia(String(s).toLowerCase())
    .replace(/[().,/;:!?'"’]/g," ")
    .replace(/\s+/g," ").trim();
}
function acceptable(answer){
  const set = new Set();
  const add = v => { const n=norm(v); if(n) set.add(n); };
  const stripLead = v => v.replace(/^(to|a|an|the)\s+/i,"");
  answer.split(/[,;/]/).map(x=>x.trim()).filter(Boolean).concat(answer).forEach(v=>{
    add(v); add(stripLead(v));
    const noParen = v.replace(/\([^)]*\)/g," ").trim();   // 괄호 내용 제거 버전
    add(noParen); add(stripLead(noParen));
  });
  return set;
}
function isCorrectTyped(answer, input){
  const ni = norm(input); if(!ni) return false;
  const set = acceptable(answer);
  if(set.has(ni)) return true;
  return set.has(ni.replace(/^(to|a|an|the)\s+/,""));
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function speak(text, lang){
  try{
    if(!window.speechSynthesis) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang || "en-US"; u.rate = .9;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}
function makeQ(word, dir, type){
  return { type: type||"word", word, dir,
    prompt: dir==="vn2en" ? word.vn : word.en,
    answer: dir==="vn2en" ? word.en : word.vn };
}
function dirOf(setting){ return setting==="random" ? (Math.random()<.5?"vn2en":"en2vn") : setting; }

  if(s.mode==="exam"){ startExam(pool); return; }
  if(s.mode==="speak"){ startSpeak(pool); return; }
  let q=shuffle(pool);
  if(state.count!=="all") q=q.slice(0, Math.min(Number(state.count), q.length));
  Q.queue=q.map(w=>makeQ(w, state.dir));
  Q.idx=0; Q.score=0; Q.wrong=[]; Q.wordCount=null; Q.sentCount=null;
  setupQ(); renderQuiz();
}

/* ---------- 시험 진행 ---------- */
const Q = {};
function poolSelected(){
  if(state.selMode==="range"){ const [a,b]=rangeBounds(); return WORDS.slice(a, b+1); }
  return WORDS.filter(w=>state.lessons.has(w.lesson));
}

function start(){
  const pool = poolSelected();
  if(pool.length===0){ alert("먼저 시험 볼 단원을 한 개 이상 골라주세요."); return; }
  if(state.mode==="flash"){ startFlash(pool); return; }
  if(state.mode==="exam"){ startExam(pool); return; }
  let q = shuffle(pool);
  if(state.count!=="all") q = q.slice(0, Math.min(Number(state.count), q.length));
  Q.queue = q.map(w=>makeQ(w, dirOf(state.dir)));
  Q.idx=0; Q.score=0; Q.wrong=[];
  setupQ(); renderQuiz();
}
function startExam(pool){
  const words = shuffle(pool).slice(0, Math.min(40, pool.length));
  const sents = shuffle(SENTS).slice(0, Math.min(10, SENTS.length));
  Q.wordCount = words.length; Q.sentCount = sents.length;
  Q.queue = [
    ...words.map(w=>makeQ(w, dirOf(state.dir), "word")),
    ...sents.map(s=>makeQ({vn:s.vn, en:s.en, lesson:"문장"}, dirOf(state.dir), "sentence"))
  ];
  Q.idx=0; Q.score=0; Q.wrong=[];
  setupQ(); renderQuiz();
}
function startQueue(items){ Q.queue=items; Q.idx=0; Q.score=0; Q.wrong=[]; Q.wordCount=null; Q.sentCount=null; setupQ(); renderQuiz(); }

function setupQ(){
  const q = Q.queue[Q.idx];
  Q.answered=false; Q.picked=null; Q.typed=""; Q.revealed=false;
  if(state.mode==="mc"){
    const key = q.dir==="vn2en" ? "en" : "vn";
    const pkey = q.dir==="vn2en" ? "vn" : "en";
    const seen = new Set([norm(q.answer)]);
    const pn = norm(q.prompt);
    const distract = [];
    for(const w of shuffle(WORDS)){
      if(norm(w[pkey])===pn) continue;
      const v = w[key], nv = norm(v);
      if(seen.has(nv)) continue;
      seen.add(nv); distract.push(v);
      if(distract.length>=3) break;
    }
    const opts = shuffle([q.answer, ...distract]);
    Q.options = opts; Q.correct = opts.indexOf(q.answer);
  }
}

function renderQuiz(){
  const q = Q.queue[Q.idx], n = Q.queue.length;
  const pct = Math.round((Q.idx/(n))*100);
  const isSent = q.type==="sentence";
  const isListen = state.mode==="listen";
  const kind = state.mode==="mc" ? "mc" : (isSent ? "sent" : "word");
  const promptLang = q.dir==="vn2en" ? "vi-VN" : "ko-KR";
  const ansLang = q.dir==="vn2en" ? "ko-KR" : "vi-VN";

  // 진행 라벨 (실전시험이면 단어/문장 구분)
  let counter = `문제 ${Q.idx+1} / ${n}`;
  if(state.mode==="exam" && Q.wordCount!=null){
    counter = (Q.idx < Q.wordCount)
      ? `📝 단어 ${Q.idx+1} / ${Q.wordCount}`
      : `✍️ 문장 ${Q.idx - Q.wordCount + 1} / ${Q.sentCount}`;
  } else if(state.mode==="exam"){
    counter = (isSent ? "✍️ 문장" : "📝 단어") + ` ${Q.idx+1} / ${n}`;
  }

  const subText = isListen
    ? (Q.answered ? "" : "🔊 잘 듣고, 한국어 뜻을 입력하세요")
    : isSent
    ? (q.dir==="vn2en" ? "이 문장을 한국어로 번역하세요" : "이 문장을 베트남어로 번역하세요")
    : (q.dir==="vn2en" ? "이 단어의 한국어 뜻은?" : "이 뜻의 베트남어 단어는?");

  let body = "", fb = "";
  const nextBtn = `<button class="btn" style="margin-top:12px" data-action="next">${Q.idx+1>=n?"결과 보기 →":"다음 →"}</button>`;

  if(kind==="mc"){
    body = Q.options.map((o,i)=>{
      let cls = "opt";
      if(Q.answered){ if(i===Q.correct) cls+=" correct"; else if(i===Q.picked) cls+=" wrong"; }
      return `<button class="${cls}" data-action="pick" data-i="${i}" ${Q.answered?"disabled":""}>
        <span class="num">${i+1}</span>${esc(o)}</button>`;
    }).join("");
    if(Q.answered){
      const ok = Q.picked===Q.correct;
      fb = `<div class="feedback ${ok?"ok":"no"}">${ok?"✅ 정답이에요!":"❌ 아쉬워요"}
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${nextBtn}`;
    }
  } else if(kind==="word"){
    body = `<input class="answer" id="ansInput" placeholder="정답 입력 후 Enter" ${Q.answered?"disabled":""} value="${esc(Q.typed||"")}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      ${!Q.answered?`<button class="btn" style="margin-top:12px" data-action="check">확인</button>`:""}`;
    if(Q.answered){
      fb = `<div class="feedback ${Q.lastOk?"ok":"no"}">${Q.lastOk?"✅ 정답이에요!":"❌ 아쉬워요"}
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${nextBtn}`;
    }
  } else { // 문장 번역 (자가 채점)
    if(!Q.revealed){
      body = `<button class="btn" data-action="revealSent">번역 확인하기</button>`;
    } else if(!Q.answered){
      fb = `<div class="feedback ok"><span style="font-weight:700">모범 번역</span>
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>
        <div class="promptsub" style="margin-top:12px">내 번역과 비교해보세요 — 맞았나요?</div>
        <div class="btn2"><button class="btn soft" data-action="selfWrong">❌ 틀렸어요</button><button class="btn" data-action="selfRight">✅ 맞았어요</button></div>`;
    } else {
      fb = `<div class="feedback ${Q.lastOk?"ok":"no"}">${Q.lastOk?"✅ 맞음 처리":"❌ 틀림 처리"}
        <span class="ans">${esc(q.answer)} ${spkBtn(q.answer, ansLang, true)}</span></div>${nextBtn}`;
    }
  }

  const dirTagHTML = isListen ? `<span class="dirtag">👂 듣기 · 소리만 듣고 맞히기</span>` : `<span class="dirtag">${DIRLABEL[q.dir]}</span>`;
  const promptBlock = (isListen && !Q.answered)
    ? `<div class="listenbox">
         <button class="bigspk" data-action="speak" data-text="${esc(q.prompt)}" data-lang="${promptLang}" aria-label="다시 듣기">🔊</button>
         <div class="listenhint">소리를 듣고 아래에 뜻을 적어요 · 탭하면 다시 들려요</div>
       </div>`
    : `<div class="prompt${isSent?" sent":""}">${esc(q.prompt)} ${spkBtn(q.prompt, promptLang)}</div>`;
  set(`
    <div class="qtop"><span>${counter}</span><span>점수 ${Q.score}</span></div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="card">
      ${dirTagHTML}
      ${promptBlock}
      <div class="promptsub">${subText}</div>
      ${body}
      ${fb}
    </div>
    <button class="btn line" data-action="quit">그만두기</button>
  `);

  if(kind==="word" && !Q.answered){
    const inp = document.getElementById("ansInput");
    if(inp){ inp.focus(); inp.addEventListener("keydown",e=>{ if(e.key==="Enter") checkTyped(); }); }
  }
  if(isListen && !Q.answered){ setTimeout(()=>speak(q.prompt, promptLang), 300); }
  if(Q.answered){ document.addEventListener("keydown", onAdvance); }
}
function onAdvance(e){ if(e.key==="Enter"){ document.removeEventListener("keydown", onAdvance); next(); } }

function pick(i){
  if(Q.answered) return;
  Q.answered=true; Q.picked=Number(i);
  const w=Q.queue[Q.idx].word;
  if(Q.picked===Q.correct){ Q.score++; noteRight(w); }
  else { Q.wrong.push(wrongItem()); noteWrong(w); }
  renderQuiz();
}
function checkTyped(){
  if(Q.answered) return;
  const inp = document.getElementById("ansInput");
  Q.typed = inp ? inp.value : "";
  const q = Q.queue[Q.idx];
  Q.lastOk = isCorrectTyped(q.answer, Q.typed);
  Q.answered = true;
  if(Q.lastOk){ Q.score++; noteRight(q.word); } else { Q.wrong.push(wrongItem()); noteWrong(q.word); }
  renderQuiz();
}
function wrongItem(){ const q=Q.queue[Q.idx]; return {vn:q.word.vn, en:q.word.en, lesson:q.word.lesson, dir:q.dir, type:q.type}; }
function next(){
  document.removeEventListener("keydown", onAdvance);
  Q.idx++;
  if(Q.idx>=Q.queue.length){ renderResult(); return; }
  setupQ(); renderQuiz();
}
function quit(){
  if(confirm("시험을 그만둘까요? 지금까지 결과를 보여드릴게요.")){
    document.removeEventListener("keydown", onAdvance);
    renderResult();
  }
}

/* ---------- 결과 ---------- */
function renderResult(){
  const done = Q.idx + (Q.answered?1:0);
  const answered = Math.min(done, Q.queue.length) || Q.score+Q.wrong.length;
  const total = answered || Q.queue.length;
  const pct = total ? Math.round((Q.score/total)*100) : 0;
  lsSet("_wrong", Q.wrong);
  let msg = pct>=90?"🎉 완벽해요! 시험 준비 끝!" : pct>=70?"👍 잘하고 있어요. 조금만 더!" : pct>=40?"💪 틀린 단어 위주로 복습해요." : "🌱 천천히, 반복이 답이에요!";
  const wrongList = Q.wrong.length ? `
    <div class="card">
      <h2>❌ 틀린 단어 ${Q.wrong.length}개</h2>
      <div class="muted tiny" style="margin:-6px 0 10px">📕 오답 노트에 저장됐어요 — 홈에서 모아서 집중 복습할 수 있어요.</div>
      <div class="wlist">
        ${Q.wrong.map(w=>`<div class="wrow">
          <span class="lz">${lessonLabel(w.lesson)}</span>
          <span class="wvn">${esc(w.vn)}</span>
          <span class="wen">${esc(w.en)}</span>
          ${spkBtn(w.vn,"vi-VN",true)}
        </div>`).join("")}
      </div>
    </div>` : `<div class="card center" style="padding:24px"><div class="emoji">🌟</div><b>다 맞혔어요!</b></div>`;

  set(`
    <div class="card center">
      <div class="emoji">${pct>=70?"🏆":"📒"}</div>
      <div class="stat"><div><b>${Q.score}</b><div class="tiny muted">정답</div></div>
        <div><b>${total}</b><div class="tiny muted">문제</div></div>
        <div><b>${pct}%</b><div class="tiny muted">정답률</div></div></div>
      <div class="muted" style="margin-top:6px">${msg}</div>
    </div>
    ${wrongList}
    ${Q.wrong.length?`<button class="btn" data-action="retryWrong">🔁 틀린 단어만 다시 풀기</button>`:""}
    <button class="btn soft" style="margin-top:10px" data-action="goHome">🏠 처음으로</button>
  `);
}
function retryWrong(){
  const items = Q.wrong.map(w=>makeQ({vn:w.vn,en:w.en,lesson:w.lesson}, w.dir, w.type));
  if(!items.length) return goHome();
  if(state.mode==="flash"){ startFlash(items.map(i=>i.word)); return; }
  startQueue(items);
}
function retryLast(){
  const lw = lsGet("_wrong", []);
  if(!lw.length) return;
  const items = lw.map(w=>makeQ({vn:w.vn,en:w.en,lesson:w.lesson}, w.dir, w.type));
  startQueue(items);
}

/* ---------- 오답 노트 ---------- */
const GRAD = 2; // 연속 정답 GRAD번이면 노트에서 졸업(자동 제거)
function lc2(s){ return String(s).trim().toLowerCase(); }
function noteKey(w){ return lc2(w.vn)+"||"+lc2(w.en); }
function loadNote(){ return lsGet("_notebook", []); }
function saveNote(a){ lsSet("_notebook", a); }
function noteHas(w){ const k=noteKey(w); return loadNote().some(e=>noteKey(e)===k); }
function noteAdd(w){ const a=loadNote(),k=noteKey(w); if(!a.some(e=>noteKey(e)===k)){ a.push({vn:w.vn,en:w.en,lesson:w.lesson,type:w.type||"word",streak:0}); saveNote(a); } }
function noteWrong(w){ const a=loadNote(),k=noteKey(w),e=a.find(x=>noteKey(x)===k); if(e){ e.streak=0; } else { a.push({vn:w.vn,en:w.en,lesson:w.lesson,type:w.type||"word",streak:0}); } saveNote(a); }
function noteRight(w){ const a=loadNote(),k=noteKey(w),i=a.findIndex(x=>noteKey(x)===k); if(i<0) return; a[i].streak=(a[i].streak||0)+1; if(a[i].streak>=GRAD) a.splice(i,1); saveNote(a); }
function seedNote(){
  if(lsGet("_seedv","")===SEED_NOTE_V) return;   // 이미 등록됨(버전별 1회)
  const a=loadNote(), seen=new Set(a.map(noteKey));
  SEED_NOTE.forEach(s=>{
    if(!s.vn||!s.en) return;
    const k=noteKey(s); if(seen.has(k)) return;   // 기존 오답노트와 중복이면 건너뜀
    a.push({vn:s.vn, en:s.en, lesson:s.lesson, type:s.type||"word", streak:0}); seen.add(k);
  });
  saveNote(a); lsSet("_seedv", SEED_NOTE_V);
}

function goNote(){ renderNote(); }
function startNote(){
  const note=loadNote();
  if(!note.length){ alert("오답 노트가 비어 있어요. 시험에서 틀리거나, 단어장에서 별표(☆)로 추가하면 모여요."); return; }
  const items=note.map(e=>makeQ({vn:e.vn,en:e.en,lesson:e.lesson}, dirOf(state.dir), e.type));
  if(state.mode==="flash"){ startFlash(items.map(i=>i.word)); return; }
  startQueue(items);
}
function renderNote(){
  state.screen="note";
  const note=loadNote();
  const rows = note.map((e,i)=>`<div class="wrow">
      <span class="lz">${lessonLabel(e.lesson)}</span>
      <span class="wvn">${esc(e.vn)} ${spkBtn(e.vn,"vi-VN",true)}</span>
      <span class="wen">${esc(e.en)}</span>
      <span class="notedot" title="연속 정답 ${e.streak||0}/${GRAD}">${"●".repeat(e.streak||0)}${"○".repeat(Math.max(0,GRAD-(e.streak||0)))}</span>
      <button class="del" data-action="removeNote" data-i="${i}">×</button>
    </div>`).join("");
  set(`
    <button class="link" data-action="goHome">← 처음으로</button>
    <div class="card">
      <h2>📕 오답 노트 · ${note.length}개</h2>
      <div class="muted tiny" style="margin-bottom:12px">시험에서 틀린 단어가 자동으로 모여요. 단어장에서 별표(☆)로 직접 넣을 수도 있어요. <b>연속 ${GRAD}번 맞히면 졸업</b>(자동으로 빠짐)돼요.</div>
      ${note.length
        ? `<button class="btn" data-action="startNote">🎯 오답 노트로 시험 보기</button>
           <div class="wlist" style="margin-top:14px">${rows}</div>`
        : `<div class="center muted" style="padding:24px"><div class="emoji">📭</div>아직 비어 있어요.<br>시험을 보거나 단어장에서 ☆를 눌러 추가하세요.</div>`}
    </div>
  `);
}

/* ---------- 백업 / 복원 ---------- */
function exportData(){
  return JSON.stringify({ app:"gybm-wordnote", v:1, notebook:loadNote(), custom:lsGet("_custom",[]) });
}
function fallbackCopy(okMsg){
  const ta=document.getElementById("exportBox");
  if(ta){ ta.focus(); ta.select(); try{ if(document.execCommand("copy")){ alert(okMsg); return; } }catch(e){} }
  alert("자동 복사가 안 되네요. 위 박스의 글자를 길게 눌러 전체 선택 후 복사하세요.");
}
function copyExport(){
  const text=exportData(), msg="복사됐어요! 카톡으로 나에게 보내거나, 다른 브라우저에 붙여넣어 복원하세요.";
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>alert(msg), ()=>fallbackCopy(msg)); return; }
  }catch(e){}
  fallbackCopy(msg);
}
function downloadExport(){
  try{
    const blob=new Blob([exportData()],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="단어시험_백업.json"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){ alert("파일 저장이 안 되면 '복사하기'를 이용해 주세요."); }
}
function importBackup(text){
  let obj;
  try{ obj=JSON.parse((text||"").trim()); }catch(e){ return {ok:false,msg:"형식이 올바르지 않아요. 백업 코드 전체를 정확히 붙여넣었는지 확인하세요."}; }
  if(!obj || obj.app!=="gybm-wordnote"){ return {ok:false,msg:"이 앱의 백업 코드가 아니에요."}; }
  let an=0, ac=0;
  if(Array.isArray(obj.notebook)){
    const cur=loadNote(), seen=new Set(cur.map(noteKey));
    obj.notebook.forEach(e=>{ if(e&&e.vn&&e.en&&!seen.has(noteKey(e))){ cur.push({vn:e.vn,en:e.en,lesson:e.lesson,type:e.type||"word",streak:e.streak||0}); seen.add(noteKey(e)); an++; } });
    saveNote(cur);
  }
  if(Array.isArray(obj.custom)){
    const cur=lsGet("_custom",[]), k=c=>lc2(c.vn)+"||"+lc2(c.en), seen=new Set(cur.map(k));
    obj.custom.forEach(c=>{ if(c&&c.vn&&c.en&&!seen.has(k(c))){ cur.push({vn:c.vn,en:c.en}); seen.add(k(c)); ac++; } });
    lsSet("_custom",cur); buildWords();
  }
  return {ok:true,msg:`완료! 오답 노트 ${an}개, 내 단어 ${ac}개를 새로 합쳤어요. (이미 있던 건 그대로 유지)`};
}
function goBackup(){ renderBackup(); }
function renderBackup(){
  state.screen="backup";
  const noteN=loadNote().length, customN=lsGet("_custom",[]).length;
  set(`
    <button class="link" data-action="goHome">← 처음으로</button>
    <div class="card">
      <h2>💾 백업 / 복원</h2>
      <div class="muted tiny" style="margin-bottom:6px">오답 노트와 내 단어를 다른 브라우저·기기로 옮겨요. (브라우저마다 저장이 따로라서요.)</div>
      <div class="muted tiny" style="margin-bottom:14px">지금 이 기기: 오답 노트 <b>${noteN}</b>개 · 내 단어 <b>${customN}</b>개</div>

      <label class="fld" style="margin-top:0">① 내보내기 (이 기기에서 복사)</label>
      <textarea class="ta" id="exportBox" readonly>${esc(exportData())}</textarea>
      <div class="btn2" style="margin-top:8px">
        <button class="btn soft" data-action="copyExport">📋 복사하기</button>
        <button class="btn soft" data-action="downloadExport">💾 파일로 저장</button>
      </div>
      <div class="muted tiny" style="margin-top:8px">복사해서 카톡으로 나에게 보내거나, 파일로 저장해 옮기세요.</div>

      <label class="fld" style="margin-top:18px">② 복원 (다른 기기에서 가져오기)</label>
      <textarea class="ta" id="importBox" placeholder="여기에 백업 코드를 붙여넣으세요"></textarea>
      <div class="btn2" style="margin-top:8px">
        <label class="btn soft" style="text-align:center;cursor:pointer;line-height:1.4">📁 파일 선택<input type="file" id="importFile" accept=".json,application/json" style="display:none"></label>
        <button class="btn" data-action="doImport">복원(합치기)</button>
      </div>
      <div class="muted tiny" style="margin-top:8px">합치기 방식이라 <b>기존 데이터는 안 지워져요.</b></div>
    </div>
  `);
  const f=document.getElementById("importFile");
  if(f) f.addEventListener("change", e=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=()=>{ const res=importBackup(r.result); alert(res.msg); if(res.ok) renderBackup(); };
    r.readAsText(file);
  });
}

  set(`

        ${row("Vieetj","Việt (베트남)")}
      </div>

      <div class="muted tiny" style="margin-top:16px;line-height:1.7"><b>💡 키보드 추가하기</b><br>• <b>폰(아이폰·안드로이드)</b>: 설정 → 키보드 → 베트남어(Telex) 추가<br>• <b>맥</b>: 시스템 설정 → 키보드 → 입력 소스 → <b>Vietnamese – Telex</b> 추가<br>• <b>윈도우</b>: 무료 프로그램 <b>UniKey</b> 설치<br><br>※ 참고: 우리 앱은 <b>성조 없이 쳐도</b>(예: <b>bua sang</b> → bữa sáng) 정답 처리돼요. 급할 땐 성조 빼고 입력해도 OK!</div>
    </div>
  `);
}

/* ---------- 플래시카드 ---------- */
const F = {};
function startFlash(pool){
  let list = shuffle(pool);
  if(state.count!=="all") list = list.slice(0, Math.min(Number(state.count), list.length));
  F.cards = list.map(w=>makeQ(w, dirOf(state.dir)));
  F.idx=0; F.flip=false; renderFlash();
}
function renderFlash(){
  const c = F.cards[F.idx], n=F.cards.length;
  const pLang = c.dir==="vn2en"?"vi-VN":"ko-KR", aLang = c.dir==="vn2en"?"ko-KR":"vi-VN";
  set(`
    <div class="qtop"><span>카드 ${F.idx+1} / ${n}</span><span>${DIRLABEL[c.dir]}</span></div>
    <div class="bar"><i style="width:${Math.round((F.idx/n)*100)}%"></i></div>
    <div class="flash ${F.flip?"flipped":""}" data-action="flip">
      <div class="flash-inner">
        <div class="face front"><span class="lbl">${c.dir==="vn2en"?"베트남어":"한국어"} · 탭하면 뒤집혀요</span>
          <span class="big">${esc(c.prompt)}</span>${spkBtn(c.prompt,pLang)}</div>
        <div class="face back"><span class="lbl">${c.dir==="vn2en"?"한국어 뜻":"베트남어"}</span>
          <span class="big">${esc(c.answer)}</span>${spkBtn(c.answer,aLang)}</div>
      </div>
    </div>
    <div class="btn2">
      <button class="btn soft" data-action="prevCard" ${F.idx===0?"disabled":""}>← 이전</button>
      <button class="btn ghost" data-action="flip">뒤집기</button>
      <button class="btn" data-action="nextCard">${F.idx+1>=n?"끝내기":"다음 →"}</button>
    </div>
    <button class="btn line" style="margin-top:10px" data-action="shuffleF">🔀 순서 섞기</button>
    <button class="btn line" style="margin-top:8px" data-action="goHome">🏠 처음으로</button>
  `);
}

/* ---------- 말하기 (듣고 따라 말하기) ---------- */
const SP = {};
function startSpeak(pool){
  let list = shuffle(pool);
  if(state.count!=="all") list = list.slice(0, Math.min(Number(state.count), list.length));
  SP.cards = list; SP.idx=0; SP.revealed=false;
  renderSpeak();
}
function renderSpeak(){
  const w = SP.cards[SP.idx], n=SP.cards.length;
  set(`
    <div class="qtop"><span>🗣️ 따라 말하기 ${SP.idx+1} / ${n}</span><span>입으로 연습</span></div>
    <div class="bar"><i style="width:${Math.round((SP.idx/n)*100)}%"></i></div>
    <div class="card">
      <span class="dirtag">🗣️ 듣고 따라 말하기</span>
      <div class="prompt">${esc(w.vn)} ${spkBtn(w.vn,"vi-VN")}</div>
      <div class="promptsub">🔊 듣고 → 큰 소리로 따라 말해보세요</div>
      <button class="btn ghost" data-action="speakCard">🔊 다시 듣기</button>
      ${SP.revealed
        ? `<div class="feedback ok" style="margin-top:12px">🇰🇷 뜻<span class="ans">${esc(w.en)}</span></div>`
        : `<button class="btn soft" style="margin-top:10px" data-action="revealSpeak">🇰🇷 뜻 보기</button>`}
      <div class="promptsub" style="margin-top:16px">잘 따라 말했나요?</div>
      <div class="btn2">
        <button class="btn soft" data-action="speakAgain">🔁 더 연습 (노트에)</button>
        <button class="btn" data-action="speakNext">${SP.idx+1>=n?"끝내기 ✅":"잘했어요 →"}</button>
      </div>
    </div>
    <button class="btn line" data-action="goHome">🏠 처음으로</button>
  `);
  setTimeout(()=>speak(w.vn,"vi-VN"), 300);
}
function speakAdvance(toNote){
  const w = SP.cards[SP.idx];
  if(toNote) noteAdd({vn:w.vn, en:w.en, lesson:w.lesson});
  if(SP.idx+1>=SP.cards.length){ renderSpeakDone(); return; }
  SP.idx++; SP.revealed=false; renderSpeak();
}
function renderSpeakDone(){
  set(`
    <div class="card center" style="padding:24px">
      <div class="emoji">🗣️</div>
      <b>말하기 연습 끝!</b>
      <div class="muted" style="margin-top:6px">입으로 소리 내어 연습하면 훨씬 오래 기억돼요. 수고했어요!</div>
    </div>
    <button class="btn" data-action="goHome">🏠 처음으로</button>
  `);
}

/* ---------- 단어장 보기 ---------- */
const L = { lesson:"all", q:"", hide:false };
function goList(){ renderList(); }
function renderList(){
  const lessons = lessonsList();
  const filt = WORDS.filter(w=>{
    if(L.lesson!=="all" && String(w.lesson)!==String(L.lesson)) return false;
    if(L.q){ const k=norm(L.q); if(!norm(w.vn).includes(k) && !norm(w.en).includes(k)) return false; }
    return true;
  });
  const chips = ['all',...lessons].map(l=>`<button class="chip ${String(L.lesson)===String(l)?"on":""}" data-action="listFilter" data-l="${l}">${l==="all"?"전체":lessonLabel(l)}</button>`).join("");
  set(`
    <button class="link" data-action="goHome">← 처음으로</button>
    <div class="card">
      <h2>📚 단어장 · ${filt.length}개</h2>
      <input class="search" id="searchBox" placeholder="🔎 단어/뜻 검색 (베트남어·한국어 모두)" value="${esc(L.q)}">
      <div class="row" style="margin-bottom:6px">${chips}</div>
      <button class="chip ${L.hide?"on":""}" data-action="toggleHide">${L.hide?"🙈 뜻 가림 (마우스 올리면 보임)":"👁️ 뜻 보임"}</button>
      <div class="wlist" style="margin-top:8px">
        ${filt.length? filt.map(w=>`<div class="wrow">
          <span class="lz">${lessonLabel(w.lesson)}</span>
          <span class="wvn">${esc(w.vn)} ${spkBtn(w.vn,"vi-VN",true)}</span>
          <span class="wen ${L.hide?"hide":""}">${esc(w.en)}</span>
          <button class="star ${noteHas(w)?"on":""}" data-action="starWord" data-id="${w.id}" title="오답 노트에 추가/제거">${noteHas(w)?"★":"☆"}</button>
        </div>`).join("") : `<div class="muted center" style="padding:20px">검색 결과가 없어요.</div>`}
      </div>
    </div>
  `);
  const sb = document.getElementById("searchBox");
  if(sb){ sb.addEventListener("input", e=>{ L.q=e.target.value; const pos=sb.selectionStart; renderList(); const nb=document.getElementById("searchBox"); nb.focus(); nb.setSelectionRange(pos,pos); }); }
}

/* ---------- 단어 추가 ---------- */
function goAdd(){ renderAdd(); }
function renderAdd(){
  const custom = lsGet("_custom", []);
  set(`
    <button class="link" data-action="goHome">← 처음으로</button>
    <div class="card">
      <h2>➕ 내 단어 추가</h2>
      <label class="fld">베트남어 (또는 외울 단어)</label>
      <input class="search" id="inVn" placeholder="예: cảm ơn" autocomplete="off">
      <label class="fld">한국어 뜻</label>
      <input class="search" id="inEn" placeholder="예: 고맙다, 감사하다" autocomplete="off">
      <button class="btn" style="margin-top:12px" data-action="addWord">추가하기</button>
      <div class="muted tiny" style="margin-top:10px">추가한 단어는 이 브라우저에 저장돼요. 단어장·시험에 '내 단어'로 함께 나와요.</div>
    </div>
    <div class="card">
      <h2>내가 추가한 단어 · ${custom.length}개</h2>
      <div class="wlist">
        ${custom.length? custom.map((w,i)=>`<div class="wrow">
          <span class="wvn">${esc(w.vn)}</span>
          <span class="wen">${esc(w.en)}</span>
          <button class="del" data-action="delWord" data-i="${i}">×</button>
        </div>`).join("") : `<div class="muted center" style="padding:16px">아직 없어요.</div>`}
      </div>
    </div>
  `);
}
function addWord(){
  const vn=(document.getElementById("inVn").value||"").trim();
  const en=(document.getElementById("inEn").value||"").trim();
  if(!vn||!en){ alert("단어와 뜻을 모두 입력해주세요."); return; }
  const custom = lsGet("_custom", []); custom.push({vn,en}); lsSet("_custom", custom);
  buildWords(); renderAdd();
}
function delWord(i){
  const custom = lsGet("_custom", []); custom.splice(Number(i),1); lsSet("_custom", custom);
  buildWords(); renderAdd();
}

/* ---------- 시험지 만들기 (인쇄·여럿이 함께) ---------- */
const P = { dir:"random", count:"all", format:"wordsent", version:0, wordQs:[], sentQs:[] };
function rangeTitle(){
  if(state.selMode==="range"){ const [a,b]=rangeBounds(); return `${lessonLabel(WORDS[a].lesson)} ${WORDS[a].num}번 ~ ${lessonLabel(WORDS[b].lesson)} ${WORDS[b].num}번`; }
  const ls=[...state.lessons].filter(l=>l!=="custom").sort((a,b)=>a-b);
  return ls.length ? ls.map(l=>"L"+l).join(", ")+(state.lessons.has("custom")?", 내 단어":"") : "선택 범위";
}
function genPaper(bump){
  const rawPool = poolSelected();
  if(!rawPool.length){ alert("먼저 ① 에서 공부할 범위를 선택해주세요."); goHome(); return; }
  const lc = s => s.trim().toLowerCase();
  // 1) 같은 단어쌍 중복 제거 (책에서 여러 단원에 반복되는 동일 단어)
  const seenPair = new Set();
  let pool = rawPool.filter(w=>{ const k=lc(w.vn)+"||"+lc(w.en); if(seenPair.has(k)) return false; seenPair.add(k); return true; });
  pool = shuffle(pool);
  if(bump || !P.version) P.version = (P.version||0)+1;
  // 2) 방향 배정 + 화면에 보이는 문제(단어) 중복 제거
  const seenPrompt = new Set();
  const qs = [];
  for(const w of pool){
    let d = P.dir==="random" ? (Math.random()<.5?"vn2en":"en2vn") : P.dir;
    let prompt = d==="vn2en" ? w.vn : w.en;
    if(seenPrompt.has(lc(prompt))){
      const d2 = d==="vn2en" ? "en2vn" : "vn2en";
      const p2 = d2==="vn2en" ? w.vn : w.en;
      if(P.dir==="random" && !seenPrompt.has(lc(p2))){ d=d2; prompt=p2; }  // 반대 방향으로 회피
      else continue;                                                        // 그래도 겹치면 제외
    }
    seenPrompt.add(lc(prompt));
    qs.push({ vn:w.vn, en:w.en, dir:d, prompt, answer:d==="vn2en"?w.en:w.vn });
  }
  // 단어 문제 수: 단어+문장 구성이면 40개, 단어만이면 선택한 문제 수
  const wordLimit = P.format==="wordsent" ? 40 : (P.count==="all" ? qs.length : Number(P.count));
  P.wordQs = qs.slice(0, Math.min(wordLimit, qs.length));
  // 문장 문제 (단어+문장 구성일 때만 10개)
  if(P.format==="wordsent"){
    P.sentQs = shuffle(SENTS).slice(0, Math.min(10, SENTS.length)).map(s=>{
      const d = P.dir==="random" ? (Math.random()<.5?"vn2en":"en2vn") : P.dir;
      return { dir:d, prompt:d==="vn2en"?s.vn:s.en, answer:d==="vn2en"?s.en:s.vn };
    });
  } else {
    P.sentQs = [];
  }
  renderPaper();
}
function renderPaper(){
  state.screen = "paper";
  const wQs = P.wordQs, sQs = P.sentQs;
  const total = wQs.length + sQs.length;
  const isWS = P.format==="wordsent";
  const wordGrid = wQs.map((q,i)=>
    `<div class="pq"><span class="pqn">${i+1}.</span><span class="pqp">${esc(q.prompt)}</span><span class="pqline"></span></div>`
  ).join("");
  const sentList = sQs.map((q,i)=>
    `<div class="psq"><span class="pqn">${i+1}.</span><span class="psp">${esc(q.prompt)}</span><div class="psline"></div></div>`
  ).join("");
  const paperBody = isWS
    ? `<div class="ppart">1부. 단어 (${wQs.length}문제)</div>
       <div class="pgrid">${wordGrid}</div>
       <div class="ppart">2부. 문장 번역 (${sQs.length}문제)</div>
       <div class="pslist">${sentList}</div>`
    : `<div class="pgrid">${wordGrid}</div>`;

  set(`
    <div class="noprint">
      <button class="link" data-action="goHome">← 처음으로</button>
      <div class="card">
        <h2>🖨️ 시험지 만들기</h2>
        <label class="fld" style="margin-top:0">시험 구성</label>
        <div class="seg">
          <button class="${isWS?"on":""}" data-action="paperFormat" data-v="wordsent">단어40 + 문장10</button>
          <button class="${!isWS?"on":""}" data-action="paperFormat" data-v="words">단어만</button>
        </div>
        <label class="fld">시험 범위</label>
        ${selectionBlockHTML(false)}
        <label class="fld">출제 방향</label>
        <div class="seg">
          <button class="${P.dir==="random"?"on":""}" data-action="paperDir" data-v="random">랜덤 섞기</button>
          <button class="${P.dir==="vn2en"?"on":""}" data-action="paperDir" data-v="vn2en">베→한</button>
          <button class="${P.dir==="en2vn"?"on":""}" data-action="paperDir" data-v="en2vn">한→베</button>
        </div>
        ${!isWS ? `<label class="fld">문제 수</label>
        <div class="seg">
          ${["all",20,30,50].map(c=>`<button class="${String(P.count)===String(c)?"on":""}" data-action="paperCount" data-v="${c}">${c==="all"?"범위 전체":c+"개"}</button>`).join("")}
        </div>`:""}
        <div class="btn2" style="margin-top:14px">
          <button class="btn soft" data-action="regenPaper">🔀 다시 섞기</button>
          <button class="btn accent" data-action="printPaper">🖨️ 인쇄 / PDF</button>
        </div>
        <div class="muted tiny" style="margin-top:10px">💡 인쇄 창에서 대상을 <b>'PDF로 저장'</b>으로 바꾸면 파일로 보관·공유돼요. 날짜·페이지번호가 보이면 인쇄 창에서 <b>'머리글 및 바닥글'</b>(Safari는 '머리말/꼬리말') 체크를 꺼주세요.${isWS?" 문장은 기존 단어로 만든 예문이에요.":" 여러 명이 풀 땐 <b>다시 섞기</b>로 문제 순서를 바꿔 나눠줄 수 있어요."}</div>
      </div>
    </div>

    <div class="paper">
      <div class="ptitle">${isWS?"베트남어 시험 (단어 + 문장)":"베트남어 단어 시험"}</div>
      <div class="phead"><span>이름 : ____________</span><span>날짜 : ____________</span><span>점수 : ______ / ${total}</span></div>
      <div class="pinstr">범위: ${esc(rangeTitle())}${isWS?" · 단어 40 + 문장 번역 10":""}</div>
      ${paperBody}
    </div>
  `);
  bindSelection();
}

/* =========================================================
   6) 클릭 이벤트 연결
   ========================================================= */
const actions = {
  goHome, goList, goAdd, start, retryLast, retryWrong, retryWrongQ:retryWrong,
  pick:(el)=>pick(el.dataset.i),
  check:checkTyped, next, quit,
  revealSent:()=>{ Q.revealed=true; renderQuiz(); },
  selfRight:()=>{ if(Q.answered) return; Q.answered=true; Q.lastOk=true; Q.score++; noteRight(Q.queue[Q.idx].word); renderQuiz(); },
  selfWrong:()=>{ if(Q.answered) return; Q.answered=true; Q.lastOk=false; Q.wrong.push(wrongItem()); noteWrong(Q.queue[Q.idx].word); renderQuiz(); },
  flip:()=>{ F.flip=!F.flip; renderFlash(); },
  nextCard:()=>{ if(F.idx+1>=F.cards.length){ goHome(); } else { F.idx++; F.flip=false; renderFlash(); } },
  prevCard:()=>{ if(F.idx>0){ F.idx--; F.flip=false; renderFlash(); } },
  shuffleF:()=>{ F.cards=shuffle(F.cards); F.idx=0; F.flip=false; renderFlash(); },
  toggleLesson:(el)=>{ const l=el.dataset.l==="custom"?"custom":Number(el.dataset.l); if(state.lessons.has(l)) state.lessons.delete(l); else state.lessons.add(l); refresh(); },
  allLessons:()=>{ lessonsList().forEach(l=>state.lessons.add(l)); refresh(); },
  noLessons:()=>{ state.lessons.clear(); refresh(); },
  selMode:(el)=>{ state.selMode=el.dataset.v; lsSet("_selMode",state.selMode); refresh(); },
  goPaper:()=>genPaper(false),
  paperDir:(el)=>{ P.dir=el.dataset.v; genPaper(false); },
  paperCount:(el)=>{ P.count=el.dataset.v==="all"?"all":Number(el.dataset.v); genPaper(false); },
  paperFormat:(el)=>{ P.format=el.dataset.v; genPaper(false); },
  regenPaper:()=>genPaper(true),
  printPaper:()=>window.print(),
  mode:(el)=>{ state.mode=el.dataset.v; lsSet("_mode",state.mode); renderHome(); },
  dir:(el)=>{ state.dir=el.dataset.v; lsSet("_dir",state.dir); renderHome(); },
  count:(el)=>{ state.count=el.dataset.v==="all"?"all":Number(el.dataset.v); lsSet("_count",state.count); refresh(); },
  listFilter:(el)=>{ L.lesson=el.dataset.l==="all"?"all":(el.dataset.l==="custom"?"custom":Number(el.dataset.l)); renderList(); },
  toggleHide:()=>{ L.hide=!L.hide; renderList(); },
  addWord, delWord:(el)=>delWord(el.dataset.i),
  goNote, startNote, goBackup, goTelex, copyExport, downloadExport,
  doImport:()=>{ const t=document.getElementById("importBox"); const res=importBackup(t?t.value:""); alert(res.msg); if(res.ok) renderBackup(); },
  removeNote:(el)=>{ const a=loadNote(); a.splice(Number(el.dataset.i),1); saveNote(a); renderNote(); },
  starWord:(el)=>{ const w=WORDS.find(x=>x.id===Number(el.dataset.id)); if(!w) return; if(noteHas(w)){ const a=loadNote().filter(e=>noteKey(e)!==noteKey(w)); saveNote(a); } else { noteAdd(w); } renderList(); },
  goSkill:(el)=>goSkill(el.dataset.skill), startSkill,
  setupDir:(el)=>{ state.dir=el.dataset.v; lsSet("_dir",state.dir); renderSetup(); },
  speakCard:()=>speak(SP.cards[SP.idx].vn,"vi-VN"),
  revealSpeak:()=>{ SP.revealed=true; renderSpeak(); },
  speakAgain:()=>speakAdvance(true),
  speakNext:()=>speakAdvance(false),
  speak:(el)=>speak(el.dataset.text, el.dataset.lang)
};
view.addEventListener("click", e=>{
  const t = e.target.closest("[data-action]");
  if(!t) return;
  const fn = actions[t.dataset.action];
  if(fn){ e.preventDefault(); fn(t, e); }
});

/* =========================================================
   7) 시작!
   ========================================================= */
buildWords();
seedNote();
goHome();
</script>
